                      value={adminPassword}
                      onChange={(e) => setAdminPassword(e.target.value)}
                      placeholder="請輸入密碼"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                    />
                  </div>

                  <div className="p-3 bg-amber-500/5 rounded-xl border border-amber-500/10 text-[10px] text-amber-300 leading-relaxed font-bold">
                    <span className="font-bold">💡 貼心提醒：</span><br />
                    本系統目前預設管理帳號為 <code className="bg-slate-950 px-1 py-0.5 rounded font-mono">admin</code>，密碼為 <code className="bg-slate-950 px-1 py-0.5 rounded font-mono">***</code>.
                  </div>

                  <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-2.5 rounded-xl transition">核對密碼並登入</button>
                </form>
              </div>
            </div>
          )}

          {/* D. 管理者控制台面板 */}
          {showAdminConsole && isAdminLoggedIn && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm overflow-y-auto font-sans">
              <div className="bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-2xl shadow-2xl relative my-8">
                <button onClick={() => setShowAdminConsole(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                
                <div className="border-b border-slate-800 pb-3 mb-4">
                  <h3 className="text-xl font-extrabold text-amber-400 flex items-center space-x-2">
                    <span>🔑 NyxShade 遠征隊管理者控制台</span>
                  </h3>
                  <p className="text-xs text-slate-400 mt-1">您好管理員，您可以在此管理全體註冊成員的名單 or 更動系統底層設定。</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  
                  <div className="space-y-4">
                    <div className="flex items-center justify-between">
                      <h4 className="font-bold text-sm text-slate-200 flex items-center space-x-1.5">
                        <span>👥 成員角色卡管理</span>
                        <span className="bg-slate-800 text-slate-400 text-[10px] px-2 py-0.5 rounded-full font-normal">
                          {registeredUsers.length} 人已登錄
                        </span>
                      </h4>
                    </div>

                    <input
                      type="text"
                      value={searchUserQuery}
                      onChange={(e) => setSearchUserQuery(e.target.value)}
                      placeholder="🔍 搜尋玩家 IGN 或職業..."
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-1.5 text-xs text-slate-200 focus:outline-none"
                    />

                    <div className="max-h-[300px] overflow-y-auto pr-2 space-y-3 scrollbar-thin scrollbar-thumb-slate-800 font-semibold font-bold">
                      {(() => {
                        const filtered = registeredUsers.filter(u => {
                          const chars = u.characters || [{ ign: u.ign, job: u.job, level: u.level }];
                          return chars.some(c => 
                            (c.ign || '').toLowerCase().includes(searchUserQuery.toLowerCase()) ||
                            (c.job || '').toLowerCase().includes(searchUserQuery.toLowerCase())
                          );
                        });

                        if (filtered.length === 0) {
                          return (
                            <div className="text-center text-slate-600 text-xs italic py-10">
                              沒有找到符合搜尋條件的玩家角色卡
                            </div>
                          );
                        }

                        return filtered.map(u => {
                          const chars = u.characters || [{ ign: u.ign, job: u.job, level: u.level }];
                          const activeChar = chars[u.activeCharacterIndex || 0] || chars[0] || { ign: '未知', job: '未知', level: 120 };
                          return (
                            <div key={u.id} className="bg-slate-950/85 p-3.5 rounded-xl border border-slate-800 space-y-2">
                              <div className="flex items-center justify-between">
                                <span className="font-bold text-slate-200 text-sm">👤 用戶身分 ({chars.length} 個角色)</span>
                                <button
                                  onClick={() => handleDeleteUserProfile(u.userId || u.id, activeChar.ign)}
                                  className="bg-rose-955/40 hover:bg-rose-900/60 border border-rose-900 text-rose-300 font-bold px-2.5 py-1.5 rounded-lg text-xs transition animate-pulse"
                                >
                                  🗑️ 刪除全部角色卡
                                </button>
                              </div>

                              <div className="p-2 bg-slate-900 border border-slate-800 rounded-lg flex items-center justify-between gap-2 text-xs">
                                <span className="font-mono text-slate-400 select-all truncate">
                                  🔑 帳號密鑰: <span className="text-amber-400 font-bold">{u.userId || u.id}</span>
                                </span>
                                <button
                                  type="button"
                                  onClick={() => {
                                    const textarea = document.createElement('textarea');
                                    textarea.value = u.userId || u.id;
                                    document.body.appendChild(textarea);
                                    textarea.select();
                                    document.execCommand('copy');
                                    document.body.removeChild(textarea);
                                    showToast("已成功複製該隊員的帳號密鑰！");
                                  }}
                                  className="bg-slate-800 hover:bg-slate-755 text-slate-300 text-[10px] px-2.5 py-1 rounded border border-slate-700 transition shrink-0 active:scale-95"
                                >
                                  複製
                                </button>
                              </div>

                              <div className="space-y-1 pl-2 border-l border-slate-800">
                                {chars.map((c, cIdx) => (
                                  <div key={cIdx} className="flex items-center justify-between text-xs py-1">
                                    <span className={`font-semibold ${cIdx === (u.activeCharacterIndex || 0) ? 'text-emerald-400' : 'text-slate-400'} flex items-center space-x-1.5`}>
                                      <span>•</span>
                                      {renderJobIcon(c.job, "w-4 h-4")}
                                      <span>{c.ign} ({c.job} Lv.{c.level}) {cIdx === (u.activeCharacterIndex || 0) && '🌟'}</span>
                                    </span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        });
                      })()}
                    </div>
                  </div>

                  {/* 🛡️ 右側欄位：資料庫維護 ＋ Discord OAuth2 與 Webhook 系統設定 👑 */}
                  <div className="space-y-6">
                    <div className="p-5 bg-slate-950 border border-slate-800 rounded-2xl space-y-4 font-semibold">
                      <h4 className="font-extrabold text-sm text-indigo-400 flex items-center gap-1.5">
                        <span>🛡️ Discord 登入整合設定</span>
                      </h4>
                      <p className="text-xs text-slate-400 leading-relaxed">
                        設定遠征隊專屬的 Discord 連線。推薦使用 <strong className="text-emerald-400">純前端免伺服器模式 (Implicit Grant)</strong>，管理員無需租用任何後端伺服器即可完美使用！
                      </p>

                      <form onSubmit={async (e) => {
                        e.preventDefault();
                        try {
                          await db.doc(`artifacts/${appId}/public/data/discord/config`).set(discordConfig);
                          showToast("Discord 整合設定已儲存並全面啟用！");
                        } catch (err) {
                          showToast(`儲存失敗: ${err.message}`, "error");
                        }
                      }} className="space-y-3 text-xs">
                        <div>
                          <label className="block text-slate-400 mb-1 font-bold">Discord Client ID</label>
                          <input
                            type="text"
                            placeholder="貼上 Discord Developer Portal 的 Client ID"
                            value={discordConfig?.clientId || ''}
                            onChange={(e) => setDiscordConfig({ ...discordConfig, clientId: e.target.value })}
                            className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2.5 py-2 text-xs text-slate-100 focus:outline-none font-mono"
                          />
                        </div>

                        <div>
                          <label className="block text-slate-400 mb-1 font-bold">驗證模式</label>
                          <div className="flex gap-2">
                            <button
                              type="button"
                              onClick={() => setDiscordConfig({ ...discordConfig, mode: 'implicit' })}
                              className={`flex-1 py-1.5 rounded border text-center font-bold text-[11px] ${discordConfig?.mode !== 'code' ? 'bg-indigo-650/30 border-indigo-500 text-indigo-200' : 'bg-slate-900 border-slate-800 text-slate-400'}`}
                            >
                              純前端免伺服器 (Implicit)
                            </button>
                            <button
                              type="button"
                              onClick={() => setDiscordConfig({ ...discordConfig, mode: 'code' })}
                              className={`flex-1 py-1.5 rounded border text-center font-bold text-[11px] ${discordConfig?.mode === 'code' ? 'bg-indigo-650/30 border-indigo-500 text-indigo-200' : 'bg-slate-900 border-slate-800 text-slate-400'}`}
                            >
                              進階後端 API (Code)
                            </button>
                          </div>
                        </div>

                        <div>
                          <label className="block text-slate-400 mb-1 font-bold">重新導向網址 (Redirect URI)</label>
                          <input
                            type="text"
                            placeholder="需與 Discord Portal 設定一致"
                            value={discordConfig?.redirectUri || ''}
                            onChange={(e) => setDiscordConfig({ ...discordConfig, redirectUri: e.target.value })}
                            className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2.5 py-2 text-xs text-slate-100 focus:outline-none font-mono"
                          />
                        </div>

                        {discordConfig?.mode === 'code' && (
                          <div>
                            <label className="block text-slate-400 mb-1 font-bold">後端 API 換券端點 (Endpoint)</label>
                            <input
                              type="text"
                              placeholder="例如: https://my-backend.vercel.app/api/discord-login"
                              value={discordConfig?.apiEndpoint || ''}
                              onChange={(e) => setDiscordConfig({ ...discordConfig, apiEndpoint: e.target.value })}
                              className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2.5 py-2 text-xs text-slate-100 focus:outline-none"
                            />
                          </div>
                        )}

                        {/* 💡 Webhook 整合設定區塊 👑 */}
                        <div className="border-t border-slate-800/80 pt-3 mt-3">
                          <label className="block text-amber-400 mb-1 font-black">Discord Webhook URL (發送廣播與 @標記)</label>
                          <input
                            type="text"
                            placeholder="在此貼上您 Discord 頻道的 Webhook 網址"
                            value={discordConfig?.webhookUrl || ''}
                            onChange={(e) => setDiscordConfig({ ...discordConfig, webhookUrl: e.target.value })}
                            className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2.5 py-2 text-xs text-slate-100 focus:outline-none font-mono"
                          />
                        </div>

                        <div className="bg-slate-900/60 p-2.5 rounded border border-slate-800 text-[10px] text-slate-500 leading-relaxed">
                          <strong className="text-amber-500">📌 設定步驟指南：</strong>
                          <ol className="list-decimal pl-3.5 space-y-0.5 mt-1">
                            <li>前往 Discord Developer Portal 建立專案。</li>
                            <li>在 OAuth2 General 頁面的 Redirects 加入上面的導向網址。</li>
                            <li>至 Discord 伺服器頻道設定 ➜ 整合 ➜ 建立 Webhook，複製網址並填在上方。</li>
                          </ol>
                        </div>

                        <button
                          type="submit"
                          className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded-lg text-xs transition active:scale-95"
                        >
                          儲存 Discord 連線設定
                        </button>
                      </form>
                    </div>

                    <div className="p-4 bg-slate-950/60 rounded-xl border border-slate-855 space-y-3 font-semibold font-bold">
                      <h4 className="font-bold text-sm text-slate-200">⚠️ 資料庫與連線維護</h4>
                      <p className="text-xs text-slate-400 leading-relaxed">
                        如果您不小心更動或貼錯了 Firebase 的 Config 造成網頁連線死當，可以按下下方按鈕將其抹除。
                      </p>
                      
                      <button
                        onClick={handleResetConfig}
                        className="w-full bg-rose-955 hover:bg-rose-900 border border-rose-800 text-rose-300 font-bold py-2 rounded-xl text-xs transition active:scale-95 animate-pulse"
                      >
                        ⚠️ 移除並重置本網頁 Firebase 金鑰
                      </button>
                    </div>
                  </div>

                </div>

                <div className="flex justify-end space-x-2 border-t border-slate-800 pt-3 mt-4 text-xs font-bold">
                  <button onClick={() => setShowAdminConsole(false)} className="bg-slate-800 hover:bg-slate-755 px-4 py-2 rounded-xl text-slate-300">關閉後台</button>
                </div>

              </div>
            </div>
          )}

          {/* E. 通用 React 自訂確認對話視窗 */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl font-semibold font-bold">
                <h3 className="text-lg font-bold text-rose-400">⚠️ 系統確認</h3>
                <p className="text-sm font-semibold text-slate-100 mt-2">{confirmModal.title}</p>
                <p className="text-xs text-slate-400 mt-1.5 leading-relaxed">{confirmModal.message}</p>
                <div className="flex space-x-3 mt-6">
                  <button onClick={() => setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null })} className="flex-1 bg-slate-855 py-2 rounded-xl text-xs hover:bg-slate-800 transition">取消</button>
                  <button onClick={confirmModal.onConfirm} className="flex-1 bg-rose-600 py-2 rounded-xl text-xs text-white font-bold hover:bg-rose-700 transition active:scale-95">確認執行</button>
                </div>
              </div>
            </div>
          )}

          {/* 💡 通用隊員詳細角色卡彈出視窗 */}
          {voterDetailModal.isOpen && voterDetailModal.voter && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl relative font-semibold font-bold">
                <button 
                  onClick={() => setVoterDetailModal({ isOpen: false, voter: null })} 
                  className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl transition-colors"
                >
                  ✕
                </button>
                
                <div className="text-center pb-4 border-b border-slate-800 select-none">
                  <span className="text-4xl block mb-2">🍁</span>
                  <h3 className="text-lg font-black text-white">隊員詳細身分角色卡</h3>
                  <p className="text-xs text-slate-500 mt-0.5">NyxShade Expedition Member Card</p>
                </div>
                
                <div className="py-6 space-y-4 text-sm">
                  <div className="flex items-center justify-between p-3 bg-slate-950 rounded-xl border border-slate-855">
                    <span className="text-slate-400">遊戲 ID (IGN)</span>
                    <span className="text-white text-base font-black select-text">{voterDetailModal.voter.ign}</span>
                  </div>
                  <div className="flex items-center justify-between p-3 bg-slate-950 rounded-xl border border-slate-855">
                    <span className="text-slate-400">當前職業</span>
                    <span className="text-indigo-400 font-black flex items-center space-x-1.5 select-none">
                      {renderJobIcon(voterDetailModal.voter.job, "w-4 h-4")}
                      <span>{voterDetailModal.voter.job}</span>
                    </span>
                  </div>
                  <div className="flex items-center justify-between p-3 bg-slate-950 rounded-xl border border-slate-855">
                    <span className="text-slate-400">角色等級</span>
                    <span className="text-white font-mono text-base font-bold select-none">Lv. {voterDetailModal.voter.level || '?'}</span>
                  </div>
                  <div className="p-3 bg-slate-950 rounded-xl border border-slate-855 space-y-2">
                    <span className="text-slate-400 block text-xs select-none">💬 角色詳細備註 / 狀態說明</span>
                    <div className="text-amber-300 text-sm leading-relaxed whitespace-pre-wrap bg-slate-900/60 p-3 rounded-lg border border-slate-800/80 min-h-[80px] font-sans font-medium">
                      {voterDetailModal.voter.memo || '本角色尚無填寫出團備註。'}
                    </div>
                  </div>
                </div>
                
                <button 
                  onClick={() => setVoterDetailModal({ isOpen: false, voter: null })} 
                  className="w-full bg-slate-800 hover:bg-slate-755 text-slate-200 font-bold py-2.5 rounded-xl text-xs transition active:scale-95 select-none"
                >
                  關閉視窗
                </button>
              </div>
            </div>
          )}

          {/* 全域通知 (Toast) */}
          {toast && (
            <div className="fixed bottom-4 right-4 z-50 animate-bounce">
              <div className={`px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-2 border ${
                toast.type === 'error' 
                  ? 'bg-rose-955/90 border-rose-800 text-rose-200' 
                  : 'bg-emerald-950/90 border-emerald-800 text-emerald-200'
              }`}>
                <span>{toast.type === 'error' ? '❌' : '✅'}</span>
                <span className="text-sm font-medium">{toast.message}</span>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
