                                    <div className="flex items-center justify-between gap-3 min-w-0">
                                      <div className="flex items-center space-x-2 min-w-0">
                                        <span className="font-mono font-bold text-slate-500 text-base">{idx + 1}.</span>
                                        <span className="font-extrabold text-slate-100 text-lg truncate" title={p.ign}>{p.ign}</span>
                                      </div>
                                      <span className="text-xs bg-slate-800/90 text-indigo-300 px-2.5 py-1 rounded-lg font-black border border-slate-700/50 shrink-0 select-none flex items-center space-x-1.5">
                                        {renderJobIcon(p.job, "w-4 h-4")}
                                        <span>{p.job}</span>
                                      </span>
                                    </div>

                                    {/* 中行：等級 */}
                                    <div className="text-sm text-slate-300 flex items-center justify-between">
                                      <span>等級：<strong className="text-white font-extrabold font-mono text-base">Lv. {p.level}</strong></span>
                                    </div>

                                    {/* 備註泡泡框 */}
                                    {p.memo && (
                                      <div className="bg-slate-900/90 border border-amber-500/10 text-amber-300 text-sm px-3.5 py-2.5 rounded-xl flex items-start space-x-2 leading-relaxed break-all">
                                        <span className="shrink-0 text-amber-400 mt-0.5">💬</span>
                                        <span className="font-medium">{p.memo}</span>
                                      </div>
                                    )}

                                    {/* 底行：微縮管理按鈕 (排班定位調整與剔除功能) 現在只提供給已登入管理員 */}
                                    {isCreator && (
                                      <div className="flex flex-col gap-2 mt-1.5 pt-3 border-t border-slate-800/80 select-none">
                                        <span className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">調整隊長/小隊：</span>
                                        <div className="flex flex-wrap gap-1.5 items-center justify-between">
                                          <div className="flex flex-wrap gap-1.5">
                                            {groupKey !== '1' && (
                                              <button 
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, p.job, '1')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-xs px-2.5 py-1.5 rounded-xl border border-slate-800 transition font-bold"
                                              >
                                                一隊
                                              </button>
                                            )}
                                            {groupKey !== '2' && boss?.maxPlayers > 6 && (
                                              <button 
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, p.job, '2')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-xs px-2.5 py-1.5 rounded-xl border border-slate-800 transition font-bold"
                                              >
                                                二隊
                                              </button>
                                            )}
                                            {groupKey !== '3' && boss?.maxPlayers > 12 && (
                                              <button 
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, p.job, '3')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-xs px-2.5 py-1.5 rounded-xl border border-slate-800 transition font-bold"
                                              >
                                                三隊
                                              </button>
                                            )}
                                            {groupKey !== 'reserve' && (
                                              <button 
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, p.job, 'reserve')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-xs px-2.5 py-1.5 rounded-xl border border-slate-800 transition font-bold"
                                              >
                                                候補
                                              </button>
                                            )}
                                          </div>
                                          <button 
                                            onClick={() => handleKickParticipant(activeRaid.id, p.userId, p.ign, p.job)} 
                                            className="bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900/50 text-rose-300 text-xs px-2.5 py-1.5 rounded-xl transition font-bold shrink-0"
                                          >
                                            剔除
                                          </button>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </div>
                      );
                    };

                    return (
                      <div className="mt-8">
                        <h3 className="text-xl font-black text-white mb-5">👥 遠征小隊分組名單</h3>
                        {/* 💡 使用網格自適應佈局，避免平板拉扁擠壓 */}
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                          {renderRosterGroup('遠征一隊 (Party 1)', party1, '1', 'bg-blue-500')}
                          {boss?.maxPlayers > 6 && renderRosterGroup('遠征二隊 (Party 2)', party2, '2', 'bg-emerald-500')}
                          {boss?.maxPlayers > 12 && renderRosterGroup('遠征三隊 (Party 3)', party3, '3', 'bg-violet-500')}
                          {renderRosterGroup('候補與預備名單 (Reserves)', reserves, 'reserve', 'bg-slate-500')}
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}
            </main>
          </div>

          {/* 底部隱私資訊 */}
          <footer className="max-w-6xl mx-auto w-full px-4 py-8 text-center text-xs text-slate-700 border-t border-slate-900 mt-10 font-semibold">
            <p>© 2026 NyxShade 遠征隊. All Rights Reserved.</p>
            <div className="mt-2 space-x-3">
              {isAdminLoggedIn ? (
                <>
                  <button onClick={() => setShowAdminConsole(true)} className="text-amber-500 hover:text-amber-400 hover:underline font-bold transition">🔑 開氣管理員控制台</button>
                  <span className="text-slate-800">•</span>
                  <button onClick={handleAdminLogout} className="text-rose-500 hover:text-rose-400 hover:underline transition">登出管理模式</button>
                </>
              ) : (
                <button onClick={() => setShowAdminLoginModal(true)} className="text-slate-600 hover:text-slate-500 hover:underline transition">🔑 系統管理者登入</button>
              )}
            </div>
          </footer>

          {/* ==========================================
              A. 發起揪團彈出視窗
             ========================================== */}
          {isCreating && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-lg shadow-2xl relative my-8">
                <button onClick={() => setIsCreating(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-white mb-2">🍁 發起全新遠征隊揪團</h3>
                <p className="text-xs text-slate-400 mb-6">點選下方日曆選擇出團時間，發起線上投票！</p>

                <form onSubmit={handleCreateRaid} className="space-y-4 text-sm font-semibold">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">選擇挑戰 Boss</label>
                    <div className="grid grid-cols-2 gap-2 max-h-[160px] overflow-y-auto pr-1">
                      {bosses.map((b) => (
                        <button
                          key={b.id}
                          type="button"
                          onClick={() => setNewRaid({ ...newRaid, bossId: b.id })}
                          className={`p-3 rounded-xl border text-left flex items-center space-x-2 transition ${newRaid.bossId === b.id ? 'bg-slate-800 border-indigo-500 shadow-md shadow-indigo-500/10' : 'bg-slate-950 border-slate-855 text-slate-300'}`}
                        >
                          <span className="text-2xl">{b.icon || '👹'}</span>
                          <div className="min-w-0 flex-1">
                            <p className="font-bold text-xs text-white truncate">{b.name.split(' (')[0]}</p>
                            <p className="text-[10px] text-slate-400 truncate">最多{b.maxPlayers}人</p>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">揪團主題 / 團隊公告</label>
                    <input
                      type="text"
                      required
                      value={newRaid.title}
                      onChange={(e) => setNewRaid({ ...newRaid, title: e.target.value })}
                      placeholder="例：週六晚上普通炎魔首發團 (招募聖火黑騎、主教)"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 focus:outline-none text-slate-100"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center justify-between">
                      <span>📅 候選日期與時間</span>
                      <button
                        type="button"
                        onClick={() => setNewRaid({ ...newRaid, proposedTimes: [...newRaid.proposedTimes, ''] })}
                        className="text-xs text-indigo-400 hover:underline font-bold"
                      >
                        + 新增時間段
                      </button>
                    </label>
                    <div className="space-y-2">
                      {newRaid.proposedTimes.map((time, index) => (
                        <div key={index} className="flex items-center space-x-2">
                          <input
                            type="datetime-local"
                            required
                            value={time}
                            onChange={(e) => {
                              const updated = [...newRaid.proposedTimes];
                              updated[index] = e.target.value;
                              setNewRaid({ ...newRaid, proposedTimes: updated });
                            }}
                            style={{ colorScheme: 'dark' }}
                            className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                          />
                          {newRaid.proposedTimes.length > 1 && (
                            <button
                              type="button"
                              onClick={() => {
                                const updated = newRaid.proposedTimes.filter((_, i) => i !== index);
                                setNewRaid({ ...newRaid, proposedTimes: updated });
                              }}
                              className="text-rose-500 px-2 font-bold"
                            >
                              ✕
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">詳細備註</label>
                    <textarea
                      value={newRaid.notes}
                      onChange={(e) => setNewRaid({ ...newRaid, notes: e.target.value })}
                      placeholder="打王要求，自備藥水等..."
                      rows={3}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none resize-none font-semibold"
                    />
                  </div>

                  <div className="flex space-x-3 pt-3">
                    <button type="button" onClick={() => setIsCreating(false)} className="flex-1 bg-slate-855 py-2.5 rounded-xl text-slate-300">取消</button>
                    <button type="submit" className="flex-1 bg-gradient-to-r from-orange-500 to-amber-500 py-2.5 rounded-xl text-white font-bold">確認建立</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ==========================================
              💡 F. 編輯遠征隊資訊與時間彈出視窗 (管理員專用)
             ========================================== */}
          {isEditingRaid && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm overflow-y-auto font-semibold">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-lg shadow-2xl relative my-8">
                <button onClick={() => setIsEditingRaid(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-amber-400 mb-2">✏️ 編輯遠征隊時間與設定</h3>
                <p className="text-xs text-slate-400 mb-6">修改本次揪團的王、公告主題、備註、或者新增/刪除候選出團時間。</p>

                <form onSubmit={handleSaveRaidEdit} className="space-y-4 text-sm">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">更換挑戰 Boss</label>
                    <div className="grid grid-cols-2 gap-2 max-h-[160px] overflow-y-auto pr-1">
                      {bosses.map((b) => (
                        <button
                          key={b.id}
                          type="button"
                          onClick={() => setEditRaidData({ ...editRaidData, bossId: b.id })}
                          className={`p-3 rounded-xl border text-left flex items-center space-x-2 transition ${editRaidData.bossId === b.id ? 'bg-slate-800 border-indigo-500 shadow-md shadow-indigo-500/10' : 'bg-slate-950 border-slate-855 text-slate-300'}`}
                        >
                          <span className="text-2xl">{b.icon || '👹'}</span>
                          <div className="min-w-0 flex-1">
                            <p className="font-bold text-xs text-white truncate">{b.name.split(' (')[0]}</p>
                            <p className="text-[10px] text-slate-400 truncate">最多{b.maxPlayers}人</p>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">修改主題 / 團隊公告</label>
                    <input
                      type="text"
                      required
                      value={editRaidData.title}
                      onChange={(e) => setEditRaidData({ ...editRaidData, title: e.target.value })}
                      placeholder="例如：週六晚上普通炎魔首發團"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 focus:outline-none text-slate-100"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center justify-between">
                      <span>📅 調整候選出團時間</span>
                      <button
                        type="button"
                        onClick={() => setEditRaidData({ ...editRaidData, proposedTimes: [...editRaidData.proposedTimes, ''] })}
                        className="text-xs text-indigo-400 hover:underline font-bold"
                      >
                        + 新增候選時間
                      </button>
                    </label>
                    <div className="space-y-2">
                      {editRaidData.proposedTimes.map((time, index) => (
                        <div key={index} className="flex items-center space-x-2">
                          <input
                            type="datetime-local"
                            required
                            value={time}
                            onChange={(e) => {
                              const updated = [...editRaidData.proposedTimes];
                              updated[index] = e.target.value;
                              setEditRaidData({ ...editRaidData, proposedTimes: updated });
                            }}
                            style={{ colorScheme: 'dark' }}
                            className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                          />
                          {editRaidData.proposedTimes.length > 1 && (
                            <button
                              type="button"
                              onClick={() => {
                                const updated = editRaidData.proposedTimes.filter((_, i) => i !== index);
                                setEditRaidData({ ...editRaidData, proposedTimes: updated });
                              }}
                              className="text-rose-500 px-2 font-bold"
                            >
                              ✕
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">修改詳細備註</label>
                    <textarea
                      value={editRaidData.notes}
                      onChange={(e) => setEditRaidData({ ...editRaidData, notes: e.target.value })}
                      placeholder="打王戰術要求，或藥水等裝備限制..."
                      rows={3}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none resize-none"
                    />
                  </div>

                  <div className="flex space-x-3 pt-3">
                    <button type="button" onClick={() => setIsEditingRaid(false)} className="flex-1 bg-slate-855 py-2.5 rounded-xl text-slate-300">取消</button>
                    <button type="submit" className="flex-1 bg-gradient-to-r from-orange-500 to-amber-500 py-2.5 rounded-xl text-white font-bold">確認儲存</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ==========================================
              B. 個人檔案編輯 (大字體 + 支援多身分角色管理 + 恢復密鑰金鑰備份)
             ========================================== */}
          {showProfileModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 w-full max-w-2xl shadow-2xl relative my-8">
                <button onClick={() => setShowProfileModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                
                <h3 className="text-2xl font-black text-white mb-2 flex items-center space-x-2">
                  <span>⚙️ 設定我的遊戲角色身分卡</span>
                </h3>
                <p className="text-sm text-slate-400 mb-4">
                  您可以在此登錄多個不同的遊戲角色身分（例如同時練主教與神偷）。在右上角下拉選單可以一鍵切換當前出團活躍角色。
                </p>

                {/* 🔑 密鑰帳號還原區 (Requirement 4 完美備份機制) */}
                <div className="p-4 bg-slate-950 border border-slate-800/80 rounded-2xl mb-6 space-y-3 font-semibold">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-2.5">
                    <div>
                      <span className="text-xs font-bold text-amber-400 uppercase block">🔑 我的身分識別密鑰（帳號金鑰）</span>
                      <p className="text-[11px] text-slate-500 mt-1 font-mono break-all select-all bg-black/30 p-1.5 rounded">{customUid}</p>
                    </div>
                    <button
                      type="button"
                      onClick={() => {
                        const textarea = document.createElement('textarea');
                        textarea.value = customUid;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        showToast("身分密鑰已複製！請妥善保存，重裝瀏覽器或在別的身機貼上即可恢復帳號。");
                      }}
                      className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg shrink-0 transition"
                    >
                      📋 複製密鑰
                    </button>
                  </div>
                  
                  <form onSubmit={handleRecoverAccount} className="border-t border-slate-800/80 pt-3 mt-3 flex items-center gap-2">
                    <input
                      type="text"
                      value={recoveryKeyInput}
                      onChange={(e) => setRecoveryKeyInput(e.target.value)}
                      placeholder="在此貼上您以前備份的 🔑 帳號金鑰"
                      className="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none placeholder-slate-600"
                    />
                    <button
                      type="submit"
                      className="bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold px-3 py-2 rounded-xl transition shrink-0"
                    >
                      還原帳號
                    </button>
                  </form>
                </div>

                <form onSubmit={saveProfile} className="space-y-6 text-sm">
                  
                  {/* 多角色動態列表區 */}
                  <div className="space-y-4 max-h-[280px] overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-slate-800 font-semibold">
                    {tempCharacters.map((char, index) => (
                      <div key={index} className="p-5 bg-slate-950 border border-slate-800 rounded-2xl space-y-4 relative">
                        <div className="flex items-center justify-between">
                          <label className="flex items-center space-x-2.5 cursor-pointer">
                            <input
                              type="radio"
                              name="activeCharacter"
                              checked={tempActiveIndex === index}
                              onChange={() => setTempActiveIndex(index)}
                              className="text-indigo-600 focus:ring-indigo-500 bg-slate-900 border-slate-800 h-5 w-5"
                            />
                            {/* 💡 角色切換面板新增相應職業大 icon 預覽 */}
                            <span className="flex items-center space-x-2">
                              {renderJobIcon(char.job, "w-5.5 h-5.5")}
                              <span className={`text-sm font-extrabold ${tempActiveIndex === index ? 'text-emerald-400' : 'text-slate-400'}`}>
                                {tempActiveIndex === index ? '🟢 設為當前出團主身分' : '設為當前出團身分'}
                              </span>
                            </span>
                          </label>

                          {tempCharacters.length > 1 && (
                            <button
                              type="button"
                              onClick={() => {
                                const updated = tempCharacters.filter((_, i) => i !== index);
                                setTempCharacters(updated);
                                if (tempActiveIndex >= updated.length) {
                                  setTempActiveIndex(0);
                                }
                              }}
                              className="text-rose-400 hover:text-rose-300 text-xs font-bold"
                            >
                              🗑️ 刪除此角色
                            </button>
                          )}
                        </div>

                        {/* 輸入欄位 (字體放大) */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                          <div>
                            <label className="block text-xs font-bold text-slate-400 mb-2">遊戲 ID (IGN)</label>
                            <input
                              type="text"
                              required
                              value={char.ign}
                              onChange={(e) => {
                                const updated = [...tempCharacters];
                                updated[index].ign = e.target.value;
                                setTempCharacters(updated);
                              }}
                              placeholder="例如：純粹"
                              className="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2.5 text-base text-slate-100 focus:outline-none"
                            />
                          </div>

                          <div>
                            <label className="block text-xs font-bold text-slate-400 mb-2">四轉職業</label>
                            <select
                              value={char.job}
                              onChange={(e) => {
                                const updated = [...tempCharacters];
                                updated[index].job = e.target.value;
                                setTempCharacters(updated);
                              }}
                              className="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2.5 text-base text-slate-100 focus:outline-none cursor-pointer"
                            >
                              {Object.entries(jobCategories).map(([cat, jobs]) => (
                                <optgroup key={cat} label={cat} className="bg-slate-900">
                                  {jobs.map(j => <option key={j} value={j}>{j}</option>)}
                                </optgroup>
                              ))}
                            </select>
                          </div>

                          <div>
                            <label className="block text-xs font-bold text-slate-400 mb-2">等級 (Lv.)</label>
                            <input
                              type="number"
                              required
                              min={30}
                              max={200}
                              value={char.level}
                              onChange={(e) => {
                                const updated = [...tempCharacters];
                                updated[index].level = Number(e.target.value);
                                setTempCharacters(updated);
                              }}
                              className="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2.5 text-base text-slate-100 focus:outline-none"
                            />
                          </div>
                        </div>

                        {/* 💡 每個角色各自專屬的「出團常規備註」（滿聖火、已洗血等。解決 Signup 拿掉後的報名備註痛點） */}
                        <div>
                          <label className="block text-xs font-bold text-slate-400 mb-2">💡 此角色的出團預設備註（錄取後會自動顯示在分組名單中！）</label>
                          <input
                            type="text"
                            value={char.memo || ''}
                            onChange={(e) => {
                              const updated = [...tempCharacters];
                              updated[index].memo = e.target.value;
                              setTempCharacters(updated);
                            }}
                            placeholder="例：已洗血、滿聖火、祈禱滿、天怒20"
                            className="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2 text-xs text-slate-200 focus:outline-none placeholder-slate-600"
                          />
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* ➕ 新增身分按鈕 */}
                  <button
                    type="button"
                    onClick={() => {
                      setTempCharacters([...tempCharacters, { ign: '', job: '主教', level: 120, memo: '' }]);
                    }}
                    className="w-full bg-slate-950 hover:bg-slate-900 text-indigo-400 font-bold py-3 rounded-2xl text-sm transition border border-dashed border-slate-800 flex items-center justify-center space-x-2"
                  >
                    <span>➕ 新增另一個遊戲身分角色卡</span>
                  </button>

                  <div className="flex space-x-4 pt-4 border-t border-slate-800">
                    <button 
                      type="button" 
                      onClick={() => setShowProfileModal(false)} 
                      className="flex-1 bg-slate-855 hover:bg-slate-750 py-3 rounded-xl text-sm font-bold text-slate-300"
                    >
                      取消
                    </button>
                    <button 
                      type="submit" 
                      disabled={isSavingProfile}
                      className="flex-1 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white font-extrabold py-3 rounded-xl text-sm shadow-lg"
                    >
                      {isSavingProfile ? "⏳ 儲存中，請稍候..." : "確認並儲存變更"}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ==========================================
              💡 自訂 Boss 管理彈出視窗 (Requirement 1 & 刪除功能 管理員專用)
             ========================================== */}
          {showBossManagerModal && isAdminLoggedIn && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm overflow-y-auto font-semibold">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 w-full max-w-2xl shadow-2xl relative my-8">
                <button onClick={() => setShowBossManagerModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                
                <h3 className="text-2xl font-black text-indigo-400 mb-2 flex items-center space-x-2">
                  <span>👾 自訂突襲 Boss 管理工具</span>
                </h3>
                <p className="text-xs text-slate-400 mb-6">為伺服器新增全新的突襲 Boss。現在無須手動輸入 ID，系統將自動隨機配發！</p>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                  {/* 左側：新增自訂 Boss 的表單 */}
                  <form onSubmit={handleCreateCustomBoss} className="space-y-4 text-sm border-r border-slate-800/80 pr-0 lg:pr-6">
                    <h4 className="font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center space-x-1.5">
                      <span>➕ 新建突襲王</span>
                    </h4>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">Boss 顯示名稱</label>
                      <input
                        type="text"
                        required
                        placeholder="例如: 混沌黑龍王 (Chaos Horntail)"
                        value={newBossData.name}
                        onChange={(e) => setNewBossData({ ...newBossData, name: e.target.value })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 focus:outline-none text-slate-100"
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      {/* 日曆選單風 Emoji 點選器 */}
                      <div className="col-span-2">
                        <label className="block text-xs font-bold text-slate-400 mb-2">選擇 Emoji 圖標 ({newBossData.icon})</label>
                        <div className="grid grid-cols-6 gap-1.5 p-2.5 bg-slate-950 border border-slate-855 rounded-xl">
                          {BOSS_EMOJIS_LIST.map((emoji) => (
                            <button
                              key={emoji}
                              type="button"
                              onClick={() => setNewBossData({ ...newBossData, icon: emoji })}
                              className={`text-xl p-1.5 rounded-lg hover:bg-slate-800 transition ${newBossData.icon === emoji ? 'bg-indigo-600/30 border border-indigo-500 scale-105' : 'border border-transparent'}`}
                            >
                              {emoji}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div className="col-span-2">
                        <label className="block text-xs font-bold text-slate-400 mb-1.5">最大出征人數</label>
                        <input
                          type="number"
                          required
                          placeholder="18"
                          value={newBossData.maxPlayers}
                          onChange={(e) => setNewBossData({ ...newBossData, maxPlayers: Number(e.target.value) || 18 })}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 focus:outline-none text-slate-100 font-mono"
                        />
                      </div>
                    </div>

                    {/* 精美漸層色板預設選擇器 */}
                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-2">選擇卡片漸層主題色</label>
                      <div className="grid grid-cols-3 gap-2">
                        {BOSS_GRADIENTS_PRESETS.map((preset) => (
                          <button
                            key={preset.value}
                            type="button"
                            onClick={() => setNewBossData({ ...newBossData, color: preset.value })}
                            className={`p-2 rounded-lg border text-[10px] font-black tracking-wide text-center transition bg-gradient-to-r ${preset.value} ${newBossData.color === preset.value ? 'border-amber-400 ring-2 ring-amber-400/30 scale-105' : 'border-slate-855 opacity-80 hover:opacity-100'}`}
                          >
                            <span className="text-white drop-shadow-sm">{preset.name}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">出征要求描述（選填）</label>
                      <input
                        type="text"
                        placeholder="例: 極高血量與走位挑戰..."
                        value={newBossData.desc}
                        onChange={(e) => setNewBossData({ ...newBossData, desc: e.target.value })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 focus:outline-none text-slate-100 text-xs"
                      />
                    </div>

                    <button 
                      type="submit" 
                      className="w-full bg-gradient-to-r from-indigo-500 to-violet-600 text-white font-extrabold py-2.5 rounded-xl text-xs shadow-md shadow-indigo-500/10 hover:brightness-110 active:scale-95 transition"
                    >
                      儲存至資料庫
                    </button>
                  </form>

                  {/* 右側：自訂 Boss 列表面板（支援刪除自訂 Boss 功能） */}
                  <div className="space-y-4">
                    <h4 className="font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center justify-between">
                      <span>🛠️ 目前自訂 Boss 列表</span>
                      <span className="text-xs bg-slate-800 text-slate-400 px-2.5 py-0.5 rounded-full font-bold">
                        {customBossesList.length} 個
                      </span>
                    </h4>
                    
                    {customBossesList.length === 0 ? (
                      <div className="py-20 text-center text-slate-500 text-xs italic bg-slate-950 border border-slate-855 rounded-2xl">
                        目前尚無任何自訂突襲 Boss 紀錄
                      </div>
                    ) : (
                      <div className="max-h-[350px] overflow-y-auto pr-2 space-y-2.5 scrollbar-thin scrollbar-thumb-slate-800">
                        {customBossesList.map((b) => (
                          <div key={b.id} className="flex items-center justify-between p-3.5 bg-slate-950 rounded-xl border border-slate-855 hover:border-slate-800 transition text-xs">
                            <div className="flex items-center space-x-3 truncate">
                              <span className="text-2xl shrink-0">{b.icon || '👹'}</span>
                              <div className="truncate min-w-0">
                                <p className="font-extrabold text-slate-100 truncate text-sm">{b.name}</p>
                                <p className="text-[10px] text-slate-500 mt-0.5 font-bold">人數限制: {b.maxPlayers}人</p>
                              </div>
                            </div>
                            <button
                              type="button"
                              onClick={() => handleDeleteBoss(b.id, b.name)}
                              className="bg-rose-950/30 hover:bg-rose-900/60 border border-rose-900/50 text-rose-300 font-extrabold px-3 py-1.5 rounded-lg text-[10px] transition shrink-0"
                            >
                              🗑️ 刪除
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                <div className="flex justify-end space-x-2 border-t border-slate-800 pt-3 mt-6 text-xs">
                  <button onClick={() => setShowBossManagerModal(false)} className="bg-slate-800 hover:bg-slate-750 px-5 py-2.5 rounded-xl text-slate-300 font-bold transition">關閉面板</button>
                </div>

              </div>
            </div>
          )}

          {/* ==========================================
              💡 G. 遠征隊四轉職業管理工具 (Requirement 2 & 刪除功能 管理員專用)
             ========================================== */}
          {showJobManagerModal && isAdminLoggedIn && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm overflow-y-auto font-semibold">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 w-full max-w-2xl shadow-2xl relative my-8">
                <button onClick={() => setShowJobManagerModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                
                <h3 className="text-2xl font-black text-teal-400 mb-2 flex items-center space-x-2">
                  <span>⚔️ 遠征隊四轉職業管理工具</span>
                </h3>
                <p className="text-xs text-slate-400 mb-6">因應遊戲未來的改版與新職業（如皇家騎士團），管理員可在下方的五大類職業中自由新增或刪除職業身分名稱。</p>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                  {/* 左側：新增職業表單 */}
                  <form onSubmit={handleAddJob} className="space-y-4 text-sm border-r border-slate-800/80 pr-0 lg:pr-6">
                    <h4 className="font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center space-x-1.5">
                      <span>➕ 新增職業身分</span>
                    </h4>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">選擇歸屬職業系</label>
                      <select
                        value={newJobData.category}
                        onChange={(e) => setNewJobData({ ...newJobData, category: e.target.value })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 focus:outline-none text-slate-100 cursor-pointer"
                      >
                        {Object.keys(jobCategories).map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">四轉職業名稱</label>
                      <input
                        type="text"
                        required
                        placeholder="例如: 破風使者"
                        value={newJobData.name}
                        onChange={(e) => setNewJobData({ ...newJobData, name: e.target.value })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 focus:outline-none text-slate-100"
                      />
                    </div>

                    <button 
                      type="submit" 
                      className="w-full bg-gradient-to-r from-teal-500 to-emerald-600 text-white font-extrabold py-2.5 rounded-xl text-xs shadow-md shadow-teal-500/10 hover:brightness-110 active:scale-95 transition"
                    >
                      確認儲存並新增職業
                    </button>
                  </form>

                  {/* 右側：現有職業列表與刪除管理 */}
                  <div className="space-y-4">
                    <h4 className="font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center justify-between">
                      <span>🛠️ 職業分類一覽與刪除</span>
                    </h4>
                    
                    <div className="max-h-[380px] overflow-y-auto pr-2 space-y-4 scrollbar-thin scrollbar-thumb-slate-800 text-xs">
                      {Object.entries(jobCategories).map(([cat, jobs]) => (
                        <div key={cat} className="space-y-1.5 p-3.5 bg-slate-950 rounded-xl border border-slate-855">
                          <div className="flex items-center space-x-2 border-b border-slate-800/60 pb-1 mb-2">
                            {renderJobIcon(jobs[0] || cat, "w-4 h-4")}
                            <span className="font-extrabold text-indigo-300 text-sm">{cat}</span>
                          </div>
                          <div className="flex flex-wrap gap-2">
                            {jobs && jobs.length > 0 ? (
                              jobs.map((job) => (
                                <span 
                                  key={job}
                                  className="inline-flex items-center bg-slate-900 border border-slate-800/80 rounded-lg px-2.5 py-1 text-slate-300 font-extrabold space-x-1.5"
                                >
                                  <span>{job}</span>
                                  <button 
                                    type="button" 
                                    onClick={() => handleDeleteJob(cat, job)}
                                    className="text-rose-500 hover:text-rose-400 font-black pl-1 select-none transition"
                                    title="刪除此職業"
                                  >
                                    ✕
                                  </button>
                                </span>
                              ))
                            ) : (
                              <span className="text-slate-600 italic">目前無子職業</span>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="flex justify-end space-x-2 border-t border-slate-800 pt-3 mt-6 text-xs">
                  <button onClick={() => setShowJobManagerModal(false)} className="bg-slate-800 hover:bg-slate-750 px-5 py-2.5 rounded-xl text-slate-300 font-bold transition">關閉職業管理</button>
                </div>

              </div>
            </div>
          )}

          {/* C. 管理者登入視窗 */}
          {showAdminLoginModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl relative">
                <button onClick={() => setShowAdminLoginModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-amber-400 mb-2">🔑 管理者後台登入</h3>
                <p className="text-xs text-slate-400 mb-5">請輸入管理者帳號與密碼以啟用名單編輯功能。</p>

                <form onSubmit={handleAdminLoginSubmit} className="space-y-4 text-sm font-semibold">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">管理員帳號</label>
                    <input
                      type="text"
                      required
                      value={adminUsername}
                      onChange={(e) => setAdminUsername(e.target.value)}
                      placeholder="請輸入帳號"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">管理者密碼</label>
                    <input
                      type="password"
                      required
                      value={adminPassword}
                      onChange={(e) => setAdminPassword(e.target.value)}
                      placeholder="請輸入密碼"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                    />
                  </div>

                  <div className="p-3 bg-amber-500/5 rounded-xl border border-amber-500/10 text-[10px] text-amber-300 leading-relaxed font-bold">
                    <span className="font-bold">💡 貼心提醒：</span><br />
                    本系統目前預設管理帳號為 <code className="bg-slate-950 px-1 py-0.5 rounded font-mono">admin</code>，密碼為 <code className="bg-slate-950 px-1 py-0.5 rounded font-mono">***</code>.
                  </div>

                  <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-2.5 rounded-xl transition">核對密碼並登入</button>
                </form>
              </div>
            </div>
          )}

          {/* D. 管理者控制台面板 */}
          {showAdminConsole && isAdminLoggedIn && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm overflow-y-auto">
              <div className="bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-2xl shadow-2xl relative my-8">
                <button onClick={() => setShowAdminConsole(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                
                <div className="border-b border-slate-800 pb-3 mb-4">
                  <h3 className="text-xl font-extrabold text-amber-400 flex items-center space-x-2">
                    <span>🔑 NyxShade 遠征隊管理者控制台</span>
                  </h3>
                  <p className="text-xs text-slate-400 mt-1">您好管理員，您可以在此管理全體註冊成員的名單或更動系統底層設定。</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  
                  <div className="space-y-4">
                    <div className="flex items-center justify-between">
                      <h4 className="font-bold text-sm text-slate-200 flex items-center space-x-1.5">
                        <span>👥 成員角色卡管理</span>
                        <span className="bg-slate-800 text-slate-400 text-[10px] px-2 py-0.5 rounded-full font-normal">
                          {registeredUsers.length} 人已登錄
                        </span>
                      </h4>
                    </div>

                    <input
                      type="text"
                      value={searchUserQuery}
                      onChange={(e) => setSearchUserQuery(e.target.value)}
                      placeholder="🔍 搜尋玩家 IGN 或職業..."
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-1.5 text-xs text-slate-200 focus:outline-none"
                    />

                    <div className="max-h-[300px] overflow-y-auto pr-2 space-y-3 scrollbar-thin scrollbar-thumb-slate-800 font-semibold">
                      {(() => {
                        const filtered = registeredUsers.filter(u => {
                          const chars = u.characters || [{ ign: u.ign, job: u.job, level: u.level }];
                          return chars.some(c => 
                            (c.ign || '').toLowerCase().includes(searchUserQuery.toLowerCase()) ||
                            (c.job || '').toLowerCase().includes(searchUserQuery.toLowerCase())
                          );
                        });

                        if (filtered.length === 0) {
                          return (
                            <div className="text-center text-slate-600 text-xs italic py-10">
                              沒有找到符合搜尋條件的玩家角色卡
                            </div>
                          );
                        }

                        return filtered.map(u => {
                          const chars = u.characters || [{ ign: u.ign, job: u.job, level: u.level }];
                          const activeChar = chars[u.activeCharacterIndex || 0] || chars[0] || { ign: '未知', job: '未知', level: 120 };
                          return (
                            <div key={u.id} className="bg-slate-950/85 p-3.5 rounded-xl border border-slate-800 space-y-2">
                              <div className="flex items-center justify-between">
                                <span className="font-bold text-slate-200 text-sm">👤 用戶身分 ({chars.length} 個角色)</span>
                                <button
                                  onClick={() => handleDeleteUserProfile(u.userId || u.id, activeChar.ign)}
                                  className="bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900 text-rose-300 font-bold px-2.5 py-1.5 rounded-lg text-xs transition animate-pulse"
                                >
                                  🗑️ 刪除全部角色卡
                                </button>
                              </div>
                              <div className="space-y-1 pl-2 border-l border-slate-800">
                                {chars.map((c, cIdx) => (
                                  <div key={cIdx} className="flex items-center justify-between text-xs py-1">
                                    <span className={`font-semibold ${cIdx === (u.activeCharacterIndex || 0) ? 'text-emerald-400' : 'text-slate-400'} flex items-center space-x-1.5`}>
                                      <span>•</span>
                                      {renderJobIcon(c.job, "w-4 h-4")}
                                      <span>{c.ign} ({c.job} Lv.{c.level}) {cIdx === (u.activeCharacterIndex || 0) && '🌟'}</span>
                                    </span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        });
                      })()}
                    </div>
                  </div>

                  <div className="space-y-4">
                    <h4 className="font-bold text-sm text-slate-200">⚙️ 資料庫與連線維護</h4>
                    
                    <div className="p-4 bg-slate-950/60 rounded-xl border border-slate-855 space-y-3 font-semibold">
                      <p className="text-xs text-slate-400 leading-relaxed">
                        <span className="font-bold text-amber-500">⚠ 注意事項：</span><br />
                        如果您不小心更動或貼錯了 Firebase 的 Config 造成網頁連線死當，或之後遠征隊更換了全新的專案資料庫，您可以按下下方按鈕將其抹除。
                      </p>
                      
                      <button
                        onClick={handleResetConfig}
                        className="w-full bg-rose-950 hover:bg-rose-900 border border-rose-800 text-rose-300 font-bold py-2 rounded-xl text-xs transition active:scale-95 animate-pulse"
                      >
                        ⚠️ 移除並重置本網頁 Firebase 金鑰
                      </button>
                    </div>

                    <div className="p-3 bg-slate-950/40 border border-slate-855 rounded-xl text-[10px] text-slate-500 leading-relaxed font-bold">
                      <p className="font-bold text-slate-400">💡 遠征隊安全管理提示：</p>
                      <p className="mt-1">請確認您的 Firebase Firestore Database 安全性規則 (Rules) 為寬鬆測試模式，例如：</p>
                      <pre className="bg-slate-950 p-2 rounded mt-1 text-slate-400 font-mono text-[9px] overflow-x-auto">
{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if true;
    }
  }
}`}
                      </pre>
                    </div>
                  </div>

                </div>

                <div className="flex justify-end space-x-2 border-t border-slate-800 pt-3 mt-4 text-xs font-bold">
                  <button onClick={() => setShowAdminConsole(false)} className="bg-slate-800 hover:bg-slate-750 px-4 py-2 rounded-xl text-slate-300">關閉後台</button>
                </div>

              </div>
            </div>
          )}

          {/* E. 通用 React 自訂確認對話視窗 */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl font-semibold">
                <h3 className="text-lg font-bold text-rose-400">⚠️ 系統確認</h3>
                <p className="text-sm font-semibold text-slate-100 mt-2">{confirmModal.title}</p>
                <p className="text-xs text-slate-400 mt-1.5 leading-relaxed">{confirmModal.message}</p>
                <div className="flex space-x-3 mt-6">
                  <button onClick={() => setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null })} className="flex-1 bg-slate-855 py-2 rounded-xl text-xs hover:bg-slate-800 transition">取消</button>
                  <button onClick={confirmModal.onConfirm} className="flex-1 bg-rose-600 py-2 rounded-xl text-xs text-white font-bold hover:bg-rose-700 transition active:scale-95">確認執行</button>
                </div>
              </div>
            </div>
          )}

          {/* 全域通知 (Toast) */}
          {toast && (
            <div className="fixed bottom-4 right-4 z-50 animate-bounce">
              <div className={`px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-2 border ${
                toast.type === 'error' 
                  ? 'bg-rose-950/90 border-rose-800 text-rose-200' 
                  : 'bg-emerald-950/90 border-emerald-800 text-emerald-200'
              }`}>
                <span>{toast.type === 'error' ? '❌' : '✅'}</span>
                <span className="text-sm font-medium">{toast.message}</span>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
