    // 時間格式化輔助函數
    const formatDateTime = (dateTimeStr) => {
      if (!dateTimeStr) return '';
      if (!dateTimeStr.includes('T')) return dateTimeStr;
      try {
        const date = new Date(dateTimeStr);
        if (isNaN(date.getTime())) return dateTimeStr;
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        return `${year}-${month}-${day} (${weekdays[date.getDay()]}) ${hours}:${minutes}`;
      } catch (e) {
        return dateTimeStr;
      }
    };

    // 寬鬆 of Firebase Config 提取解析器
    function parseFirebaseConfig(text) {
      try {
        return JSON.parse(text);
      } catch (e) {
        const config = {};
        const keys = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
        keys.forEach(key => {
          const match = text.match(new RegExp(`['"]?${key}['"]?\\s*:\\s*['"]([^'"]+)['"]`));
          if (match) config[key] = match[1];
        });
        if (config.apiKey && config.projectId) return config;
        throw new Error("無法解析，請確認複製的內容是否包含 apiKey 與 projectId。");
      }
    }

                <path d="M9 10H15" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" />
                <path d="M6 13C6 17 9 19 12 19C15 19 18 17 18 13" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" />
                <path d="M5 14L6 12L7 14M17 14L18 12L19 14" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            );
          default:
            return (
              <svg className={`${sizeClass} inline-block shrink-0`} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#6b7280" />
                <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" stroke="#9ca3af" strokeWidth="1.5" fill="none" />
                <circle cx="12" cy="12" r="4" stroke="#ffffff" strokeWidth="2" />
              </svg>
            );
        }
      };

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 5000); 
      };

      const triggerConfirm = (title, message, onConfirmCallback) => {
        setConfirmModal({
          isOpen: true,
          title,
          message,
          onConfirm: () => {
            onConfirmCallback();
            setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null });
          }
        });
      };

      // 儲存手動輸入的 Firebase 金鑰
      const handleSaveConfig = (e) => {
        e.preventDefault();
        try {
          const parsed = parseFirebaseConfig(configInput);
          localStorage.setItem('artale_firebase_config', JSON.stringify(parsed));
          setDbConfig(parsed);
          showToast("資料庫設定成功！網頁即將自動連線。");
        } catch (err) {
          alert("金鑰解析失敗，請確認是否完整複製了 firebaseConfig 的內容！");
        }
      };

      // 清除金鑰設定
      const handleResetConfig = () => {
        triggerConfirm(
          "確定要重置資料庫設定嗎？",
          "重置後網頁將會重新整理，並需要再次輸入 Firebase 金鑰才能繼續使用組隊系統。",
          () => {
            localStorage.removeItem('artale_firebase_config');
            localStorage.removeItem('nyxshade_custom_uid');
            localStorage.removeItem('discord_user_profile');
            window.location.reload();
          }
        );
      };

      // 點擊小助手標題觸發隱藏重設
      const handleSecretClick = () => {
        setHiddenResetClicks(prev => {
          const next = prev + 1;
          if (next >= 5) {
            handleResetConfig();
            return 0;
          }
          return next;
        });
      };

      // 管理者登入邏輯
      const handleAdminLoginSubmit = (e) => {
        e.preventDefault();
        const DEFAULT_ADMIN_USER = "admin";
        const DEFAULT_ADMIN_PASS = "nyxshade";

        if (adminUsername.toLowerCase() === DEFAULT_ADMIN_USER && adminPassword === DEFAULT_ADMIN_PASS) {
          setIsAdminLoggedIn(true);
          sessionStorage.setItem('artale_is_admin', 'true');
          setShowAdminLoginModal(false);
          setAdminUsername('');
          setAdminPassword('');
          showToast("🔑 管理者權限驗證成功！已啟用後台控制。");
          setShowAdminConsole(true);
        } else {
          showToast("帳號或密碼錯誤，請重新確認！", "error");
        }
      };

      const handleAdminLogout = () => {
        setIsAdminLoggedIn(false);
        sessionStorage.removeItem('artale_is_admin');
        setShowAdminConsole(false);
        showToast("已成功登出管理者模式。");
      };

      // 初始化 Firebase
      useEffect(() => {
        if (!dbConfig) {
          setDbStatus('no-config');
          return;
        }
        try {
          let app;
          if (firebase.apps.length === 0) {
            app = firebase.initializeApp(dbConfig);
          } else {
            app = firebase.app();
          }
          const firestoreDb = firebase.firestore(app);
          const firebaseAuth = firebase.auth(app);
          
          setDb(firestoreDb);
          setAuth(firebaseAuth);
          setDbStatus('connecting');
        } catch (err) {
          console.error(err);
          setDbStatus('error');
          alert("Firebase 初始化失敗，可能是您的金鑰有誤，請點擊底部的管理登入重置。");
        }
      }, [dbConfig]);

      // 身份驗證與登入監聽
      useEffect(() => {
        if (!auth || !db) return;

        const initAuth = async () => {
          try {
            if (window.__initial_auth_token) {
              await auth.signInWithCustomToken(window.__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Firebase 登入失敗：", error);
            setDbStatus('error');
            showToast(`登入失敗: ${error.message} (請確認 Firebase 是否已開啟「匿名登入」功能)`, "error");
          }
        };

        initAuth();
        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            setDbStatus('connected');
            if (!localStorage.getItem('nyxshade_custom_uid')) {
              localStorage.setItem('nyxshade_custom_uid', currentUser.uid);
              setCustomUid(currentUser.uid);
            }
          }
        });
        return () => unsubscribe();
      }, [auth, db]);

      // 🛡️ 實時拉取並載入 Discord OAuth 系統整合配置 👑
      useEffect(() => {
        if (!db || !user) return;
        const configRef = db.doc(`artifacts/${appId}/public/data/discord/config`);
        const unsubscribe = configRef.onSnapshot((doc) => {
          if (doc.exists) {
            setDiscordConfig(doc.data());
          } else {
            // 初始化預設配置
            const defaultConf = {
              clientId: '1508031863263068190',
              redirectUri: 'http://127.0.0.1:5500/',
              mode: 'implicit',
              apiEndpoint: '',
              webhookUrl: ''
            };
            configRef.set(defaultConf).catch(e => console.error(e));
            setDiscordConfig(defaultConf);
          }
        }, (err) => console.error("無法同步 Discord 整合配置資訊：", err));
        return () => unsubscribe();
      }, [db, user]);

      // 🛡️ 智慧攔截偵測：處理 Discord 回傳 Token 或 Code 👑
      useEffect(() => {
        if (!auth || !discordConfig) return;

        const checkDiscordRedirect = async () => {
          // A. 處理純前端 Implicit 驗證流程 (Hash 攜帶 access_token)
          const hash = window.location.hash;
          if (hash && hash.includes("access_token=")) {
            setDbStatus('connecting');
            const params = new URLSearchParams(hash.substring(1));
            const accessToken = params.get('access_token');
            if (accessToken) {
              showToast("🔄 正在向 Discord 伺服器申請身分證明...", "info");
              try {
                const response = await fetch('https://discord.com/api/users/@me', {
                  headers: { Authorization: `Bearer ${accessToken}` }
                });
                if (!response.ok) throw new Error("Discord 憑證無效");
                const discordData = await response.json();
                
                const discordId = discordData.id;
                const username = discordData.global_name || discordData.username;
                const avatar = discordData.avatar 
                  ? `https://cdn.discordapp.com/avatars/${discordId}/${discordData.avatar}.png`
                  : `https://cdn.discordapp.com/embed/avatars/${Number(discordId) % 5}.png`;

                const boundProfile = { id: discordId, username, avatar };
                
                // 變更登入 UID 為 Discord 專屬固定 UID，並儲存 Profile
                localStorage.setItem('nyxshade_custom_uid', discordId);
                localStorage.setItem('discord_user_profile', JSON.stringify(boundProfile));
                
                setCustomUid(discordId);
                setDiscordUser(boundProfile);
                showToast(`🎉 Discord 驗證並綁定成功：${username}！`);
                
                // 清空網址 Hash 並重載
                window.location.hash = "";
                setTimeout(() => window.location.reload(), 1200);
              } catch (err) {
                console.error(err);
                showToast("Discord 驗證登入失敗，請重新嘗試", "error");
              }
            }
          }

          // B. 處理進階後端 Code 驗證流程 (Query 攜帶 code)
          const urlParams = new URLSearchParams(window.location.search);
          const code = urlParams.get('code');
          if (code && discordConfig.mode === 'code' && discordConfig.apiEndpoint) {
            setDbStatus('connecting');
            showToast("🔄 正在透過後端伺服器交換安全憑證...", "info");
            try {
              const response = await fetch(`${discordConfig.apiEndpoint}?code=${code}`);
              const data = await response.json();
              if (data.firebaseToken) {
                await auth.signInWithCustomToken(data.firebaseToken);
              }
              const boundProfile = {
                id: data.discordId,
                username: data.username,
                avatar: data.avatar
              };
              localStorage.setItem('nyxshade_custom_uid', data.discordId);
              localStorage.setItem('discord_user_profile', JSON.stringify(boundProfile));
              
              setCustomUid(data.discordId);
              setDiscordUser(boundProfile);
              showToast(`🎉 後端 Discord 驗證成功：${data.username}`);
              
              // 移除 code 保持網址清爽
              window.history.replaceState({}, document.title, window.location.pathname);
              setTimeout(() => window.location.reload(), 1200);
            } catch (err) {
              console.error(err);
              showToast("後端金鑰交換失敗，請確認 API 線上狀態", "error");
            }
          }
        };

        checkDiscordRedirect();
      }, [auth, discordConfig]);

      // 💡 產生對應模式的 Discord OAuth2 授權網址 👑
      const getDiscordLoginUrl = () => {
        if (!discordConfig || !discordConfig.clientId) return '#';
        const clientId = discordConfig.clientId;
        const rUri = discordConfig.redirectUri || (window.location.origin + window.location.pathname);
        if (discordConfig.mode === 'code') {
          return `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(rUri)}&response_type=code&scope=identify`;
        } else {
          return `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(rUri)}&response_type=token&scope=identify`;
        }
      };

      // 💡 解除 Discord 帳號綁定 👑
      const handleDisconnectDiscord = () => {
        triggerConfirm(
          "確定要解除與 Discord 的帳號連結嗎？",
          "解除後，系統將會回復為匿名本地身分，您需要重新點選連結才能同步之前的角色卡。",
          () => {
            localStorage.removeItem('discord_user_profile');
            // 回復成 Anonymous UID
            const anonUid = auth?.currentUser?.uid || crypto.randomUUID();
            localStorage.setItem('nyxshade_custom_uid', anonUid);
            setCustomUid(anonUid);
            setDiscordUser(null);
            showToast("已成功解除 Discord 連結狀態。");
            setTimeout(() => window.location.reload(), 1000);
          }
        );
      };

      // 💡 實時監聽自訂 Boss 設置
      useEffect(() => {
        if (!db) return;
        const bossesCollection = db.collection(`artifacts/${appId}/public/data/bosses`);
        const unsubscribe = bossesCollection.onSnapshot((snapshot) => {
          const customList = [];
          snapshot.forEach((doc) => {
            customList.push({ id: doc.id, ...doc.data() });
          });
          const merged = [...DEFAULT_BOSS_LIST];
          customList.forEach(cb => {
            const idx = merged.findIndex(b => b.id === cb.id);
            if (idx > -1) {
              merged[idx] = cb;
            } else {
              merged.push(cb);
            }
          });
          setBosses(merged);
        }, (err) => console.error("自訂 Boss 同步失敗", err));

        return () => unsubscribe();
      }, [db]);

      // 💡 實時監聽自訂職業配置
      useEffect(() => {
        if (!db) return;
        const jobsRef = db.doc(`artifacts/${appId}/public/data/jobs/config`);
        const unsubscribe = jobsRef.onSnapshot((doc) => {
          if (doc.exists) {
            const dbJobs = doc.data();
            const isNested = Object.values(dbJobs).every(val => val && typeof val === 'object' && !Array.isArray(val));
            if (!isNested) {
              jobsRef.set(DEFAULT_JOB_CATEGORIES)
                .then(() => setJobCategories(DEFAULT_JOB_CATEGORIES))
                .catch(err => console.error("自動升級分層職業配置失敗", err));
            } else {
              setJobCategories(dbJobs);
            }
          } else {
            jobsRef.set(DEFAULT_JOB_CATEGORIES).catch(err => console.error("資料庫職業配置初始化失敗", err));
            setJobCategories(DEFAULT_JOB_CATEGORIES);
          }
        }, (err) => {
          console.error("實時拉取自訂職業失敗", err);
        });

        return () => unsubscribe();
      }, [db]);

      // 💡 實時監聽「即時遠征討論串」
      useEffect(() => {
        if (!db || !currentRaidId) {
          setChatMessages([]);
          return;
        }
        const messagesCol = db.collection(`artifacts/${appId}/public/data/raid_messages_${currentRaidId}`);
        
        const unsubscribe = messagesCol.onSnapshot((snapshot) => {
          const msgs = [];
          snapshot.forEach((doc) => {
            msgs.push({ id: doc.id, ...doc.data() });
          });
          // 依時間排序
          msgs.sort((a, b) => {
            const tA = a.createdAt?.seconds ? a.createdAt.seconds * 1000 : (a.timestamp || 0);
            const tB = b.createdAt?.seconds ? b.createdAt.seconds * 1000 : (b.timestamp || 0);
            return tA - tB;
          });
          setChatMessages(msgs);
        }, (err) => {
          console.error("即時討論讀取失敗", err);
        });
        return () => unsubscribe();
      }, [db, currentRaidId]);

      // 💡 討論已讀邏輯
      useEffect(() => {
        if (!currentRaidId) return;

        if (isChatOpen) {
          const lastTime = lastReadTimes[currentRaidId] || Date.now();
          setChatOpenedLastReadTime(lastTime);

          setLastReadTimes(prev => {
            const next = { ...prev, [currentRaidId]: Date.now() };
            localStorage.setItem('raid_last_read_times', JSON.stringify(next));
            return next;
          });
        }
      }, [isChatOpen, currentRaidId]);

      // 💡 聊天視窗開著時，自動隨時已讀新訊息
      useEffect(() => {
        if (isChatOpen && currentRaidId && chatMessages.length > 0) {
          const latestMsg = chatMessages[chatMessages.length - 1];
          const latestTime = latestMsg.timestamp || (latestMsg.createdAt?.seconds ? latestMsg.createdAt.seconds * 1000 : Date.now());
          
          setLastReadTimes(prev => {
            const currentSaved = prev[currentRaidId] || 0;
            if (latestTime > currentSaved) {
              const next = { ...prev, [currentRaidId]: latestTime + 1 };
              localStorage.setItem('raid_last_read_times', JSON.stringify(next));
              return next;
            }
            return prev;
          });
        }
      }, [chatMessages.length, isChatOpen, currentRaidId]);

      // 💡 計算未讀取的訊息行數
      const getUnreadCount = (raidId) => {
        if (!raidId) return 0;
        if (currentRaidId === raidId && isChatOpen) return 0;

        const lastRead = lastReadTimes[raidId] || 0;
        return chatMessages.filter(msg => {
          const msgTime = msg.timestamp || (msg.createdAt?.seconds ? msg.createdAt.seconds * 1000 : 0);
          return msgTime > lastRead;
        }).length;
      };

      // 💡 當進入或切換遠征隊時，預設自動打開懸浮聊天窗
      useEffect(() => {
        if (currentRaidId) {
          setIsChatOpen(true);
        } else {
          setIsChatOpen(false);
          setIsChatMaximized(false);
        }
      }, [currentRaidId]);

      // 💡 僅滾動討論區內部容器
      useEffect(() => {
        if (chatContainerRef.current) {
          chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
        }
      }, [chatMessages, isChatOpen]);

      // 💡 個人檔案載入與後台靜態同步 (綁定 Discord 資訊 👑)
      useEffect(() => {
        if (!db || !customUid) return;

        const fetchProfile = async () => {
          try {
            const profileRef = db.doc(`artifacts/${appId}/users/${customUid}/profile/info`);
            const docSnap = await profileRef.get();
            if (docSnap.exists) {
              const data = docSnap.data();
              let loadedProfile = {};
              
              if (data.characters && data.characters.length > 0) {
                loadedProfile = {
                  activeCharacterIndex: Number(data.activeCharacterIndex) || 0,
                  characters: data.characters,
                  discord: data.discord || discordUser || null
                };
              } else {
                loadedProfile = {
                  activeCharacterIndex: 0,
                  characters: [{
                    ign: data.ign || '',
                    job: data.job || '主教',
                    level: Number(data.level) || 120,
                    memo: ''
                  }],
                  discord: data.discord || discordUser || null
                };
              }
              setProfile(loadedProfile);

              db.doc(`artifacts/${appId}/public/data/registered_users/${customUid}`).set({
                userId: customUid,
                ...loadedProfile,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              }).catch(e => console.error("背景成員名冊同步失敗：", e));

            } else {
              setShowProfileModal(true);
            }
            setProfileLoaded(true);
          } catch (err) {
            console.error("載入個人檔案失敗：", err);
          }
        };
        fetchProfile();
      }, [db, customUid, discordUser]);

      // 監聽所有已註冊隊員名冊 (僅限管理者模式加載)
      useEffect(() => {
        if (!db || !isAdminLoggedIn) return;

        const regUsersCollection = db.collection(`artifacts/${appId}/public/data/registered_users`);
        const unsubscribe = regUsersCollection.onSnapshot((snapshot) => {
          const usersList = [];
          snapshot.forEach((doc) => {
            usersList.push({ id: doc.id, ...doc.data() });
          });
          setRegisteredUsers(usersList);
        }, (error) => {
          console.error("讀取成員清單發生錯誤：", error);
        });

        return () => unsubscribe();
      }, [db, isAdminLoggedIn]);

      // 初始化角色卡編輯對話框暫存狀態
      useEffect(() => {
        if (showProfileModal) {
          if (profile.characters && profile.characters.length > 0) {
            setTempCharacters(JSON.parse(JSON.stringify(profile.characters)));
            setTempActiveIndex(profile.activeCharacterIndex);
          } else {
            setTempCharacters([{ ign: '', job: '主教', level: 120, memo: '' }]);
            setTempActiveIndex(0);
          }
        }
      }, [showProfileModal, profile]);

      // 儲存角色檔案 (附加 Discord 身分資訊 👑)
      const saveProfile = async (e) => {
        e.preventDefault();
        if (!db || !customUid) {
          showToast("尚未連線至資料庫，請稍後再試！", "error");
          return;
        }

        // 💡 終極防線：必須登入 Discord 才能儲存角色卡
        if (!discordUser) {
          showToast("⚠️ 請先點擊上方按鈕連結 Discord 帳號才能儲存角色卡！", "error");
          return;
        }

        const hasEmptyIgn = tempCharacters.some(c => !c.ign.trim());
        if (hasEmptyIgn) {
          showToast("所有角色的 遊戲 ID (IGN) 均不可為空！", "error");
          return;
        }

        setIsSavingProfile(true);
        try {
          const profileData = {
            activeCharacterIndex: tempActiveIndex,
            characters: tempCharacters.map(c => ({
              ign: c.ign.trim(),
              job: c.job,
              level: Number(c.level) || 120,
              memo: (c.memo || '').trim()
            })),
            discord: discordUser || null, // ✨ 綁定儲存 Discord 資訊
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          const profileRef = db.doc(`artifacts/${appId}/users/${customUid}/profile/info`);
          await profileRef.set(profileData);

          const publicRef = db.doc(`artifacts/${appId}/public/data/registered_users/${customUid}`);
          await publicRef.set({
            userId: customUid,
            ...profileData
          });

          setProfile(profileData);
          setShowProfileModal(false);
          showToast("角色身分檔案更新成功！");
        } catch (err) {
          console.error("儲存個人檔案發生錯誤：", err);
          showToast(`儲存失敗: ${err.message}`, "error");
        } finally {
          setIsSavingProfile(false);
        }
      };

      // 管理者專用：徹底刪除某隊員的角色資料卡
      const handleDeleteUserProfile = (targetUserId, targetIgn) => {
        triggerConfirm(
          `確定要刪除該玩家的所有身分角色卡嗎？`,
          "這將會徹底抹除該隊員在資料庫中的所有角色紀錄。此操作不可逆！",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/registered_users/${targetUserId}`).delete();
              await db.doc(`artifacts/${appId}/users/${targetUserId}/profile/info`).delete();
              showToast(`已成功刪除該使用者的所有角色檔案！`);
            } catch (err) {
              console.error(err);
              showToast(`刪除失敗: ${err.message}`, "error");
            }
          }
        );
      };

      // 實時監聽組隊列表
      useEffect(() => {
        if (!db) return;

        const raidsCollection = db.collection(`artifacts/${appId}/public/data/raids`);
        const unsubscribe = raidsCollection.onSnapshot((snapshot) => {
          const raidsData = [];
          snapshot.forEach((doc) => {
            raidsData.push({ id: doc.id, ...doc.data() });
          });
          raidsData.sort((a, b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return bTime - aTime;
          });
          setRaids(raidsData);
        }, (error) => {
          console.error("即時同步發生錯誤：", error);
        });
        return () => unsubscribe();
      }, [db]);

      // 取得當前使用的出團角色
      const activeCharacter = profile.characters?.[profile.activeCharacterIndex] || profile.characters?.[0] || { ign: '', job: '主教', level: 120, memo: '' };

      // 發起新團
      const handleCreateRaid = async (e) => {
        e.preventDefault();
        if (!db) return;
        if (!activeCharacter.ign) {
          showToast("請先設定您的遊戲 ID！", "error");
          setShowProfileModal(true);
          return;
        }

        const filteredTimes = newRaid.mode === 'interest' 
          ? [] 
          : newRaid.proposedTimes.filter(t => t.trim() !== '');

        if (newRaid.mode !== 'interest' && filteredTimes.length === 0) {
          showToast("請至少填寫一個候選時間！", "error");
          return;

          // 篩選此時段投可以(yes)或也許(maybe)成員並組成 ping 字串
          const timeVotes = raid.votes || [];
          const matchedVoters = timeVotes.filter(v => v.votes?.[timeIndex] === 'yes' || v.votes?.[timeIndex] === 'maybe');
          const pings = matchedVoters
            .filter(v => v.discord && v.discord.id)
            .map(v => `<@${v.discord.id}>`)
            .join(" ");

          content = `🔔 **遠征出團時間已由團長確定！**\n感謝以下隊員的配合與參與：${pings ? pings : '（無 Discord 綁定成員）'}`;
          embeds = [{
            title: `⚔️ 【${raidBoss?.name.split(' (')[0]}】出征時間確定`,
            description: `📌 **主題**：${raid.title}\n📅 **確定時間**：**${timeStr}** 👑\n📝 **備註/戰術要求**：${raid.notes || "無"}`,
            color: 16750848, // Amber Color
            footer: { text: "NyxShade 遠征隊組隊系統" },
            timestamp: new Date().toISOString()
          }];
        } else if (actionType === 'post_roster') {
          const participants = raid.participants || [];
          const party1 = participants.filter(p => p.party === '1');
          const party2 = participants.filter(p => p.party === '2');
          const party3 = participants.filter(p => p.party === '3');
          const reserves = participants.filter(p => p.party === 'reserve' || !p.party);
          const partyCount = raid.partyCount || 1;

          // 錄取名單中所有綁定 Discord 的成員進行 ping
          const enrolledPings = participants
            .filter(p => p.discord && p.discord.id)
            .map(p => `<@${p.discord.id}>`)
            .join(" ");

          content = `📋 **遠征隊最新排班名單公佈！**\n請被錄取的隊員準時出席：${enrolledPings ? enrolledPings : '（無 Discord 綁定成員）'}`;

          let fields = [];
          const formatPartyField = (list, name) => {
            if (list.length === 0) return { name, value: "*（空位待分配）*", inline: true };
            const val = list.map((p, idx) => `${idx + 1}. [${p.job}] **${p.ign}** (Lv.${p.level})${p.memo ? ` - *${p.memo}*` : ''}`).join("\n");
            return { name, value: val, inline: true };
          };

          fields.push(formatPartyField(party1, "🔵 遠征一隊"));
          if (partyCount >= 2) fields.push(formatPartyField(party2, "🟢 遠征二隊"));
          if (partyCount >= 3) fields.push(formatPartyField(party3, "🟣 遠征三隊"));
          if (reserves.length > 0) {
            const resVal = reserves.map(p => `- [${p.job}] **${p.ign}** (Lv.${p.level})${p.memo ? ` - *${p.memo}*` : ''}`).join("\n");
            fields.push({ name: "🔸 候補與預備名單", value: resVal, inline: false });
          }

          let bestTimeText = "待定";
          if (raid.mode === 'interest') {
            bestTimeText = "意願調查模式 💬";
          } else if (typeof raid.finalTimeIndex === 'number' && raid.proposedTimes?.[raid.finalTimeIndex]) {
            bestTimeText = formatDateTime(raid.proposedTimes[raid.finalTimeIndex]) + " 👑";
          }

          embeds = [{
            title: `⚔️ 【${raidBoss?.name.split(' (')[0]}】出征編組排班名冊`,
            description: `📌 **揪團主題**：${raid.title}\n📅 **預定時間**：**${bestTimeText}**`,
            fields: fields,
            color: 5793266, // Discord Blurple Color
            footer: { text: "NyxShade 遠征隊組隊系統" },
            timestamp: new Date().toISOString()
          }];
        }

        try {
          const response = await fetch(discordConfig.webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content, embeds })
          });
          if (response.ok) {
            showToast("📢 成功廣播公告與 @標記 成員至 Discord 頻道！");
          } else {
            throw new Error("Discord API Webhook 發送失敗");
          }
        } catch (err) {
          console.error(err);
          showToast("發送 Discord 失敗，請確認 Webhook URL 網址是否正確！", "error");
        }
      };

      // 複製排班表格式
      const copyGroupFormat = (raid) => {
        const raidBoss = bosses.find(b => b.id === raid.bossId);
        let bestTimeText = "待定";
        if (raid.mode === 'interest') {
          bestTimeText = "意願調查模式 (時間線上協調討論中) 💬";
        } else if (typeof raid.finalTimeIndex === 'number' && raid.proposedTimes?.[raid.finalTimeIndex]) {
          bestTimeText = formatDateTime(raid.proposedTimes[raid.finalTimeIndex]) + " (已由管理員最終確定) 👑";
        } else {
          let maxYesCount = -1;
          raid.proposedTimes?.forEach((time, index) => {
            const yesVotes = raid.votes?.filter(v => v.votes?.[index] === 'yes').length || 0;
            if (yesVotes > maxYesCount) {
              maxYesCount = yesVotes;
              bestTimeText = formatDateTime(time);
            }
          });
        }

        const participants = raid.participants || [];
        const party1 = participants.filter(p => p.party === '1');
        const party2 = participants.filter(p => p.party === '2');
        const party3 = participants.filter(p => p.party === '3');
        const reserves = participants.filter(p => p.party === 'reserve' || !p.party);

        const partyCount = raid.partyCount || (raidBoss?.maxPlayers > 12 ? 3 : (raidBoss?.maxPlayers > 6 ? 2 : 1));

        let text = `⚔️ **【Artale 遠征隊公車】${raidBoss?.name || ''}** ⚔️\n`;
        text += `📌 **主題**：${raid.title}\n`;
        text += `📅 **預計時間**：${bestTimeText}\n`;
        if (raid.notes) {
          text += `📝 **備註**：${raid.notes}\n`;
        }
        text += `\n📋 **實時遠征隊名單**：\n`;

        const formatParty = (pList, pName) => {
          if (pList.length === 0) return `${pName}：(尚無隊員)\n`;
          let pText = `${pName}：\n`;
          pList.forEach((p, idx) => {
            // 匯出報名表加入 Discord 資訊
            const dcTag = p.discord ? ` (DC: @${p.discord.username})` : '';
            pText += `  ${idx + 1}. [${p.job}] ${p.ign} (Lv.${p.level})${dcTag}${p.memo ? ` - ${p.memo}` : ''}\n`;
          });
          return pText;
        };

        text += formatParty(party1, '🔵 【遠征一隊】');
        if (partyCount >= 2) text += formatParty(party2, '🟢 【遠征二隊】');
        if (partyCount >= 3) text += formatParty(party3, '🟣 【遠征三隊】');
        if (reserves.length > 0) {
          text += `\n🔸 **【候補名單】**：\n`;
          reserves.forEach(p => {
            const dcTag = p.discord ? ` (DC: @${p.discord.username})` : '';
            text += `  - [${p.job}] ${p.ign} (Lv.${p.level})${dcTag}${p.memo ? ` - ${p.memo}` : ''}\n`;
          });
        }
        text += `\n🔗 **即時投票/卡位系統**：${window.location.href}`;

        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          showToast("排班表格式已複製到剪貼簿！可直接貼在群組中。");
        } catch (err) {
          showToast("複製失敗，請手動複製", "error");
        }
        document.body.removeChild(textarea);
      };

      // 💡 動態計算當前選中的遠征隊與 Boss
      const activeRaid = raids.find(r => r.id === currentRaidId);
      const boss = activeRaid ? bosses.find(b => b.id === activeRaid.bossId) : null;

      // 💡 運算邏輯：計算我參與的出團日程列表
      const myScheduleRaids = raids.filter(raid => {
        if (!activeCharacter.ign) return false;
        const hasVotedActive = raid.votes?.some(v => v.userId === customUid && v.ign === activeCharacter.ign && v.job === activeCharacter.job && Object.values(v.votes || {}).some(choice => choice === 'yes' || choice === 'maybe'));
        const isEnrolledActive = raid.participants?.some(p => p.userId === customUid && p.ign === activeCharacter.ign && p.job === activeCharacter.job);
        return hasVotedActive || isEnrolledActive;
      });

      const isCreator = user && activeRaid ? isAdminLoggedIn : false;
      const customBossesList = bosses.filter(b => b.isCustom || !DEFAULT_BOSS_LIST.some(d => d.id === b.id));

      return (
        <div className="bg-slate-955 text-slate-100 min-h-screen font-sans flex flex-col justify-between">
          
          <div>
            {/* 頂部導航列 */}
            <header className="sticky top-0 z-30 bg-slate-900/80 backdrop-blur border-b border-slate-800 px-4 py-3 shadow-lg">
              <div className="max-w-6xl mx-auto flex items-center justify-between font-bold">
                <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setCurrentRaidId(null)}>
                  <div className="text-3xl md:text-4xl">🍁</div>
                  <div>
                    <h1 className="text-lg md:text-xl font-black bg-gradient-to-r from-orange-400 to-amber-300 bg-clip-text text-transparent leading-none">
                      NyxShade遠征隊組隊系統
                    </h1>
                    <p 
                      onClick={handleSecretClick}
                      className="text-[10px] md:text-xs text-slate-500 select-none cursor-pointer active:text-amber-400 hover:text-slate-400 transition mt-1"
                      title="快速點擊5次可管理金鑰"
                    >
                      不負責宣告：Hi我是純粹，壞掉不要找我歐✧｡٩(ˊ導ˋ)و✧｡
                    </p>
                  </div>
                </div>

                {/* 右側玩家角色卡 + 🔄 多身分快速切換 */}
                <div className="flex items-center space-x-3">
                  <div className="hidden md:block">
                    {dbStatus === 'connecting' && <span className="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1 rounded-lg text-[11px] font-bold animate-pulse">⏳ 連線中</span>}
                    {dbStatus === 'connected' && <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-1 rounded-lg text-[11px] font-bold">🟢 連線成功</span>}
                    {dbStatus === 'error' && <span className="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2.5 py-1 rounded-lg text-[11px] font-bold">⚠️ 連線異常</span>}
                  </div>

                  {profileLoaded ? (
                    <div className="flex items-center space-x-2">
                      <button 
                        onClick={() => setShowProfileModal(true)}
                        className="bg-slate-900/95 hover:bg-slate-800 border border-slate-855 hover:border-slate-700 rounded-xl px-3 py-1.5 flex items-center transition text-sm shadow-md space-x-2 h-10 select-none"
                      >
                        {discordUser && (
                          <img 
                            src={discordUser.avatar} 
                            className="w-7 h-7 rounded-full border border-[#5865F2]/60 object-cover shrink-0" 
                            alt="Discord Avatar"
                          />
                        )}
                        {activeCharacter.ign ? (
                          <span className="flex items-center space-x-1.5 max-w-[130px] sm:max-w-none truncate">
                            {renderJobIcon(activeCharacter.job, "w-4 h-4")}
                            <span className="font-extrabold text-slate-100 text-xs truncate">
                              {activeCharacter.ign} <span className="text-[10px] text-slate-400 font-normal">({activeCharacter.job})</span>
                            </span>
                          </span>
                        ) : (
                          <span className="flex items-center space-x-1">
                            <span className="text-amber-400 text-xs font-bold">⚙️ 設定出團身分</span>
                          </span>
                        )}
                      </button>

                      {profile.characters && profile.characters.length > 1 && (
                        <select
                          value={profile.activeCharacterIndex}
                          onChange={async (e) => {
                            const nextIdx = Number(e.target.value);
                            const updatedProfile = { ...profile, activeCharacterIndex: nextIdx };
                            setProfile(updatedProfile);
                            try {
                              await db.doc(`artifacts/${appId}/users/${customUid}/profile/info`).update({ activeCharacterIndex: nextIdx });
                              await db.doc(`artifacts/${appId}/public/data/registered_users/${customUid}`).update({ activeCharacterIndex: nextIdx });
                              showToast(`已快速切換出團角色為：【${profile.characters[nextIdx].ign} (${profile.characters[nextIdx].job})】`);
                            } catch (err) {
                              console.error(err);
                            }
                          }}
                          className="bg-slate-900 border border-slate-800 rounded-xl px-2 py-1.5 text-xs text-amber-400 font-bold focus:outline-none cursor-pointer hover:border-slate-700 transition h-10"
                        >
                          {profile.characters.map((c, i) => (
                            <option key={i} value={i} className="bg-slate-900 font-bold text-slate-200">
                              🔄 {c.ign} ({c.job})
                            </option>
                          ))}
                        </select>
                      )}
                    </div>
                  ) : (
                    <div className="h-10 w-32 bg-slate-855 animate-pulse rounded-xl" />
                  )}
                </div>
              </div>
            </header>

            {/* 主體內容 */}
            <main className="max-w-6xl mx-auto p-4 md:p-6 pb-20">
              
              <div className="sm:hidden mb-4 text-center">
                {dbStatus === 'connecting' && <span className="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full text-xs font-bold animate-pulse">⏳ 連線中</span>}
                {dbStatus === 'connected' && <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-xs font-bold">🟢 連線成功</span>}
                {dbStatus === 'error' && <span className="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full text-xs font-bold">⚠️ 連線異常</span>}
              </div>

              {/* 1. 大廳列表 */}
              {!activeRaid ? (
                <div>
                  <div className="mb-8 p-8 rounded-3xl bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 shadow-xl relative overflow-hidden">
                    <div className="absolute top-0 right-0 opacity-10 text-9xl">🍁</div>
                    <div className="relative z-10 max-w-2xl">
                      <span className="px-3.5 py-1.5 bg-amber-500/10 text-amber-400 border border-amber-500/20 text-xs rounded-full font-bold">
                        跨平台多端同步
                      </span>
                      <h2 className="text-3xl md:text-4xl font-black mt-4 text-white">Artale 遠征隊組隊</h2>
                      <p className="text-slate-400 mt-2.5 text-base md:text-lg whitespace-pre-line leading-relaxed">
                        多身分角色與 Discord 驗證登入！
                      </p>
                      <div className="mt-6 flex flex-wrap gap-3">
                        {isAdminLoggedIn && (
                          <>
                            <button 
                              onClick={() => setIsCreating(true)}
                              className="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-extrabold px-6 py-3 rounded-xl shadow-lg transition flex items-center space-x-2 text-sm md:text-base"
                            >
                              <span>➕ 發起全新遠征隊</span>
                            </button>
                            <button 
                              onClick={() => setShowBossManagerModal(true)}
                              className="bg-violet-955/40 hover:bg-violet-900/60 text-violet-300 font-extrabold px-6 py-3 rounded-xl border border-violet-850 transition text-sm md:text-base flex items-center space-x-2"
                            >
                              <span>👾 自訂 Boss 設置</span>
                            </button>
                            <button 
                              onClick={() => setShowJobManagerModal(true)}
                              className="bg-teal-950/40 hover:bg-teal-900/60 text-teal-300 font-extrabold px-6 py-3 rounded-xl border border-teal-850 transition text-sm md:text-base flex items-center space-x-2"
                            >
                              <span>⚔️ 職業管理</span>
                            </button>
                          </>
                        )}
                        <button 
                          onClick={() => setShowProfileModal(true)}
                          className="bg-slate-800 hover:bg-slate-755 text-slate-200 font-bold px-5 py-3 rounded-xl border border-slate-700 transition text-sm md:text-base flex items-center space-x-2"
                        >
                          {discordUser ? (
                            <img src={discordUser.avatar} className="w-5 h-5 rounded-full object-cover" />
                          ) : (
                            <span>⚙️</span>
                          )}
                          <span>管理我的角色卡 / 連結 Discord</span>
                        </button>
                      </div>
                    </div>
                  </div>

                  {/* 🔮 楓之谷幸運神社 - 轉蛋系統 (新功能加載 🌟) */}
                  <div className="mb-8 p-6 rounded-3xl bg-gradient-to-br from-indigo-950/40 via-slate-900 to-slate-950 border border-indigo-500/25 shadow-xl relative overflow-hidden">
                    <div className="absolute right-4 top-4 opacity-10 text-7xl select-none">🔮</div>
                    
                    <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 border-b border-indigo-900/40 pb-4 mb-5">
                      <div>
                        <span className="text-[10px] bg-indigo-500/15 text-indigo-400 border border-indigo-500/30 px-2.5 py-1 rounded-md font-extrabold select-none">
                          MAPLE GACHA
                        </span>
                        <h3 className="text-xl font-black text-slate-100 flex items-center gap-2 mt-1.5">
                          <span>🔮 楓之谷幸運神社</span>
                        </h3>
                        <p className="text-xs text-slate-400 mt-1">
                          立刻來抽一發幸運神籤，看看今日衝裝與打寶運勢！
                        </p>
                      </div>

                      <div className="flex items-center gap-2 w-full md:w-auto shrink-0">
                        <button
                          onClick={handleSpinGacha}
                          disabled={isSpinning}
                          className="flex-1 md:flex-none bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 disabled:from-slate-800 disabled:to-slate-900 text-white font-black px-6 py-3 rounded-xl shadow-md transition transform hover:-translate-y-0.5 active:scale-95 disabled:scale-100 disabled:translate-y-0 text-sm flex items-center justify-center space-x-2"
                        >
                          {isSpinning ? (
                            <span className="flex items-center space-x-1.5">
                              <span className="animate-spin inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full"></span>
                              <span>神宮加持求籤中...</span>
                            </span>
                          ) : (
                            <>
                              <span>🎰 抽取今日好運轉蛋</span>
                            </>
                          )}
                        </button>

                        {gachaResult && !isSpinning && discordConfig?.webhookUrl && (
                          <button
                            onClick={handleSendFortuneToDiscord}
                            className="bg-[#5865F2] hover:bg-[#4752C4] text-white font-black px-5 py-3 rounded-xl text-sm transition transform hover:-translate-y-0.5 active:scale-95 shadow-md flex items-center justify-center space-x-1.5 shrink-0 animate-pulse"
                            title="將此好運勢以精美卡片發送到 Discord 頻道！"
                          >
                            <span>📢 秀運勢到 DC</span>
                          </button>
                        )}
                      </div>
                    </div>

                    {/* 轉蛋顯示結果卡片區 */}
                    {gachaResult ? (
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 animate-in fade-in slide-in-from-top-4 duration-350">
                        {/* 今日吉凶卡 */}
                        <div className={`p-4 rounded-2xl border transition bg-gradient-to-br ${gachaResult.fortune.color} flex flex-col justify-between shadow-lg`}>
                          <div>
                            <span className="text-[10.5px] font-bold text-white/70 block uppercase tracking-wide">TODAY STATUS</span>
                            <h4 className="text-lg font-black text-white mt-1 drop-shadow-md">{gachaResult.fortune.status}</h4>
                          </div>
                          <p className="text-xs text-white/90 leading-relaxed mt-4 bg-black/30 p-2.5 rounded-xl border border-white/10">
                            {gachaResult.fortune.desc}
                          </p>
                        </div>

                        {/* 幸運頻道卡 */}
                        <div className="p-4 rounded-2xl border border-slate-800 bg-slate-950/65 flex flex-col justify-between shadow-lg">
                          <div>
                            <span className="text-[10.5px] font-bold text-slate-500 block uppercase tracking-wide">LUCKY CHANNEL</span>
                            <h4 className="text-base font-black text-indigo-400 mt-1 flex items-center space-x-1.5">
                              <span>🎰</span>
                              <span className="truncate">{gachaResult.channel.split(' - ')[0]}</span>
                            </h4>
                          </div>
                          <p className="text-xs text-slate-300 leading-relaxed mt-4 bg-slate-900/70 p-2.5 rounded-xl border border-slate-800">
                            {gachaResult.channel}
                          </p>
                        </div>

                        {/* 最佳衝裝聖地卡 */}
                        <div className="p-4 rounded-2xl border border-slate-800 bg-slate-950/65 flex flex-col justify-between shadow-lg">
                          <div>
                            <span className="text-[10.5px] font-bold text-slate-500 block uppercase tracking-wide">BEST UPGRADE SPOT</span>
                            <h4 className="text-base font-black text-amber-400 mt-1 flex items-center space-x-1.5">
                              <span>🔨</span>
                              <span className="truncate">衝裝首選聖地</span>
                            </h4>
                          </div>
                          <p className="text-xs text-slate-300 leading-relaxed mt-4 bg-slate-900/70 p-2.5 rounded-xl border border-slate-800">
                            {gachaResult.spot}
                          </p>
                        </div>
                      </div>
                    ) : (
                      <div className="border border-dashed border-slate-800 rounded-2xl p-8 text-center text-slate-500 text-xs italic bg-slate-950/20 select-none">
                        🔮 還沒有求籤喔！請點選上方「🎰 抽取今日好運轉蛋」啟動運勢預測。
                      </div>
                    )}
                  </div>

                  {/* 我的出團日程 Dashboard */}
                  {activeCharacter.ign && (
                    <div className="mb-8 p-6 bg-slate-900/80 border border-slate-800 rounded-3xl shadow-xl">
                      <h3 className="text-lg font-black text-amber-400 mb-3.5 flex items-center space-x-2">
                        <span>📅 我的出團日程 (當前：【{activeCharacter.ign} ({activeCharacter.job})】)</span>
                      </h3>
                      {myScheduleRaids.length === 0 ? (
                        <p className="text-sm text-slate-500 italic">當前角色尚未投票 or 報名任何進行中的遠征隊。快去下方投票吧！</p>
                      ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                          {myScheduleRaids.map((raid) => {
                            const raidBoss = bosses.find(b => b.id === raid.bossId);
                            const participantInfo = raid.participants?.find(p => p.userId === customUid && p.ign === activeCharacter.ign && p.job === activeCharacter.job);
                            let enrollmentStatus = "已投票（待排班錄取）";
                            if (participantInfo) {
                              if (participantInfo.party === 'reserve') enrollmentStatus = "⏳ 錄取為：候補成員";
                              else if (participantInfo.party) enrollmentStatus = `🎉 已分配：遠征 ${participantInfo.party} 隊成員`;
                            }
                            
                            const finalizedTimeStr = typeof raid.finalTimeIndex === 'number' && raid.proposedTimes?.[raid.finalTimeIndex]
                              ? formatDateTime(raid.proposedTimes[raid.finalTimeIndex])
                              : null;

                            return (
                              <div 
                                key={`schedule-${raid.id}`}
                                onClick={() => setCurrentRaidId(raid.id)}
                                className={`p-4 border rounded-2xl cursor-pointer transition shadow hover:-translate-y-0.5 flex flex-col justify-between ${finalizedTimeStr ? 'border-amber-500/40 bg-amber-500/5 hover:border-amber-400' : 'bg-slate-950/80 border-slate-800'}`}
                              >
                                <div>
                                  <div className="flex items-center justify-between mb-2">
                                    <span className="text-xs font-bold text-indigo-400 font-mono">
                                      {raidBoss?.icon || '👹'} {raidBoss?.name.split(' (')[0] || '未知王'}
                                    </span>
                                    <span className={`text-[11px] px-2.5 py-0.5 rounded-full font-bold ${participantInfo ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}`}>
                                      {enrollmentStatus}
                                    </span>
                                  </div>
                                  <h4 className="text-sm font-extrabold text-slate-200 line-clamp-1">{raid.title}</h4>
                                  {finalizedTimeStr ? (
                                    <p className="text-xs text-amber-300 font-bold mt-1">📅 出團時間：{finalizedTimeStr} 👑</p>
                                  ) : raid.mode === 'interest' ? (
                                    <p className="text-xs text-indigo-300 font-bold mt-1">🙋 意願調查與時間協調中 💬</p>
                                  ) : (
                                    <p className="text-xs text-slate-400 mt-1 italic">⏰ 出團時間投票中</p>
                                  )}
                                </div>
                                <div className="text-[11px] text-slate-500 mt-2 border-t border-slate-855/60 pt-2 flex items-center justify-between">
                                  <span>出發 ➜</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}

                  <div className="flex items-center justify-between mb-5">
                    <h3 className="text-xl font-black text-slate-100 flex items-center space-x-2.5">

                      <span className="bg-slate-800 text-slate-400 px-3 py-1 rounded-full text-xs font-bold">
                        {raids.length}
                      </span>
                    </h3>
                  </div>

                  {raids.length === 0 ? (
                    <div className="bg-slate-900/40 border border-slate-800/80 rounded-3xl p-16 text-center">
                      <span className="text-6xl block mb-4">🦖</span>
                      <h4 className="text-slate-300 font-bold text-xl">目前沒有任何發起的遠征隊</h4>
                      <p className="text-slate-500 text-sm mt-2">立刻點選上方「發起全新遠征隊」來揪團打王吧！</p>

                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {raids.map((raid) => {
                        const raidBoss = bosses.find(b => b.id === raid.bossId);
                        const participantCount = raid.participants?.length || 0;
                        const voteCount = raid.votes?.length || 0;
                        const hasFinalTime = typeof raid.finalTimeIndex === 'number' && raid.proposedTimes?.[raid.finalTimeIndex];

                        return (
                          <div

                          >
                            <div>
                              <div className="flex items-center justify-between mb-4">
                                <span className={`px-3 py-1 text-xs font-black rounded-lg text-white bg-gradient-to-r ${raidBoss?.color || 'from-slate-600 to-slate-700'}`}>
                                  {raidBoss?.icon || '👹'} {raidBoss?.name.split(' (')[0] || '未知王'}
                                </span>
                                <span className="text-xs text-slate-400">
                                  開團者: <span className="text-slate-200 font-bold">{raid.creatorIgn}</span>
                                </span>

                              <p className="text-slate-400 text-sm line-clamp-2 mb-4 bg-slate-950/40 p-3 rounded-xl border border-slate-800/80 min-h-[56px] leading-relaxed">

                              </p>

                              {raid.mode === 'interest' ? (
                                <div className="mt-2.5 bg-indigo-650/30 border border-indigo-500/40 text-indigo-300 text-xs font-black px-3.5 py-2 rounded-xl flex items-center space-x-1.5 w-max select-none shadow">

                                </div>

                                  <span>👥</span>
                                  <strong>{participantCount}</strong>
                                  <span>人報名</span>
                                </span>
                                <span className="flex items-center space-x-1.5">
                                  <span>🗳️</span>
                                  <strong>{voteCount}</strong>
                                  <span>人表態</span>
                                </span>
                              </div>
                              <span className="text-indigo-400 font-bold hover:underline flex items-center space-x-1">

                            <button

                              <span>📢 廣播名單至 DC</span>
                            </button>
                          )}
                          
                          {isCreator && (
                            <>
                              <button
                                onClick={startEditingRaid}

                              </button>
                              
                              <button
                                onClick={() => handleResetRaid(activeRaid.id)}
                                className="bg-slate-800 hover:bg-slate-700 border border-amber-500/30 text-amber-400 font-bold px-4 py-2.5 rounded-xl transition text-xs md:text-sm shadow-sm"
                              >

                              </button>

                              <button
                                onClick={() => handleDeleteRaid(activeRaid.id)}
                                className="bg-rose-955/40 hover:bg-rose-900/60 border border-rose-900 text-rose-300 px-4 py-2.5 rounded-xl transition text-xs md:text-sm"
                              >
                                🗑️ 刪除此團
                              </button>
                            </>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 💡 意願調查或日期投票面板 */}
                  {activeRaid.mode === 'interest' ? (

                          <h3 className="text-lg md:text-xl font-extrabold text-white">🙋 參與此突襲王意願調查</h3>
                          <p className="text-xs md:text-sm text-slate-400 mt-1">
                            本團為意願模式。請表達您是否有意願打這個突襲王？
                            <span className="text-amber-400 font-bold">（再次點擊已選選項可「智慧反選」取消，自動同步備註）</span>
                          </p>
                        </div>
                      </div>

                      {(() => {
                        const interestVotes = activeRaid.votes || [];
                        const yesVotes = interestVotes.filter(v => v.votes?.['interest'] === 'yes') || [];
                        const noVotes = interestVotes.filter(v => v.votes?.['interest'] === 'no') || [];

                        const myVoteRecord = interestVotes.find(v => v.userId === customUid && v.ign === activeCharacter.ign && v.job === activeCharacter.job);
                        const myChoice = myVoteRecord?.votes?.['interest'] || null;

                        const renderVoterBadges = (votersList, emoji) => {
                          if (votersList.length === 0) return null;
                          return (
                            <div className="flex flex-wrap gap-2.5 mt-2">
                              {votersList.map((voter, vIdx) => {
                                const alreadyInRaid = activeRaid.participants?.some(p => p.userId === voter.userId && p.ign === voter.ign && p.job === voter.job);
                                return (
                                  <div 
                                    key={voter.userId + '-' + voter.ign + '-' + voter.job + '-' + vIdx}
                                    className="inline-flex items-center space-x-2 bg-slate-950 border border-slate-800 px-3 py-1.5 rounded-xl text-sm transition hover:border-slate-755 max-w-full"
                                  >
                                    <span className="text-base shrink-0">{emoji}</span>
                                    
                                    {/* Discord 帳號標記展示 👑 */}
                                    {voter.discord && (
                                      <span className="inline-flex items-center space-x-1 bg-[#5865F2]/10 border border-[#5865F2]/30 px-2 py-0.5 rounded-lg text-[10.5px] font-black text-indigo-300 shadow shrink-0">
                                        <img src={voter.discord.avatar} className="w-4 h-4 rounded-full object-cover" />
                                        <span className="max-w-[70px] truncate">@{voter.discord.username}</span>
                                      </span>

                                    <span className="text-[11px] text-slate-400 font-bold shrink-0 flex items-center space-x-1 bg-slate-900 border border-slate-800/80 px-2 py-0.5 rounded-lg select-none">
                                      {voter.job && renderJobIcon(voter.job, "w-3.5 h-3.5")}
                                      <span className="text-slate-300 font-extrabold">{voter.job || '無職業'}</span>
                                      <span className="text-slate-500">•</span>
                                      <span className="text-white font-mono font-bold">Lv.{voter.level || '?'}</span>
                                    </span>

                                      <button
                                        type="button"
                                        onClick={(e) => {
                                          e.stopPropagation();
                                          setVoterDetailModal({ isOpen: true, voter });
                                        }}
                                        className="text-[10px] bg-slate-900 hover:bg-slate-855 hover:border-slate-700 border border-slate-800 px-2 py-1 rounded text-amber-300 transition shrink-0 flex items-center space-x-1 font-bold active:scale-95"

                                        <span>💬 詳細</span>
                                      </button>
                                    )}
                                    
                                    {isCreator && (
                                      <div className="flex items-center space-x-1.5 ml-2 border-l border-slate-800/85 pl-2">
                                        {alreadyInRaid ? (
                                          <span className="text-emerald-400 font-bold bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded text-xs shrink-0 select-none">

                                          <button
                                            type="button"
                                            onClick={(e) => {
                                              e.stopPropagation();
                                              handleQuickEnroll(activeRaid.id, voter);

                                          >
                                            ➕ 錄取

                                        <button
                                          type="button"
                                          onClick={(e) => {
                                            e.stopPropagation();
                                            handleRemoveVote(activeRaid.id, voter.userId, voter.ign, voter.job);
                                          }}
                                          className="bg-rose-955/60 hover:bg-rose-900 border border-rose-900 text-rose-300 font-black px-2 py-0.5 rounded text-xs transition active:scale-95 shrink-0"
                                        >
                                          🗑️ 剃除
                                        </button>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          );
                        };

                        return (
                          <div className="p-5 rounded-2xl border bg-slate-950/40 border-slate-800 flex flex-col gap-5">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                              <div>
                                <h4 className="text-base font-bold text-slate-200">
                                  您本週是否有意願參加【{boss?.name.split(' (')[0] || '此突襲王'}】突襲團？
                                </h4>
                                <p className="text-xs text-slate-500 mt-1">請利用下方按鈕登載意願</p>
                              </div>
                              <div className="flex items-center space-x-3">
                                <button
                                  onClick={() => handleVoteTime(activeRaid.id, 'interest', 'yes')}
                                  className={`px-6 py-3 rounded-xl text-sm font-black transition flex items-center gap-1.5 active:scale-95 ${myChoice === 'yes' ? 'bg-emerald-600 text-white shadow shadow-emerald-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                >
                                  <span>🟢 可以配合</span>
                                </button>
                                <button
                                  onClick={() => handleVoteTime(activeRaid.id, 'interest', 'no')}
                                  className={`px-6 py-3 rounded-xl text-sm font-black transition flex items-center gap-1.5 active:scale-95 ${myChoice === 'no' ? 'bg-rose-600 text-white shadow shadow-rose-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                >
                                  <span>🔴 不行參戰</span>
                                </button>
                              </div>
                            </div>

                            <div className="border-t border-slate-800/85 pt-4 space-y-3">
                              <div>
                                <span className="text-xs text-emerald-400 font-bold block mb-1">🟢 可以配合的隊員 ({yesVotes.length} 人)：</span>

                                <span className="text-xs text-rose-400 font-bold block mb-1">🔴 不行參戰的隊員 ({noVotes.length} 人)：</span>

                              </div>
                            </div>
                          </div>

                      })()}

                        </div>
                      </div>

                          const yesVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'yes') || [];
                          const maybeVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'maybe') || [];
                          const noVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'no') || [];

                          const myVoteRecord = activeRaid.votes?.find(v => v.userId === customUid && v.ign === activeCharacter.ign && v.job === activeCharacter.job);
                          const myChoice = myVoteRecord?.votes?.[idx] || null;

                          const isFinalized = activeRaid.finalTimeIndex === idx;

                          const renderVoterBadges = (votersList, emoji) => {

                              <div className="flex flex-wrap gap-2.5 mt-2">

                                  const alreadyInRaid = activeRaid.participants?.some(p => p.userId === voter.userId && p.ign === voter.ign && p.job === voter.job);

                                    <div 
                                      key={voter.userId + '-' + voter.ign + '-' + voter.job + '-' + vIdx}

                                      <span className="text-base shrink-0">{emoji}</span>

                                        <span className="inline-flex items-center space-x-1 bg-[#5865F2]/10 border border-[#5865F2]/30 px-2 py-0.5 rounded-lg text-[10.5px] font-black text-indigo-300 shadow shrink-0">
                                          <img src={voter.discord.avatar} className="w-4 h-4 rounded-full object-cover" />
                                          <span className="max-w-[70px] truncate">@{voter.discord.username}</span>
                                        </span>
                                      )}

                                      <span className="text-[11px] text-slate-400 font-bold shrink-0 flex items-center space-x-1 bg-slate-900 border border-slate-800/80 px-2 py-0.5 rounded-lg select-none">

                                        <span className="text-slate-300 font-extrabold">{voter.job || '無職業'}</span>
                                        <span className="text-slate-500">•</span>
                                        <span className="text-white font-mono font-bold">Lv.{voter.level || '?'}</span>
                                      </span>

                                      {voter.memo && (
                                        <button
                                          type="button"
                                          onClick={(e) => {
                                            e.stopPropagation();
                                            setVoterDetailModal({ isOpen: true, voter });
                                          }}
                                          className="text-[10px] bg-slate-900 hover:bg-slate-855 hover:border-slate-700 border border-slate-800 px-2 py-1 rounded text-amber-300 transition shrink-0 flex items-center space-x-1 font-bold active:scale-95"
                                        >
                                          <span>💬 詳細</span>
                                        </button>
                                      )}
                                      
                                      {isCreator && (
                                        <div className="flex items-center space-x-1.5 ml-2 border-l border-slate-800/85 pl-2">
                                          {alreadyInRaid ? (
                                            <span className="text-emerald-400 font-bold bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded text-xs shrink-0 select-none">
                                              已錄取
                                            </span>
                                          ) : (
                                            <button
                                              type="button"
                                              onClick={(e) => {
                                                e.stopPropagation();
                                                handleQuickEnroll(activeRaid.id, voter);
                                              }}
                                              className="bg-indigo-600 hover:bg-indigo-500 text-white font-black px-2 py-0.5 rounded text-xs transition active:scale-95 shrink-0"
                                            >
                                              ➕ 錄取
                                            </button>
                                          )}
                                          <button
                                            type="button"
                                            onClick={(e) => {
                                              e.stopPropagation();
                                              handleRemoveVote(activeRaid.id, voter.userId, voter.ign, voter.job);
                                            }}
                                            className="bg-rose-955/60 hover:bg-rose-900 border border-rose-900 text-rose-300 font-black px-2 py-0.5 rounded text-xs transition active:scale-95 shrink-0"
                                          >
                                            🗑️ 剃除
                                          </button>
                                        </div>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                            );
                          };

                          return (
                            <div 
                              key={idx} 
                              className={`p-5 rounded-2xl border transition-all duration-350 flex flex-col gap-4 ${isFinalized ? 'border-amber-400 bg-amber-500/20 shadow-xl shadow-amber-500/10 ring-2 ring-amber-400/50' : 'bg-slate-950/40 border-slate-800'}`}
                            >
                              <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div className="flex-1">
                                  <div className="flex items-center space-x-2.5">
                                    <span className="text-xs font-bold text-indigo-400 font-mono">候選時間 #{idx + 1}</span>
                                    {isFinalized && (
                                      <span className="bg-amber-400 text-slate-950 text-[10.5px] font-black px-2.5 py-0.5 rounded-lg select-none shadow animate-pulse">
                                        ★ 最終確定出團時間
                                      </span>
                                    )}
                                  </div>
                                  <h4 className="text-lg font-bold text-slate-200 mt-0.5">{formatDateTime(time)}</h4>
                                </div>

                                <div className="flex items-center space-x-2">
                                  <button
                                    onClick={() => handleVoteTime(activeRaid.id, idx, 'yes')}
                                    className={`px-4 py-2 rounded-xl text-sm font-bold transition ${myChoice === 'yes' ? 'bg-emerald-600 text-white shadow shadow-emerald-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                  >
                                    🟢 可以
                                  </button>
                                  <button
                                    onClick={() => handleVoteTime(activeRaid.id, idx, 'maybe')}
                                    className={`px-4 py-2 rounded-xl text-sm font-bold transition ${myChoice === 'maybe' ? 'bg-amber-600 text-white shadow shadow-amber-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                  >
                                    🟡 也許
                                  </button>
                                  <button
                                    onClick={() => handleVoteTime(activeRaid.id, idx, 'no')}
                                    className={`px-4 py-2 rounded-xl text-sm font-bold transition ${myChoice === 'no' ? 'bg-rose-600 text-white shadow shadow-rose-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                  >
                                    🔴 不行
                                  </button>

                                  {isCreator && (
                                    <div className="flex items-center space-x-1 ml-2">
                                      <button
                                        type="button"
                                        onClick={() => handleFinalizeTime(activeRaid.id, idx)}
                                        className={`px-3.5 py-2 rounded-xl text-xs font-black transition ${isFinalized ? 'bg-slate-900 border border-amber-500/40 text-amber-400 hover:bg-slate-855' : 'bg-amber-400 text-slate-950 hover:bg-amber-300'}`}
                                      >
                                        {isFinalized ? '❌ 取消確定' : '🎯 確定此時間'}
                                      </button>
                                      
                                      {/* 💡 團長一鍵將確定時間公告廣播與自動標記至 Discord 👑 */}
                                      {isFinalized && discordConfig?.webhookUrl && (
                                        <button
                                          type="button"
                                          onClick={() => sendDiscordRaidWebhook(activeRaid, 'finalize_time', { timeIndex: idx })}
                                          className="bg-[#5865F2] hover:bg-[#4752C4] text-white px-3.5 py-2 rounded-xl text-xs font-black transition flex items-center space-x-1"
                                          title="發送出團時間確定公告，並 @標記 可以配合的成員"
                                        >
                                          <span>📢 廣播時間</span>
                                        </button>
                                      )}
                                    </div>
                                  )}
                                </div>
                              </div>

                              <div className="border-t border-slate-800/85 pt-3 space-y-2">
                                {yesVotes.length > 0 && (
                                  <div>
                                    <span className="text-xs text-emerald-400 font-bold block mb-1">🟢 可以配合的隊員：</span>
                                    {renderVoterBadges(yesVotes, '🟢')}
                                  </div>
                                )}
                                {maybeVotes.length > 0 && (
                                  <div>
                                    <span className="text-xs text-amber-400 font-bold block mb-1">🟡 可能配合的隊員：</span>
                                    {renderVoterBadges(maybeVotes, '🟡')}
                                  </div>
                                )}
                                {noVotes.length > 0 && (
                                  <div>
                                    <span className="text-xs text-rose-400 font-bold block mb-1">🔴 無法配合的隊員：</span>
                                    {renderVoterBadges(noVotes, '🔴')}
                                  </div>
                                )}
                                {yesVotes.length === 0 && maybeVotes.length === 0 && noVotes.length === 0 && (
                                  <span className="text-slate-600 text-xs italic block py-1">目前尚無人對此時間段投票</span>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* 分組名單 */}
                  {(() => {
                    const participants = activeRaid.participants || [];
                    const party1 = participants.filter(p => p.party === '1');
                    const party2 = participants.filter(p => p.party === '2');
                    const party3 = participants.filter(p => p.party === '3');
                    const reserves = participants.filter(p => p.party === 'reserve' || !p.party);

                    const partyCount = activeRaid.partyCount || (boss?.maxPlayers > 12 ? 3 : (boss?.maxPlayers > 6 ? 2 : 1));

                    const renderRosterGroup = (title, pList, groupKey, color) => {
                      const slots = [...pList];
                      while (slots.length < 6) {
                        slots.push({ isPlaceholder: true });
                      }

                      return (
                        <div className="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl flex flex-col justify-between">
                          <div>
                            {/* 小隊標題 */}
                            <div className="flex items-center justify-between border-b border-slate-800 pb-3.5 mb-3.5 gap-2">
                              <h4 className="font-black text-base flex items-center space-x-2 min-w-0">
                                <span className={`w-3 h-3 rounded-full shrink-0 ${color}`} />
                                <span className="text-slate-200 truncate">{title.split(' (')[0]}</span>
                              </h4>
                              <span className="text-xs font-bold bg-slate-855 text-slate-400 px-2.5 py-0.5 rounded-full whitespace-nowrap shrink-0">
                                {pList.length} / 6
                              </span>
                            </div>

                            {/* 6格槽位列表 */}
                            <div className="space-y-3.5">
                              {slots.map((p, idx) => {
                                if (p.isPlaceholder) {
