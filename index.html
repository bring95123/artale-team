  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyxShade遠征隊組隊系統</title>
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel (用於在瀏覽器中直接解析 JSX) -->

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase Compat SDKs (全域引入) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // =========================================================================
    // 📢 【管理員設定區】全域預設 Firebase 金鑰設定（已為您預先載入金鑰 🔑）
    // =========================================================================
    const DEFAULT_FIREBASE_CONFIG = {
      apiKey: "AIzaSyAQBMRNTYfViM-iPy-nOZs3IdPEQRCQ56w",
      authDomain: "msw-artale.firebaseapp.com",
      projectId: "msw-artale",
      storageBucket: "msw-artale.firebasestorage.app",
      messagingSenderId: "793229546795",
      appId: "1:793229546795:web:8cff2b6f43ae48ac1d616e",
      measurementId: "G-YH8KBMMQGC"
    }; 

    // ==========================================
    // 遊戲常數設定 (預設 Boss 列表)
    // ==========================================
    const DEFAULT_BOSS_LIST = [
      { id: 'zakum_normal', name: '普通炎魔 (Normal Zakum)', icon: '🔥', color: 'from-amber-600 to-red-700', maxPlayers: 6, desc: '最經典 of 8 手炎魔，需要良好調度。' },
      { id: 'papu_normal', name: '普通拉圖斯 (Normal Papulatus)', icon: '⏰', color: 'from-blue-500 to-indigo-600', maxPlayers: 6, desc: '需要注意計時器與地圖炸彈。' },
      { id: 'papu_hard', name: '困難拉圖斯 (Hard Papulatus)', icon: '⏰', color: 'from-violet-600 to-fuchsia-850', maxPlayers: 6, desc: 'Artale 超高難度挑戰，極度考驗輸出與走位。' },
      { id: 'horntail', name: '闇黑龍王 (Horntail)', icon: '🐉', color: 'from-emerald-600 to-teal-800', maxPlayers: 12, desc: '三顆龙头與多部位挑戰，誘惑控制是關鍵。' },
      { id: 'pink_bean', name: '蝴蝶(艾畢) (Pink Bean)', icon: '🦋', color: 'from-pink-400 to-rose-600', maxPlayers: 12, desc: '目前終極 Boss，雕像攻略與反射考驗。' }
    ];

    // 💡 內建的 Emoji 候選選單庫
    const BOSS_EMOJIS_LIST = ['🔥', '⏰', '🐉', '🦋', '👹', '💀', '🐙', '👾', '🍁', '⚔️', '🛡️', '👑', '🧙', '🔮', '💎', '🦊', '🦁', '🦉', '🌋'];

    // 💡 內建的自訂 Boss 卡片背景漸層配色板
    const BOSS_GRADIENTS_PRESETS = [
      { name: '烈焰紅', value: 'from-red-650 to-rose-950' },
      { name: '深海藍', value: 'from-blue-700 to-indigo-950' },
      { name: '翡翠綠', value: 'from-emerald-700 to-teal-950' },
      { name: '幻影紫', value: 'from-purple-800 to-violet-955' },
      { name: '琥珀金', value: 'from-amber-600 to-orange-950' },
      { name: '黯夜黑', value: 'from-slate-800 to-slate-950' }
    ];

    // 💡 預設的職業大系結構（做為初始化資料庫時的預設值）
    const DEFAULT_JOB_CATEGORIES = {
      '劍士': ['英雄', '聖騎士', '黑騎士'],
      '法師': ['大魔導士(火/毒)', '大魔導士(冰/雷)', '主教'],
      '弓箭手': ['箭神', '神射手'],
      '盜賊': ['夜使者', '暗影神偷'],
      '海盜': ['拳霸', '槍神']
    };

    const BOSS_EMOJIS = BOSS_EMOJIS_LIST;

    // 時間格式化輔助函數
    const formatDateTime = (dateTimeStr) => {
      if (!dateTimeStr) return '';
      if (!dateTimeStr.includes('T')) return dateTimeStr;
      try {
        const date = new Date(dateTimeStr);
        if (isNaN(date.getTime())) return dateTimeStr;
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        return `${year}-${month}-${day} (${weekdays[date.getDay()]}) ${hours}:${minutes}`;
      } catch (e) {
        return dateTimeStr;
      }
    };

    // 寬鬆 of Firebase Config 提取解析器
    function parseFirebaseConfig(text) {
      try {
        return JSON.parse(text);
      } catch (e) {
        const config = {};
        const keys = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
        keys.forEach(key => {
          const match = text.match(new RegExp(`['"]?${key}['"]?\\s*:\\s*['"]([^'"]+)['"]`));
          if (match) config[key] = match[1];
        });
        if (config.apiKey && config.projectId) return config;
        throw new Error("無法解析，請確認複製的內容是否包含 apiKey 與 projectId。");
      }
    }

   function App() {
      // ------------------------------------------
      // Firebase 初始化與連線狀態
      // ------------------------------------------
      const [dbConfig, setDbConfig] = useState(() => {
        if (DEFAULT_FIREBASE_CONFIG) return DEFAULT_FIREBASE_CONFIG;
        if (window.__firebase_config) return window.__firebase_config;
        const local = localStorage.getItem('artale_firebase_config');
        return local ? JSON.parse(local) : null;
      });

      const [configInput, setConfigInput] = useState('');
      const [appId] = useState(() => window.__app_id || 'artale-expedition-default');
      const [db, setDb] = useState(null);
      const [auth, setAuth] = useState(null);
      const [dbStatus, setDbStatus] = useState('connecting'); // 'no-config' | 'connecting' | 'connected' | 'error'

      // 💡 解決多裝置與重裝防遺失：自訂 UID 身分恢復機制
      const [customUid, setCustomUid] = useState(() => {
        return localStorage.getItem('nyxshade_custom_uid') || null;
      });
      const [user, setUser] = useState(null);
      const [recoveryKeyInput, setRecoveryKeyInput] = useState('');
      
      // 💡 職業管理核心 state (動態綁定資料庫，解決圖 2 新增職業與分類需求)
      const [jobCategories, setJobCategories] = useState(DEFAULT_JOB_CATEGORIES);
      const [showJobManagerModal, setShowJobManagerModal] = useState(false);
      const [newJobData, setNewJobData] = useState({ category: '劍士', name: '' });

      // 💡 支援多角色設定且內建「個人預設出團備註」
      const [profile, setProfile] = useState({
        activeCharacterIndex: 0,
        characters: [{ ign: '', job: '主教', level: 120, memo: '' }]
      });
      const [tempCharacters, setTempCharacters] = useState([]);
      const [tempActiveIndex, setTempActiveIndex] = useState(0);

      const [profileLoaded, setProfileLoaded] = useState(false);
      const [showProfileModal, setShowProfileModal] = useState(false);
      const [isSavingProfile, setIsSavingProfile] = useState(false);

      const [raids, setRaids] = useState([]);
      const [currentRaidId, setCurrentRaidId] = useState(null);
      const [isCreating, setIsCreating] = useState(false);
      
      // 💡 補回關鍵的「發起全新遠征隊」表單狀態
      const [newRaid, setNewRaid] = useState({ title: '', bossId: 'zakum_normal', notes: '', proposedTimes: [''] });

      // 💡 突襲 Boss 管理（管理員自訂突襲王）
      const [bosses, setBosses] = useState(DEFAULT_BOSS_LIST);
      const [showBossManagerModal, setShowBossManagerModal] = useState(false);
      const [newBossData, setNewBossData] = useState({ name: '', icon: '🔥', color: 'from-red-650 to-rose-950', maxPlayers: 18, desc: '' });

      // 管理員編輯現有遠征隊狀態
      const [isEditingRaid, setIsEditingRaid] = useState(false);
      const [editRaidData, setEditRaidData] = useState({ title: '', bossId: 'zakum_normal', notes: '', proposedTimes: [''] });

      // 隱藏重設點擊次數狀態 (點 5 次灰色小字重設)
      const [hiddenResetClicks, setHiddenResetClicks] = useState(0);

      // 管理者帳號狀態
      const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(() => {
        return sessionStorage.getItem('artale_is_admin') === 'true';
      });
      const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
      const [showAdminConsole, setShowAdminConsole] = useState(false);
      const [adminUsername, setAdminUsername] = useState('');
      const [adminPassword, setAdminPassword] = useState('');
      const [registeredUsers, setRegisteredUsers] = useState([]);
      const [searchUserQuery, setSearchUserQuery] = useState('');

      const [toast, setToast] = useState(null);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

      // 💡 根據職業名稱動態判定所屬的大系
      const getJobCategory = (jobName) => {
        for (const [cat, jobs] of Object.entries(jobCategories)) {
          if (jobs && Array.isArray(jobs) && jobs.includes(jobName)) return cat;
        }
        return '未知';
      };

      // 💡 楓之谷經典五大職業高精度護眼 SVG 渲染器
      const renderJobIcon = (jobName, sizeClass = "w-5 h-5") => {
        const category = getJobCategory(jobName);
        switch (category) {
          case '劍士': // 紅色劍士
            return (
              <svg className={`${sizeClass} inline-block shrink-0`} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#be185d" />
                <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" stroke="#fbcfe8" strokeWidth="1.5" fill="none" />
                <path d="M6 18L8 16M8 16L17 7M17 7L15 5M17 7L19 9M7 13L11 17" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            );
          case '法師': // 藍色法師
            return (
              <svg className={`${sizeClass} inline-block shrink-0`} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#0284c7" />
                <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" stroke="#bae6fd" strokeWidth="1.5" fill="none" />
                <path d="M12 7V17M12 7C10 5 6 5 6 5V15C6 15 10 15 12 17M12 7C14 5 18 5 18 5V15C18 15 14 15 12 17" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            );
          case '弓箭手': // 綠色弓箭手
            return (
              <svg className={`${sizeClass} inline-block shrink-0`} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#16a34a" />
                <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" stroke="#bbf7d0" strokeWidth="1.5" fill="none" />
                <path d="M8 5C14 5 17 9 17 12C17 15 14 19 8 19" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
                <path d="M8 5V19" stroke="#ffffff" strokeWidth="1" strokeLinecap="round" />
                <path d="M6 12H18M18 12L14 9M18 12L14 15" stroke="#ffffff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            );
          case '盜賊': // 紫色盜賊
            return (
              <svg className={`${sizeClass} inline-block shrink-0`} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#7c3aed" />
                <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" stroke="#ddd6fe" strokeWidth="1.5" fill="none" />
                <path d="M12 4L14.5 9.5L20 12L14.5 14.5L12 20L9.5 14.5L4 12L9.5 9.5Z" fill="#ffffff" stroke="#ffffff" strokeWidth="0.5" strokeLinejoin="round" />
                <circle cx="12" cy="12" r="2.2" fill="#7c3aed" />
              </svg>
            );
          case '海盜': // 灰色海盜
            return (
              <svg className={`${sizeClass} inline-block shrink-0`} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#4b5563" />
                <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" stroke="#e5e7eb" strokeWidth="1.5" fill="none" />
                <circle cx="12" cy="6" r="2" stroke="#ffffff" strokeWidth="2" />
                <path d="M12 8V18" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" />
                <path d="M9 10H15" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" />
                <path d="M6 13C6 17 9 19 12 19C15 19 18 17 18 13" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" />
                <path d="M5 14L6 12L7 14M17 14L18 12L19 14" stroke="#ffffff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            );
          default:
            return (
              <svg className={`${sizeClass} inline-block shrink-0`} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#6b7280" />
                <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" stroke="#9ca3af" strokeWidth="1.5" fill="none" />
                <circle cx="12" cy="12" r="4" stroke="#ffffff" strokeWidth="2" />
              </svg>
            );
        }
      };

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 5000); 
      };

      const triggerConfirm = (title, message, onConfirmCallback) => {
        setConfirmModal({
          isOpen: true,
          title,
          message,
          onConfirm: () => {
            onConfirmCallback();
            setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null });
          }
        });
      };

      // 儲存手動輸入的 Firebase 金鑰
      const handleSaveConfig = (e) => {
        e.preventDefault();
        try {
          const parsed = parseFirebaseConfig(configInput);
          localStorage.setItem('artale_firebase_config', JSON.stringify(parsed));
          setDbConfig(parsed);
          showToast("資料庫設定成功！網頁即將自動連線。");
        } catch (err) {
          alert("金鑰解析失敗，請確認是否完整複製了 firebaseConfig 的內容！");
        }
      };

      // 清除金鑰設定
      const handleResetConfig = () => {
        triggerConfirm(
          "確定要重置資料庫設定嗎？",
          "重置後網頁將會重新整理，並需要再次輸入 Firebase 金鑰才能繼續使用組隊系統。",
          () => {
            localStorage.removeItem('artale_firebase_config');
            localStorage.removeItem('nyxshade_custom_uid');
            window.location.reload();
          }
        );
      };

      // 點擊小助手標題觸發隱藏重設
      const handleSecretClick = () => {
        setHiddenResetClicks(prev => {
          const next = prev + 1;
          if (next >= 5) {
            handleResetConfig();
            return 0;
          }
          return next;
        });
      };

      // 管理者登入邏輯
      const handleAdminLoginSubmit = (e) => {
        e.preventDefault();
        const DEFAULT_ADMIN_USER = "admin";
        const DEFAULT_ADMIN_PASS = "nyxshade";

        if (adminUsername.toLowerCase() === DEFAULT_ADMIN_USER && adminPassword === DEFAULT_ADMIN_PASS) {
          setIsAdminLoggedIn(true);
          sessionStorage.setItem('artale_is_admin', 'true');
          setShowAdminLoginModal(false);
          setAdminUsername('');
          setAdminPassword('');
          showToast("🔑 管理者權限驗證成功！已啟用後台控制。");
          setShowAdminConsole(true);
        } else {
          showToast("帳號或密碼錯誤，請重新確認！", "error");
        }
      };

      const handleAdminLogout = () => {
        setIsAdminLoggedIn(false);
        sessionStorage.removeItem('artale_is_admin');
        setShowAdminConsole(false);
        showToast("已成功登出管理者模式。");
      };

      // 初始化 Firebase
      useEffect(() => {
        if (!dbConfig) {
          setDbStatus('no-config');
          return;
        }
        try {
          let app;
          if (firebase.apps.length === 0) {
            app = firebase.initializeApp(dbConfig);
          } else {
            app = firebase.app();
          }
          const firestoreDb = firebase.firestore(app);
          const firebaseAuth = firebase.auth(app);
          
          setDb(firestoreDb);
          setAuth(firebaseAuth);
          setDbStatus('connecting');
        } catch (err) {
          console.error(err);
          setDbStatus('error');
          alert("Firebase 初始化失敗，可能是您的金鑰有誤，請點擊底部的管理登入重置。");
        }
      }, [dbConfig]);

      // 身份驗證與登入監聽
      useEffect(() => {
        if (!auth || !db) return;

        const initAuth = async () => {
          try {
            if (window.__initial_auth_token) {
              await auth.signInWithCustomToken(window.__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Firebase 登入失敗：", error);
            setDbStatus('error');
            showToast(`登入失敗: ${error.message} (請確認 Firebase 是否已開啟「匿名登入」功能)`, "error");
          }
        };

        initAuth();
        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            setDbStatus('connected');
            // 如果 local 沒存過自訂 UID，使用 Auth UID 初始化做為第一代識別碼
            if (!localStorage.getItem('nyxshade_custom_uid')) {
              localStorage.setItem('nyxshade_custom_uid', currentUser.uid);
              setCustomUid(currentUser.uid);
            }
          }
        });
        return () => unsubscribe();
      }, [auth, db]);

      // 💡 實時監聽自訂 Boss 設置
      useEffect(() => {
        if (!db) return;
        const bossesCollection = db.collection(`artifacts/${appId}/public/data/bosses`);
        const unsubscribe = bossesCollection.onSnapshot((snapshot) => {
          const customList = [];
          snapshot.forEach((doc) => {
            customList.push({ id: doc.id, ...doc.data() });
          });
          // 將預設 Boss 與自訂 Boss 合併，自訂可覆蓋預設
          const merged = [...DEFAULT_BOSS_LIST];
          customList.forEach(cb => {
            const idx = merged.findIndex(b => b.id === cb.id);
            if (idx > -1) {
              merged[idx] = cb;
            } else {
              merged.push(cb);
            }
          });
          setBosses(merged);
        }, (err) => console.error("自訂 Boss 同步失敗", err));

        return () => unsubscribe();
      }, [db]);

      // 💡 實時監聽自訂職業配置 (解決圖 2 管理者手動新增職業之需求)
      useEffect(() => {
        if (!db) return;
        const jobsRef = db.doc(`artifacts/${appId}/public/data/jobs/config`);
        const unsubscribe = jobsRef.onSnapshot((doc) => {
          if (doc.exists) {
            setJobCategories(doc.data());
          } else {
            // 首次加載無文件時，將預設四轉職業結構上傳初始化
            jobsRef.set(DEFAULT_JOB_CATEGORIES).catch(err => console.error("資料庫職業配置初始化失敗", err));
            setJobCategories(DEFAULT_JOB_CATEGORIES);
          }
        }, (err) => {
          console.error("實時拉取自訂職業失敗", err);
        });

        return () => unsubscribe();
      }, [db]);

      // 💡 個人檔案載入與後台靜態同步（支援跨裝置自訂 UID 身分恢復與遷移）
      useEffect(() => {
        if (!db || !customUid) return;

        const fetchProfile = async () => {
          try {
            const profileRef = db.doc(`artifacts/${appId}/users/${customUid}/profile/info`);
            const docSnap = await profileRef.get();
            if (docSnap.exists) {
              const data = docSnap.data();
              let loadedProfile = {};
              
              if (data.characters && data.characters.length > 0) {
                loadedProfile = {
                  activeCharacterIndex: Number(data.activeCharacterIndex) || 0,
                  characters: data.characters
                };
              } else {
                // 舊單身分格式轉移
                loadedProfile = {
                  activeCharacterIndex: 0,
                  characters: [{
                    ign: data.ign || '',
                    job: data.job || '主教',
                    level: Number(data.level) || 120,
                    memo: ''
                  }]
                };
              }
              setProfile(loadedProfile);

              // [背景同步] 成員名冊同步
              db.doc(`artifacts/${appId}/public/data/registered_users/${customUid}`).set({
                userId: customUid,
                ...loadedProfile,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              }).catch(e => console.error("背景成員名冊同步失敗：", e));

            } else {
              setShowProfileModal(true);
            }
            setProfileLoaded(true);
          } catch (err) {
            console.error("載入個人檔案失敗：", err);
          }
        };
        fetchProfile();
      }, [db, customUid]);

      // 監聽所有已註冊隊員名冊 (僅限管理者模式加載)
      useEffect(() => {
        if (!db || !isAdminLoggedIn) return;

        const regUsersCollection = db.collection(`artifacts/${appId}/public/data/registered_users`);
        const unsubscribe = regUsersCollection.onSnapshot((snapshot) => {
          const usersList = [];
          snapshot.forEach((doc) => {
            usersList.push({ id: doc.id, ...doc.data() });
          });
          setRegisteredUsers(usersList);
        }, (error) => {
          console.error("讀取成員清單發生錯誤：", error);
        });

        return () => unsubscribe();
      }, [db, isAdminLoggedIn]);

      // 初始化角色卡編輯對話框暫存狀態
      useEffect(() => {
        if (showProfileModal) {
          if (profile.characters && profile.characters.length > 0) {
            setTempCharacters(JSON.parse(JSON.stringify(profile.characters)));
            setTempActiveIndex(profile.activeCharacterIndex);
          } else {
            setTempCharacters([{ ign: '', job: '主教', level: 120, memo: '' }]);
            setTempActiveIndex(0);
          }
        }
      }, [showProfileModal, profile]);

      // 儲存角色檔案
      const saveProfile = async (e) => {
        e.preventDefault();
        if (!db || !customUid) {
          showToast("尚未連線至資料庫，請稍後再試！", "error");
          return;
        }

        const hasEmptyIgn = tempCharacters.some(c => !c.ign.trim());
        if (hasEmptyIgn) {
          showToast("所有角色的 遊戲 ID (IGN) 均不可為空！", "error");
          return;
        }

        setIsSavingProfile(true);
        try {
          const profileData = {
            activeCharacterIndex: tempActiveIndex,
            characters: tempCharacters.map(c => ({
              ign: c.ign.trim(),
              job: c.job,
              level: Number(c.level) || 120,
              memo: (c.memo || '').trim()
            })),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          // 1. 寫入個人私有檔案 (Rule 1)
          const profileRef = db.doc(`artifacts/${appId}/users/${customUid}/profile/info`);
          await profileRef.set(profileData);

          // 2. 寫入公用成員清單以供管理者後台管理 (Rule 1)
          const publicRef = db.doc(`artifacts/${appId}/public/data/registered_users/${customUid}`);
          await publicRef.set({
            userId: customUid,
            ...profileData
          });

          setProfile(profileData);
          setShowProfileModal(false);
          showToast("角色身分檔案更新成功！");
        } catch (err) {
          console.error("儲存個人檔案發生錯誤：", err);
          showToast(`儲存失敗: ${err.message}`, "error");
        } finally {
          setIsSavingProfile(false);
        }
      };

      // 💡 匯入/還原舊的身分識別金鑰（實現換電腦不丟帳號 - 💡 修正還原無反應，加上安全重新整理）
      const handleRecoverAccount = (e) => {
        e.preventDefault();
        const key = recoveryKeyInput.trim();
        if (!key || key.length < 10) {
          showToast("請輸入正確且格式合規的身分密鑰金鑰！", "error");
          return;
        }
        triggerConfirm(
          "確定要還原此身分嗎？",
          "還原身分後，網頁將會自動重新整理，並切換到對應帳號的所有角色卡與出團進度。",
          () => {
            localStorage.setItem('nyxshade_custom_uid', key);
            setRecoveryKeyInput('');
            showToast("🎉 帳號還原成功！正在重新整理載入數據...");
            setTimeout(() => {
              window.location.reload();
            }, 1000);
          }
        );
      };

      // 👑 管理者專用：徹底刪除某隊員的角色資料卡
      const handleDeleteUserProfile = (targetUserId, targetIgn) => {
        triggerConfirm(
          `確定要刪除該玩家的所有身分角色卡嗎？`,
          "這將會徹底抹除該隊員在資料庫中的所有角色紀錄。此操作不可逆！",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/registered_users/${targetUserId}`).delete();
              await db.doc(`artifacts/${appId}/users/${targetUserId}/profile/info`).delete();
              showToast(`已成功刪除該使用者的所有角色檔案！`);
            } catch (err) {
              console.error(err);
              showToast(`刪除失敗: ${err.message}`, "error");
            }
          }
        );
      };

      // 實時監聽組隊列表
      useEffect(() => {
        if (!db) return;

        const raidsCollection = db.collection(`artifacts/${appId}/public/data/raids`);
        const unsubscribe = raidsCollection.onSnapshot((snapshot) => {
          const raidsData = [];
          snapshot.forEach((doc) => {
            raidsData.push({ id: doc.id, ...doc.data() });
          });
          raidsData.sort((a, b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return bTime - aTime;
          });
          setRaids(raidsData);
        }, (error) => {
          console.error("即時同步發生錯誤：", error);
        });
        return () => unsubscribe();
      }, [db]);

      // 取得當前使用的出團角色
      const activeCharacter = profile.characters?.[profile.activeCharacterIndex] || profile.characters?.[0] || { ign: '', job: '主教', level: 120, memo: '' };

      // 發起新團
      const handleCreateRaid = async (e) => {
        e.preventDefault();
        if (!db) return;
        if (!activeCharacter.ign) {
          showToast("請先設定您的遊戲 ID！", "error");
          setShowProfileModal(true);
          return;
        }
        const filteredTimes = newRaid.proposedTimes.filter(t => t.trim() !== '');
        if (filteredTimes.length === 0) {
          showToast("請至少填寫一個候選時間！", "error");
          return;
        }

        try {
          await db.collection(`artifacts/${appId}/public/data/raids`).add({
            title: newRaid.title,
            bossId: newRaid.bossId,
            notes: newRaid.notes,
            proposedTimes: filteredTimes,
            creatorId: customUid,
            creatorIgn: activeCharacter.ign,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            participants: [],
            votes: []
          });
          setNewRaid({ title: '', bossId: 'zakum_normal', notes: '', proposedTimes: [''] });
          setIsCreating(false);
          showToast("成功發起遠征隊揪團！");
        } catch (err) {
          showToast(`建立失敗: ${err.message}`, "error");
        }
      };

      // 💡 管理員新增自訂 Boss（自動產生 ID）
      const handleCreateCustomBoss = async (e) => {
        e.preventDefault();
        if (!db || !newBossData.name.trim()) {
          showToast("請填妥 Boss 顯示名稱！", "error");
          return;
        }
        try {
          const bossId = 'boss_' + Date.now(); // 自動化生成高辨識度 ID
          await db.doc(`artifacts/${appId}/public/data/bosses/${bossId}`).set({
            id: bossId,
            name: newBossData.name.trim(),
            icon: newBossData.icon,
            color: newBossData.color,
            maxPlayers: Number(newBossData.maxPlayers) || 18,
            desc: newBossData.desc.trim(),
            isCustom: true // 標記為自訂 Boss
          });
          setNewBossData({ name: '', icon: '🔥', color: 'from-red-650 to-rose-950', maxPlayers: 18, desc: '' });
          showToast("🎉 自訂 Boss 新增成功！");
        } catch (err) {
          showToast(`新增失敗: ${err.message}`, "error");
        }
      };

      // 💡 刪除自訂 Boss 邏輯
      const handleDeleteBoss = async (bossId, bossName) => {
        triggerConfirm(
          `確定要刪除自訂 Boss 【${bossName}】 嗎？`,
          "刪除後此突襲王將不會出現在選單中。以此 Boss 發起的未結出團可能會受到影響！",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/bosses/${bossId}`).delete();
              showToast(`已成功刪除自訂 Boss 【${bossName}】！`);
            } catch (err) {
              showToast(`刪除失敗: ${err.message}`, "error");
            }
          }
        );
      };

      // 💡 管理員新增自訂職業身分 (解決圖 2 之職業手動擴充管理需求)
      const handleAddJob = async (e) => {
        e.preventDefault();
        const jobName = newJobData.name.trim();
        if (!jobName) {
          showToast("請輸入職業名稱！", "error");
          return;
        }
        // 檢查防呆：是否有重複職業名稱
        const exists = Object.values(jobCategories).some(jobs => jobs && jobs.includes(jobName));
        if (exists) {
          showToast(`職業 【${jobName}】 已存在於列表中，請勿重複新增！`, "error");
          return;
        }

        const updatedCategories = {
          ...jobCategories,
          [newJobData.category]: [...(jobCategories[newJobData.category] || []), jobName]
        };

        try {
          await db.doc(`artifacts/${appId}/public/data/jobs/config`).set(updatedCategories);
          setJobCategories(updatedCategories);
          setNewJobData({ ...newJobData, name: '' });
          showToast(`成功將 【${jobName}】 新增至 【${newJobData.category}】分類中！`);
        } catch (err) {
          showToast(`新增職業失敗: ${err.message}`, "error");
        }
      };

      // 💡 刪除特定職業身分
      const handleDeleteJob = async (category, jobName) => {
        triggerConfirm(
          `確定要刪除職業身分 【${jobName}】 嗎？`,
          `這將會從 【${category}】分類下移除該職業，請確保目前沒有以此職業報名出團的使用者，否則該使用者的職業徽章分類會失效。此操作不可逆！`,
          async () => {
            const updatedCategoryList = (jobCategories[category] || []).filter(j => j !== jobName);
            const updatedCategories = {
              ...jobCategories,
              [category]: updatedCategoryList
            };

            try {
              await db.doc(`artifacts/${appId}/public/data/jobs/config`).set(updatedCategories);
              setJobCategories(updatedCategories);
              showToast(`已成功將職業 【${jobName}】 移出系統！`);
            } catch (err) {
              showToast(`刪除職業失敗: ${err.message}`, "error");
            }
          }
        );
      };

      // 💡 管理員/團長編輯遠征隊資訊與時間
      const startEditingRaid = () => {
        const activeRaid = raids.find(r => r.id === currentRaidId);
        if (!activeRaid) return;
        setEditRaidData({
          title: activeRaid.title || '',
          bossId: activeRaid.bossId || 'zakum_normal',
          notes: activeRaid.notes || '',
          proposedTimes: [...(activeRaid.proposedTimes || [''])]
        });
        setIsEditingRaid(true);
      };

      const handleSaveRaidEdit = async (e) => {
        e.preventDefault();
        if (!db || !currentRaidId) return;
        const filteredTimes = editRaidData.proposedTimes.filter(t => t.trim() !== '');
        if (filteredTimes.length === 0) {
          showToast("請至少填寫一個候選時間！", "error");
          return;
        }

        try {
          await db.doc(`artifacts/${appId}/public/data/raids/${currentRaidId}`).update({
            title: editRaidData.title,
            bossId: editRaidData.bossId,
            notes: editRaidData.notes,
            proposedTimes: filteredTimes
          });
          setIsEditingRaid(false);
          showToast("遠征隊資訊與時間修改成功！");
        } catch (err) {
          showToast(`修改失敗: ${err.message}`, "error");
        }
      };

      // 💡 管理員一鍵確定 / 取消最終出團時間 (解決黃底標示需求 👑)
      const handleFinalizeTime = async (raidId, timeIndex) => {
        if (!db || !raidId) return;
        try {
          const raidRef = db.doc(`artifacts/${appId}/public/data/raids/${raidId}`);
          const nextIndex = activeRaid.finalTimeIndex === timeIndex ? null : timeIndex;
          await raidRef.update({ finalTimeIndex: nextIndex });
          showToast(nextIndex !== null ? "已成功確定最終出團時間！" : "已取消確定時間。");
        } catch (err) {
          showToast(`設定失敗: ${err.message}`, "error");
        }
      };

      // 刪除團
      const handleDeleteRaid = (raidId) => {
        triggerConfirm(
          "確定要刪除此遠征隊嗎？",
          "此操作不可逆，將清空所有報名與投票資訊。",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).delete();
              if (currentRaidId === raidId) setCurrentRaidId(null);
              showToast("已刪除該遠征隊。");
            } catch (err) {
              showToast("刪除失敗", "error");
            }
          }
        );
      };

      // 重置團名單
      const handleResetRaid = (raidId) => {
        triggerConfirm(
          "確定要重置此團名單嗎？",
          "這會清空所有的報名、小隊編組與投票，但保留本團的標題、時間與基本設定。",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({
                participants: [],
                votes: []
              });
              showToast("已重置名單，大家可以開始重新報名囉！");
            } catch (err) {
              showToast("重置失敗", "error");
            }
          }
        );
      };

      // 🎯 投票時間 (基於當前啟用之身分角色進行) - 💡 新增「智慧反選（Toggle Off）」且綁定複合鍵（userId + ign + job）
      const handleVoteTime = async (raidId, timeIndex, choice) => {
        if (!activeCharacter.ign) {
          showToast("請先點擊右上角設定您的遊戲角色卡才能進行投票！", "error");
          setShowProfileModal(true);
          return;
        }
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;

        try {
          const raidRef = db.doc(`artifacts/${appId}/public/data/raids/${raidId}`);
          let updatedVotes = [...(raid.votes || [])];
          
          // 💡 複合鍵匹配：同時核對 userId、IGN 與職業 Job，達成多分身獨立投票
          const userVoteIndex = updatedVotes.findIndex(v => v.userId === customUid && v.ign === activeCharacter.ign && v.job === activeCharacter.job);

          if (userVoteIndex > -1) {
            const userVote = { ...updatedVotes[userVoteIndex] };
            userVote.job = activeCharacter.job;
            userVote.level = activeCharacter.level;
            // 💡投票時同時儲存其當前角色的「個人預設出團備註」
            userVote.memo = (activeCharacter.memo || '').trim();

            // 💡 [反選智慧識別邏輯]: 如果當前點擊的選項跟之前投的完全相同，則視為取消
            if (userVote.votes && userVote.votes[timeIndex] === choice) {
              const nextVotes = { ...userVote.votes };
              delete nextVotes[timeIndex]; // 移除此時段的投票紀錄
              userVote.votes = nextVotes;

              // 檢查該成員在所有時段是否已經沒有任何有效投票
              const activeVotesCount = Object.values(nextVotes).filter(v => v === 'yes' || v === 'maybe' || v === 'no').length;
              if (activeVotesCount === 0) {
                // 若沒有任何投票紀錄，則將該使用者整筆投票資料從 votes 中移除，維護資料庫清潔度
                updatedVotes = updatedVotes.filter((_, idx) => idx !== userVoteIndex);
              } else {
                updatedVotes[userVoteIndex] = userVote;
              }
              await raidRef.update({ votes: updatedVotes });
              showToast("已取消該時段投票！");
            } else {
              // 一般新增或變更投票 (例如從 'maybe' 變為 'yes')
              userVote.votes = { ...userVote.votes, [timeIndex]: choice };
              updatedVotes[userVoteIndex] = userVote;
              await raidRef.update({ votes: updatedVotes });
              showToast("投票成功！");
            }
          } else {
            // 首次投票
            updatedVotes.push({
              userId: customUid,
              ign: activeCharacter.ign,
              job: activeCharacter.job,
              level: activeCharacter.level,
              memo: (activeCharacter.memo || '').trim(),
              votes: { [timeIndex]: choice }
            });
            await raidRef.update({ votes: updatedVotes });
            showToast("投票成功！");
          }
        } catch (err) {
          showToast(`投票失敗: ${err.message}`, "error");
        }
      };

      // 一鍵錄取投票人員 (一鍵排班 - 複合鍵綁定防重覆，自動帶入角色儲存的專屬備註)
      const handleQuickEnroll = async (raidId, voter) => {
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;
        // 💡 複合鍵匹配核對：同時核對 ID、IGN、Job
        if (raid.participants?.some(p => p.userId === voter.userId && p.ign === voter.ign && p.job === voter.job)) {
          showToast(`${voter.ign} (${voter.job}) 已經在名單中囉！`, "error");
          return;
        }
        try {
          const raidRef = db.doc(`artifacts/${appId}/public/data/raids/${raidId}`);
          const updatedParticipants = [...(raid.participants || [])];
          updatedParticipants.push({
            userId: voter.userId,
            ign: voter.ign,
            job: voter.job || '未知',
            level: voter.level || 120,
            memo: voter.memo || '', // 💡 自動完美繼承投票者寫在角色卡上的備註！
            party: 'reserve'
          });
          await raidRef.update({ participants: updatedParticipants });
          showToast(`已成功錄取 【${voter.ign} (${voter.job})】！`);
        } catch (err) {
          showToast("錄取失敗", "error");
        }
      };

      // 分組 (綁定 customUid + ign + job 複合鍵)
      const handleAssignParty = async (raidId, targetUserId, targetIgn, targetJob, targetParty) => {
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;
        try {
          const updatedParticipants = raid.participants.map(p => {
            if (p.userId === targetUserId && p.ign === targetIgn && p.job === targetJob) return { ...p, party: targetParty };
            return p;
          });
          await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({ participants: updatedParticipants });
          showToast("分組更新成功！");
        } catch (err) {
          console.error(err);
        }
      };

      // 踢人 (綁定 customUid + ign + job 複合鍵)
      const handleKickParticipant = (raidId, targetUserId, targetIgn, targetJob) => {
        triggerConfirm(
          "確定要移出此玩家嗎？",
          `將把 【${targetIgn}】 (${targetJob}) 從出團與分組名單中移除。`,
          async () => {
            const targetRaid = raids.find(r => r.id === raidId);
            if (!targetRaid) return;
            try {
              const updatedParticipants = targetRaid.participants.filter(p => !(p.userId === targetUserId && p.ign === targetIgn && p.job === targetJob));
              await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({ participants: updatedParticipants });
              showToast("已成功移出玩家。");
            } catch (err) {
              console.error(err);
            }
          }
        );
      };

      // 複製排班表格式
      const copyGroupFormat = (raid) => {
        const raidBoss = bosses.find(b => b.id === raid.bossId);
        let bestTimeText = "待定";
        if (typeof raid.finalTimeIndex === 'number' && raid.proposedTimes?.[raid.finalTimeIndex]) {
          bestTimeText = formatDateTime(raid.proposedTimes[raid.finalTimeIndex]) + " (已由管理員最終確定) 👑";
        } else {
          let maxYesCount = -1;
          raid.proposedTimes.forEach((time, index) => {
            const yesVotes = raid.votes?.filter(v => v.votes?.[index] === 'yes').length || 0;
            if (yesVotes > maxYesCount) {
              maxYesCount = yesVotes;
              bestTimeText = formatDateTime(time);
            }
          });
        }

        const participants = raid.participants || [];
        const party1 = participants.filter(p => p.party === '1');
        const party2 = participants.filter(p => p.party === '2');
        const party3 = participants.filter(p => p.party === '3');
        const reserves = participants.filter(p => p.party === 'reserve' || !p.party);

        let text = `⚔️ **【Artale 遠征隊公車】${raidBoss?.name || ''}** ⚔️\n`;
        text += `📌 **主題**：${raid.title}\n`;
        text += `📅 **預計時間**：${bestTimeText}\n`;
        if (raid.notes) {
          text += `📝 **備註**：${raid.notes}\n`;
        }
        text += `\n📋 **實時遠征隊名單**：\n`;

        const formatParty = (pList, pName) => {
          if (pList.length === 0) return `${pName}：(尚無隊員)\n`;
          let pText = `${pName}：\n`;
          pList.forEach((p, idx) => {
            pText += `  ${idx + 1}. [${p.job}] ${p.ign} (Lv.${p.level})${p.memo ? ` - ${p.memo}` : ''}\n`;
          });
          return pText;
        };

        text += formatParty(party1, '🔵 【遠征一隊】');
        if (raidBoss?.maxPlayers > 6) text += formatParty(party2, '🟢 【遠征二隊】');
        if (raidBoss?.maxPlayers > 12) text += formatParty(party3, '🟣 【遠征三隊】');
        if (reserves.length > 0) {
          text += `\n🔸 **【候補名單】**：\n`;
          reserves.forEach(p => {
            text += `  - [${p.job}] ${p.ign} (Lv.${p.level})${p.memo ? ` - ${p.memo}` : ''}\n`;
          });
        }
        text += `\n🔗 **即時投票/卡位系統**：${window.location.href}`;

        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          showToast("排班表格式已複製到剪貼簿！可直接貼在群組中。");
        } catch (err) {
          showToast("複製失敗，請手動複製", "error");
        }
        document.body.removeChild(textarea);
      };

      // 💡 動態計算當前選中的遠征隊與 Boss（結合自訂 Boss 實時更新）
      const activeRaid = raids.find(r => r.id === currentRaidId);
      const boss = activeRaid ? bosses.find(b => b.id === activeRaid.bossId) : null;

      // 💡 運算邏輯：計算我「當前啟用角色與職業」參與的出團日程列表 (已精確綁定複合鍵)
      const myScheduleRaids = raids.filter(raid => {
        if (!activeCharacter.ign) return false;
        // 1. 我當前的分身在這個團投過 '可以' 或是 '也許'
        const hasVotedActive = raid.votes?.some(v => v.userId === customUid && v.ign === activeCharacter.ign && v.job === activeCharacter.job && Object.values(v.votes || {}).some(choice => choice === 'yes' || choice === 'maybe'));
        // 2. 我當前的分身已經在出團名單中
        const isEnrolledActive = raid.participants?.some(p => p.userId === customUid && p.ign === activeCharacter.ign && p.job === activeCharacter.job);
        return hasVotedActive || isEnrolledActive;
      });

      const isCreator = user && activeRaid ? isAdminLoggedIn : false;

      // 過濾出僅屬於自訂建立的 Boss 列表（用於刪除列表展示）
      const customBossesList = bosses.filter(b => b.isCustom || !DEFAULT_BOSS_LIST.some(d => d.id === b.id));

      return (
        <div className="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col justify-between">
          
          <div>
            {/* 頂部導航列 - 100% 乾淨防呆，提供實時連線狀態 */}
            <header className="sticky top-0 z-30 bg-slate-900/80 backdrop-blur border-b border-slate-800 px-4 py-3.5 shadow-lg">
              <div className="max-w-6xl mx-auto flex items-center justify-between font-semibold">
                <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setCurrentRaidId(null)}>
                  <div className="text-4xl">🍁</div>
                  <div>
                    <h1 className="text-xl md:text-2xl font-black bg-gradient-to-r from-orange-400 to-amber-300 bg-clip-text text-transparent">
                      NyxShade遠征隊組隊系統
                    </h1>
                    <p 
                      onClick={handleSecretClick}
                      className="text-xs text-slate-500 select-none cursor-pointer active:text-amber-400 hover:text-slate-400 transition"
                      title="快速點擊5次可管理金鑰"
                    >
                      不負責宣言：Hi，我是純粹壞掉別找我歐٩(ˊᗜˋ*)و✧｡
                    </p>
                  </div>
                </div>

                {/* 右側玩家角色卡 + 🔄 多身分快速切換選單 */}
                <div className="flex items-center space-x-2.5">
                  <div className="hidden sm:block">
                    {dbStatus === 'connecting' && <span className="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-lg text-xs font-bold animate-pulse">⏳ 連線中</span>}
                    {dbStatus === 'connected' && <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-lg text-xs font-bold">🟢 連線成功</span>}
                    {dbStatus === 'error' && <span className="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-lg text-xs font-bold">⚠️ 連線異常</span>}
                  </div>

                  {profileLoaded ? (
                    <div className="flex items-center space-x-2">
                      {/* 當前活躍角色展示 (已新增對應圖示 🛡️ 轉換) */}
                      <button 
                        onClick={() => setShowProfileModal(true)}
                        className="bg-slate-900/95 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 rounded-xl px-4 py-2.5 flex items-center transition text-base shadow-md"
                      >
                        {activeCharacter.ign ? (
                          <span className="flex items-center space-x-2">
                            {renderJobIcon(activeCharacter.job, "w-5 h-5")}
                            <span className="font-bold text-slate-100">
                              {activeCharacter.ign} ({activeCharacter.job})
                            </span>
                          </span>
                        ) : (
                          <span className="flex items-center space-x-2">
                            <span className="text-xl text-amber-400">🛡️</span>
                            <span className="font-bold text-slate-100">設定出團身分</span>
                          </span>
                        )}
                      </button>

                      {/* 🔄 快速切換下拉選單 */}
                      {profile.characters && profile.characters.length > 1 && (
                        <select
                          value={profile.activeCharacterIndex}
                          onChange={async (e) => {
                            const nextIdx = Number(e.target.value);
                            const updatedProfile = { ...profile, activeCharacterIndex: nextIdx };
                            setProfile(updatedProfile);
                            try {
                              await db.doc(`artifacts/${appId}/users/${customUid}/profile/info`).update({ activeCharacterIndex: nextIdx });
                              await db.doc(`artifacts/${appId}/public/data/registered_users/${customUid}`).update({ activeCharacterIndex: nextIdx });
                              showToast(`已快速切換出團角色為：【${profile.characters[nextIdx].ign}】`);
                            } catch (err) {
                              console.error(err);
                            }
                          }}
                          className="bg-slate-900 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-amber-400 font-bold focus:outline-none cursor-pointer hover:border-slate-700 transition"
                        >
                          {profile.characters.map((c, i) => (
                            <option key={i} value={i} className="bg-slate-900 font-bold text-slate-200">
                              🔄 切換: {c.ign} ({c.job})
                            </option>
                          ))}
                        </select>
                      )}
                    </div>
                  ) : (
                    <div className="h-10 w-32 bg-slate-855 animate-pulse rounded-xl" />
                  )}
                </div>
              </div>
            </header>

            {/* 主體內容 */}
            <main className="max-w-6xl mx-auto p-4 md:p-6 pb-20">
              
              <div className="sm:hidden mb-4 text-center">
                {dbStatus === 'connecting' && <span className="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full text-xs font-bold animate-pulse">⏳ 連線中</span>}
                {dbStatus === 'connected' && <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-xs font-bold">🟢 連線成功</span>}
                {dbStatus === 'error' && <span className="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full text-xs font-bold">⚠️ 連線異常</span>}
              </div>

              {/* 1. 大廳列表 */}
              {!activeRaid ? (
                <div>
                  <div className="mb-8 p-8 rounded-3xl bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 shadow-xl relative overflow-hidden">
                    <div className="absolute top-0 right-0 opacity-10 text-9xl">🍁</div>
                    <div className="relative z-10 max-w-2xl">
                      <span className="px-3.5 py-1.5 bg-amber-500/10 text-amber-400 border border-amber-500/20 text-xs rounded-full font-bold">
                        跨平台多端同步
                      </span>
                      <h2 className="text-3xl md:text-4xl font-black mt-4 text-white">Artale 遠征隊組隊</h2>
                      <p className="text-slate-400 mt-2.5 text-base md:text-lg whitespace-pre-line leading-relaxed">
                        支援多身分角色登錄！隊員可線上自主投票時間、隨時切換角色報名打王。
                      </p>
                      <div className="mt-6 flex flex-wrap gap-3">
                        {/* 💡 權限限制：只有系統管理員登入時，才可點選發起全新遠征隊揪團，以及自訂 Boss 與職業分類 */}
                        {isAdminLoggedIn && (
                          <>
                            <button 
                              onClick={() => setIsCreating(true)}
                              className="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-extrabold px-6 py-3 rounded-xl shadow-lg transition flex items-center space-x-2 text-sm md:text-base"
                            >
                              <span>➕ 發起全新遠征隊</span>
                            </button>
                            <button 
                              onClick={() => setShowBossManagerModal(true)}
                              className="bg-violet-950/40 hover:bg-violet-900/60 text-violet-300 font-extrabold px-6 py-3 rounded-xl border border-violet-850 transition text-sm md:text-base flex items-center space-x-2"
                            >
                              <span>👾 自訂 Boss 設置</span>
                            </button>
                            <button 
                              onClick={() => setShowJobManagerModal(true)}
                              className="bg-teal-950/40 hover:bg-teal-900/60 text-teal-300 font-extrabold px-6 py-3 rounded-xl border border-teal-850 transition text-sm md:text-base flex items-center space-x-2"
                            >
                              <span>⚔️ 職業管理</span>
                            </button>
                          </>
                        )}
                        <button 
                          onClick={() => setShowProfileModal(true)}
                          className="bg-slate-800 hover:bg-slate-750 text-slate-200 font-bold px-5 py-3 rounded-xl border border-slate-700 transition text-sm md:text-base"
                        >
                          ⚙️ 管理我的角色卡 / 備份
                        </button>
                      </div>
                    </div>
                  </div>

                  {/* 我的出團日程 Dashboard (投票/錄取) */}
                  {activeCharacter.ign && (
                    <div className="mb-8 p-6 bg-slate-900/80 border border-slate-800 rounded-3xl shadow-xl">
                      <h3 className="text-lg font-black text-amber-400 mb-3.5 flex items-center space-x-2">
                        <span>📅 我的出團日程 (當前切換：【{activeCharacter.ign} ({activeCharacter.job})】)</span>
                      </h3>
                      {myScheduleRaids.length === 0 ? (
                        <p className="text-sm text-slate-500 italic">當前角色尚未投票或報名任何進行中的遠征隊。快去下方投票吧！</p>
                      ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                          {myScheduleRaids.map((raid) => {
                            const raidBoss = bosses.find(b => b.id === raid.bossId);
                            // 檢查是否被分派到小隊了
                            const participantInfo = raid.participants?.find(p => p.userId === customUid && p.ign === activeCharacter.ign && p.job === activeCharacter.job);
                            let enrollmentStatus = "已投票（待排班錄取）";
                            if (participantInfo) {
                              if (participantInfo.party === 'reserve') enrollmentStatus = "⏳ 錄取為：候補成員";
                              else if (participantInfo.party) enrollmentStatus = `🎉 已分配：遠征 ${participantInfo.party} 隊成員`;
                            }
                            
                            const finalizedTimeStr = typeof raid.finalTimeIndex === 'number' && raid.proposedTimes?.[raid.finalTimeIndex]
                              ? formatDateTime(raid.proposedTimes[raid.finalTimeIndex])
                              : null;

                            return (
                              <div 
                                key={`schedule-${raid.id}`}
                                onClick={() => setCurrentRaidId(raid.id)}
                                className={`p-4 border rounded-2xl cursor-pointer transition shadow hover:-translate-y-0.5 flex flex-col justify-between ${finalizedTimeStr ? 'border-amber-500/40 bg-amber-500/5 hover:border-amber-400' : 'bg-slate-950/80 border-slate-800'}`}
                              >
                                <div>
                                  <div className="flex items-center justify-between mb-2">
                                    <span className="text-xs font-bold text-indigo-400 font-mono">
                                      {raidBoss?.icon || '👹'} {raidBoss?.name.split(' (')[0] || '未知王'}
                                    </span>
                                    <span className={`text-[11px] px-2.5 py-0.5 rounded-full font-bold ${participantInfo ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}`}>
                                      {enrollmentStatus}
                                    </span>
                                  </div>
                                  <h4 className="text-sm font-extrabold text-slate-200 line-clamp-1">{raid.title}</h4>
                                  {finalizedTimeStr ? (
                                    <p className="text-xs text-amber-300 font-bold mt-1">📅 出團時間：{finalizedTimeStr} 👑</p>
                                  ) : (
                                    <p className="text-xs text-slate-400 mt-1 italic">⏰ 出團時間投票中</p>
                                  )}
                                </div>
                                <div className="text-[11px] text-slate-500 mt-2 border-t border-slate-855/60 pt-2 flex items-center justify-between">
                                  <span>出發 ➜</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}

                  <div className="flex items-center justify-between mb-5">
                    <h3 className="text-xl font-black text-slate-100 flex items-center space-x-2.5">
                      <span>⚔️ 目前進行中的遠征隊</span>
                      <span className="bg-slate-800 text-slate-400 px-3 py-1 rounded-full text-xs font-bold">
                        {raids.length}
                      </span>
                    </h3>
                  </div>

                  {raids.length === 0 ? (
                    <div className="bg-slate-900/40 border border-slate-800/80 rounded-3xl p-16 text-center">
                      <span className="text-6xl block mb-4">🦖</span>
                      <h4 className="text-slate-300 font-bold text-xl">目前沒有任何發起的遠征隊</h4>
                      <p className="text-slate-500 text-sm mt-2">立刻點選上方「發起全新遠征隊」來揪團打王吧！</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {raids.map((raid) => {
                        const raidBoss = bosses.find(b => b.id === raid.bossId);
                        const participantCount = raid.participants?.length || 0;
                        const voteCount = raid.votes?.length || 0;
                        const hasFinalTime = typeof raid.finalTimeIndex === 'number' && raid.proposedTimes?.[raid.finalTimeIndex];

                        return (
                          <div 
                            key={raid.id}
                            onClick={() => setCurrentRaidId(raid.id)}
                            className={`bg-slate-900 hover:bg-slate-855 border rounded-3xl p-6 cursor-pointer transition transform hover:-translate-y-1 shadow-lg flex flex-col justify-between ${hasFinalTime ? 'border-amber-500/50 shadow-amber-500/5' : 'border-slate-800'}`}
                          >
                            <div>
                              <div className="flex items-center justify-between mb-4">
                                <span className={`px-3 py-1 text-xs font-black rounded-lg text-white bg-gradient-to-r ${raidBoss?.color || 'from-slate-600 to-slate-700'}`}>
                                  {raidBoss?.icon || '👹'} {raidBoss?.name.split(' (')[0] || '未知王'}
                                </span>
                                <span className="text-xs text-slate-400">
                                  開團者: <span className="text-slate-200 font-bold">{raid.creatorIgn}</span>
                                </span>
                              </div>

                              <h4 className="text-xl font-extrabold text-slate-100 mb-2.5 line-clamp-1">{raid.title}</h4>
                              <p className="text-slate-400 text-sm line-clamp-2 mb-4 bg-slate-950/40 p-3 rounded-xl border border-slate-800/60 min-h-[56px] leading-relaxed">
                                {raid.notes || "沒有提供備註說明。"}
                              </p>

                              {/* 💡 大廳卡片同步顯示黃底確定時間 */}
                              {hasFinalTime && (
                                <div className="mt-2.5 bg-amber-400 text-slate-950 text-xs font-black px-3.5 py-2 rounded-xl flex items-center space-x-1.5 w-max select-none shadow">
                                  <span>📅 出團時間：{formatDateTime(raid.proposedTimes[raid.finalTimeIndex])} 👑</span>
                                </div>
                              )}
                            </div>

                            <div className="flex items-center justify-between text-sm border-t border-slate-800 pt-4 mt-4">
                              <div className="flex space-x-4 text-slate-300 font-semibold">
                                <span className="flex items-center space-x-1.5">
                                  <span>👥</span>
                                  <strong>{participantCount}</strong>
                                  <span>人報名</span>
                                </span>
                                <span className="flex items-center space-x-1.5">
                                  <span>🗳️</span>
                                  <strong>{voteCount}</strong>
                                  <span>人投票</span>
                                </span>
                              </div>
                              <span className="text-indigo-400 font-bold hover:underline flex items-center space-x-1">
                                <span>進入揪團系統 ➜</span>
                              </span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ) : (
                /* 2. 遠征隊詳細主控台 */
                <div>
                  <button 
                    onClick={() => setCurrentRaidId(null)}
                    className="mb-5 flex items-center space-x-1.5 text-sm md:text-base text-slate-400 hover:text-white transition font-bold"
                  >
                    <span>⬅ 返回大廳列表</span>
                  </button>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    {/* 左欄：基本資訊與投票 */}
                    <div className="lg:col-span-3 space-y-6">
                      <div className="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-xl">
                        <div className={`p-8 bg-gradient-to-r ${boss?.color || 'from-slate-700 to-black'} text-white relative`}>
                          <div className="absolute right-6 top-6 opacity-20 text-7xl">{boss?.icon || '👹'}</div>
                          <span className="bg-black/30 text-white font-bold text-xs px-3 py-1 rounded-full uppercase tracking-wider backdrop-blur">
                            遠征隊出征
                          </span>
                          <h2 className="text-2xl md:text-3xl font-black mt-4">{activeRaid.title}</h2>
                          <p className="text-white/90 text-sm md:text-base mt-2">{boss?.name || '未知 Boss'} • 團隊上限最多 {boss?.maxPlayers || 18} 人</p>
                        </div>

                        <div className="p-6 space-y-4">
                          <div>
                            <h4 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">隊伍備註 / 戰術要求</h4>
                            <div className="p-4 bg-slate-950/60 rounded-xl border border-slate-800 text-sm md:text-base text-slate-300 leading-relaxed whitespace-pre-wrap">
                              {activeRaid.notes || "團長沒有提供詳細備註。"}
                            </div>
                          </div>

                          <div className="flex flex-wrap items-center justify-between gap-3 pt-3 text-sm text-slate-400 border-t border-slate-855">
                            <div>
                              發起人：<strong className="text-slate-200">{activeRaid.creatorIgn}</strong>
                            </div>
                            <div className="flex space-x-2">
                              <button
                                onClick={() => copyGroupFormat(activeRaid)}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-xl transition text-xs md:text-sm shadow-sm"
                              >
                                📋 複製公告排班表
                              </button>
                              
                              {/* 💡 編輯與刪除本團：現在只提供給已登入管理員 */}
                              {isCreator && (
                                <>
                                  <button
                                    onClick={startEditingRaid}
                                    className="bg-amber-600 hover:bg-amber-700 text-white font-bold px-4 py-2 rounded-xl transition text-xs md:text-sm shadow-sm"
                                  >
                                    ✏️ 編輯此團
                                  </button>
                                  <button
                                    onClick={() => handleDeleteRaid(activeRaid.id)}
                                    className="bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900 text-rose-300 px-4 py-2 rounded-xl transition text-xs md:text-sm"
                                  >
                                    🗑️ 刪除此團
                                  </button>
                                </>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* 時間投票區 */}
                      <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                        <div className="flex items-center justify-between mb-4 border-b border-slate-800 pb-4">
                          <div>
                            <h3 className="text-lg md:text-xl font-extrabold text-white">📅 候選出團時間投票</h3>
                            <p className="text-xs md:text-sm text-slate-400 mt-1">
                              請選擇可以配合的時間。<span className="text-amber-400 font-bold">（以右上角選取角色投票，再次點擊已選選項可「智慧反選」取消，自動綁定角色備註：{activeCharacter.memo || "無"}）</span>
                            </p>
                          </div>
                        </div>

                        <div className="space-y-6">
                          {activeRaid.proposedTimes?.map((time, idx) => {
                            const yesVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'yes') || [];
                            const maybeVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'maybe') || [];
                            const noVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'no') || [];

                            // 💡 投票比對時加入 Job 核對，實現同帳號/同名不同職業的獨立狀態展現
                            const myVoteRecord = activeRaid.votes?.find(v => v.userId === customUid && v.ign === activeCharacter.ign && v.job === activeCharacter.job);
                            const myChoice = myVoteRecord?.votes?.[idx] || null;

                            const isFinalized = activeRaid.finalTimeIndex === idx;

                            // 💡 投票名冊排班顯示 (💡 100% 護眼微縮：將 w-4.5 修復為 Tailwind 合規 w-4 圖示，徹底杜絕遮擋與越界)
                            const renderVoterBadges = (votersList, badgeColor, emoji) => {
                              if (votersList.length === 0) return null;
                              return (
                                <div className="flex flex-wrap gap-2.5 mt-2">
                                  {votersList.map((voter, vIdx) => {
                                    // 💡 複合鍵匹配核對：同時核對 userId, ign, job
                                    const alreadyInRaid = activeRaid.participants?.some(p => p.userId === voter.userId && p.ign === voter.ign && p.job === voter.job);
                                    return (
                                      <div 
                                        key={voter.userId + '-' + voter.ign + '-' + voter.job + '-' + vIdx}
                                        className="inline-flex items-center space-x-2 bg-slate-950 border border-slate-805 px-3 py-1.5 rounded-xl text-sm transition hover:border-slate-750 max-w-full truncate"
                                      >
                                        <span className="text-base shrink-0">{emoji}</span>
                                        <span className="font-extrabold text-slate-100 truncate">{voter.ign}</span>
                                        
                                        {/* 💡 職業與等級徽章：改為精緻膠囊元件，且職業圖示縮小到合適的 w-4 h-4，文字與等級不再遮擋，具備極佳護眼高對比度 */}
                                        <span className="text-[11px] text-slate-400 font-bold shrink-0 flex items-center space-x-1 bg-slate-900 border border-slate-800/80 px-2 py-0.5 rounded-lg select-none">
                                          {voter.job && renderJobIcon(voter.job, "w-4 h-4")}
                                          <span className="text-slate-300 font-extrabold">{voter.job || '無職業'}</span>
                                          <span className="text-slate-500">•</span>
                                          <span className="text-white font-mono">Lv.{voter.level || '?'}</span>
                                        </span>

                                        {/* 投票備註顯示 */}
                                        {voter.memo && (
                                          <span className="text-[10px] bg-slate-900 border border-slate-800/80 px-1.5 py-0.5 rounded text-amber-300 truncate max-w-[120px]" title={voter.memo}>
                                            💬 {voter.memo}
                                          </span>
                                        )}
                                        {isCreator && (
                                          alreadyInRaid ? (
                                            <span className="text-emerald-400 font-black ml-1.5 text-base shrink-0">✓</span>
                                          ) : (
                                            <button
                                              onClick={(e) => {
                                                e.stopPropagation();
                                                handleQuickEnroll(activeRaid.id, voter);
                                              }}
                                              className="ml-2 bg-indigo-600 hover:bg-indigo-500 text-white font-black px-2 py-0.5 rounded text-xs transition active:scale-95 shrink-0"
                                            >
                                              ➕ 錄取
                                            </button>
                                          )
                                        )}
                                      </div>
                                    );
                                  })}
                                </div>
                              );
                            };

                            return (
                              <div 
                                key={idx} 
                                className={`p-5 rounded-2xl border transition-all duration-350 flex flex-col gap-4 ${isFinalized ? 'border-amber-400 bg-amber-500/20 shadow-xl shadow-amber-500/10 ring-2 ring-amber-400/50' : 'bg-slate-950/40 border-slate-800'}`}
                              >
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                  <div className="flex-1">
                                    <div className="flex items-center space-x-2.5">
                                      <span className="text-xs font-bold text-indigo-400 font-mono">候選時間 #{idx + 1}</span>
                                      {/* 💡 確定出團時間的黃底金邊高亮顯示 (解決圖 4 與黃底標示需求 👑) */}
                                      {isFinalized && (
                                        <span className="bg-amber-400 text-slate-950 text-[10.5px] font-black px-2.5 py-0.5 rounded-lg select-none shadow animate-pulse">
                                          ★ 最終確定出團時間
                                        </span>
                                      )}
                                    </div>
                                    <h4 className="text-lg font-bold text-slate-200 mt-0.5">{formatDateTime(time)}</h4>
                                  </div>

                                  <div className="flex items-center space-x-2">
                                    <button
                                      onClick={() => handleVoteTime(activeRaid.id, idx, 'yes')}
                                      className={`px-4 py-2 rounded-xl text-sm font-bold transition ${myChoice === 'yes' ? 'bg-emerald-600 text-white shadow shadow-emerald-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                    >
                                      🟢 可以
                                    </button>
                                    <button
                                      onClick={() => handleVoteTime(activeRaid.id, idx, 'maybe')}
                                      className={`px-4 py-2 rounded-xl text-sm font-bold transition ${myChoice === 'maybe' ? 'bg-amber-600 text-white shadow shadow-amber-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                    >
                                      🟡 也許
                                    </button>
                                    <button
                                      onClick={() => handleVoteTime(activeRaid.id, idx, 'no')}
                                      className={`px-4 py-2 rounded-xl text-sm font-bold transition ${myChoice === 'no' ? 'bg-rose-600 text-white shadow shadow-rose-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                    >
                                      🔴 不行
                                    </button>

                                    {/* 💡 管理員一鍵確定與取消此時間按鈕 */}
                                    {isCreator && (
                                      <button
                                        type="button"
                                        onClick={() => handleFinalizeTime(activeRaid.id, idx)}
                                        className={`ml-2 px-3.5 py-2 rounded-xl text-xs font-black transition ${isFinalized ? 'bg-slate-900 border border-amber-500/40 text-amber-400 hover:bg-slate-850' : 'bg-amber-400 text-slate-950 hover:bg-amber-300'}`}
                                      >
                                        {isFinalized ? '❌ 取消確定' : '🎯 確定此時間'}
                                      </button>
                                    )}
                                  </div>
                                </div>

                                <div className="border-t border-slate-800/85 pt-3 space-y-2">
                                  {yesVotes.length > 0 && (
                                    <div>
                                      <span className="text-xs text-emerald-400 font-bold block mb-1">🟢 可以配合的隊員：</span>
                                      {renderVoterBadges(yesVotes, 'text-emerald-400', '🟢')}
                                    </div>
                                  )}
                                  {maybeVotes.length > 0 && (
                                    <div>
                                      <span className="text-xs text-amber-400 font-bold block mb-1">🟡 可能配合的隊員：</span>
                                      {renderVoterBadges(maybeVotes, 'text-amber-400', '🟡')}
                                    </div>
                                  )}
                                  {noVotes.length > 0 && (
                                    <div>
                                      <span className="text-xs text-rose-400 font-bold block mb-1">🔴 無法配合的隊員：</span>
                                      {renderVoterBadges(noVotes, 'text-rose-400', '🔴')}
                                    </div>
                                  )}
                                  {yesVotes.length === 0 && maybeVotes.length === 0 && noVotes.length === 0 && (
                                    <span className="text-slate-600 text-xs italic block py-1">目前尚無人對此時間段投票</span>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>

                    {/* 右欄：報名與出團管理 💡已完全移除多餘的 SignUp 面板，出團錄取一律直接由投票名單一鍵錄取！ */}
                    <div className="space-y-6">
                      {isCreator && (
                        <div className="bg-slate-900 border border-amber-500/20 rounded-3xl p-6 shadow-xl">
                          <h3 className="text-base font-extrabold text-amber-400 mb-1.5">👑 團長排班工具</h3>
                          <p className="text-xs text-slate-400 mb-4 leading-relaxed">請利用下方各隊名單中卡片底部的分組按鈕，直接將人員錄取、歸類或移出，變更將會即時同步！</p>
                          <button
                            onClick={() => handleResetRaid(activeRaid.id)}
                            className="w-full bg-slate-950 hover:bg-slate-900 border border-amber-500/30 text-amber-400 font-bold py-3 rounded-xl text-xs transition"
                          >
                            🔄 一鍵清空出團名單與投票
                          </button>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* 分組名單 */}
                  {(() => {
                    const participants = activeRaid.participants || [];
                    const party1 = participants.filter(p => p.party === '1');
                    const party2 = participants.filter(p => p.party === '2');
                    const party3 = participants.filter(p => p.party === '3');
                    const reserves = participants.filter(p => p.party === 'reserve' || !p.party);

                    const renderRosterGroup = (title, pList, groupKey, color) => {
                      const slots = [...pList];
                      while (slots.length < 6) {
                        slots.push({ isPlaceholder: true });
                      }

                      return (
                        <div className="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl flex flex-col justify-between">
                          <div>
                            {/* 小隊標題 */}
                            <div className="flex items-center justify-between border-b border-slate-800 pb-3.5 mb-3.5 gap-2">
                              <h4 className="font-black text-base flex items-center space-x-2 min-w-0">
                                <span className={`w-3 h-3 rounded-full shrink-0 ${color}`} />
                                <span className="text-slate-200 truncate">{title.split(' (')[0]}</span>
                              </h4>
                              <span className="text-xs font-bold bg-slate-855 text-slate-400 px-2.5 py-0.5 rounded-full whitespace-nowrap shrink-0">
                                {pList.length} / 6
                              </span>
                            </div>

                            {/* 6格槽位列表 */}
                            <div className="space-y-3.5">
                              {slots.map((p, idx) => {
                                if (p.isPlaceholder) {
                                  return (
                                    <div 
                                      key={`empty-${groupKey}-${idx}`} 
                                      className="border border-dashed border-slate-800/80 bg-slate-950/20 rounded-2xl py-3 px-4 flex items-center justify-between text-slate-600 text-sm italic select-none"
                                    >
                                      <div className="flex items-center space-x-2.5">
                                        <span className="font-mono font-bold text-slate-700 text-sm">{idx + 1}.</span>
                                        <span className="text-slate-500 tracking-wide text-sm font-medium">🪹 待分配席位</span>
                                      </div>
                                      <span className="text-xs border border-dashed border-slate-800/80 px-2 py-0.5 rounded-lg font-bold text-slate-700 font-mono tracking-wider">EMPTY</span>
                                    </div>
                                  );
                                }

                                return (
                                  <div 
                                    key={p.userId + '-' + p.ign + '-' + p.job} 
                                    className="bg-slate-950/50 hover:bg-slate-950 p-5 rounded-2xl border border-slate-800 flex flex-col gap-3.5 transition shadow-sm hover:border-slate-750"
                                  >
                                    {/* 頂行：序號、IGN(大字體)、職業 Badge */}
