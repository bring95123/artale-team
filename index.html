                                  return (
                                    <div 
                                      key={`empty-${groupKey}-${idx}`} 
                                      className="border border-dashed border-slate-800/80 bg-slate-950/20 rounded-2xl py-3 px-4 flex items-center justify-between text-slate-600 text-sm italic select-none"
                                    >
                                      <div className="flex items-center space-x-2.5">
                                        <span className="font-mono font-bold text-slate-700 text-sm">{idx + 1}.</span>
                                        <span className="text-slate-500 tracking-wide text-sm font-medium">🪹 待分配席位</span>
                                      </div>
                                      <span className="text-xs border border-dashed border-slate-800/80 px-2 py-0.5 rounded-lg font-bold text-slate-700 font-mono tracking-wider">EMPTY</span>
                                    </div>
                                  );
                                }

                                return (
                                  <div 
                                    key={p.userId + '-' + p.ign + '-' + p.job} 
                                    className="bg-slate-950/50 hover:bg-slate-950 p-4 rounded-2xl border border-slate-800 flex flex-col gap-3 transition shadow-sm hover:border-slate-755"
                                  >
                                    <div className="flex flex-col gap-2 min-w-0">
                                      <div className="flex items-start justify-between min-w-0 gap-2">
                                        <div className="flex items-start space-x-2 min-w-0">
                                          <span className="font-mono font-bold text-slate-500 text-base mt-0.5">{idx + 1}.</span>
                                          <span className="font-black text-slate-100 text-[17px] break-all whitespace-normal select-text leading-tight" title={p.ign}>{p.ign}</span>
                                        </div>

                                        {/* 完美融入 Discord 身分卡 👑 */}
                                        {p.discord && (
                                          <span className="inline-flex items-center space-x-1 bg-[#5865F2]/10 border border-[#5865F2]/30 px-2 py-0.5 rounded-lg text-[10px] font-black text-indigo-300 shadow shrink-0">
                                            <img src={p.discord.avatar} className="w-4 h-4 rounded-full object-cover" />
                                            <span className="max-w-[75px] truncate">@{p.discord.username}</span>
                                          </span>
                                        )}
                                      </div>
                                      
                                      <div className="flex flex-wrap items-center gap-1.5">
                                        <span className="text-xs bg-slate-900/95 text-indigo-300 px-2.5 py-1 rounded-lg font-black border border-slate-800 shrink-0 select-none flex items-center space-x-1.5">
                                          {renderJobIcon(p.job, "w-3.5 h-3.5")}
                                          <span>{p.job}</span>
                                        </span>
                                        <span className="text-xs bg-slate-900/95 text-slate-300 px-2 py-1 rounded-lg font-mono font-bold border border-slate-800 shrink-0 select-none">
                                          Lv. {p.level}
                                        </span>
                                      </div>
                                    </div>

                                    {p.memo && (
                                      <div className="bg-slate-900/90 border border-amber-500/10 text-amber-300 text-xs px-3.5 py-2.5 rounded-xl flex items-start space-x-2 leading-relaxed break-all">
                                        <span className="shrink-0 text-amber-400 mt-0.5">💬</span>
                                        <span className="font-medium">{p.memo}</span>
                                      </div>
                                    )}

                                    {isCreator && (
                                      <div className="flex flex-col gap-2 mt-1 pt-2.5 border-t border-slate-800/80 select-none">
                                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">調整隊長/小隊：</span>
                                        <div className="flex flex-wrap gap-1.5 items-center justify-between">
                                          <div className="flex flex-wrap gap-1">
                                            {groupKey !== '1' && (
                                              <button 
                                                type="button"
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, p.job, '1')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-[11px] px-2 py-1.5 rounded-lg border border-slate-800 transition font-bold"
                                              >
                                                一隊
                                              </button>
                                            )}
                                            {groupKey !== '2' && partyCount >= 2 && (
                                              <button 
                                                type="button"
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, p.job, '2')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-[11px] px-2 py-1.5 rounded-lg border border-slate-800 transition font-bold"
                                              >
                                                二隊
                                              </button>
                                            )}
                                            {groupKey !== '3' && partyCount >= 3 && (
                                              <button 
                                                type="button"
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, p.job, '3')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-[11px] px-2 py-1.5 rounded-lg border border-slate-800 transition font-bold"
                                              >
                                                三隊
                                              </button>
                                            )}
                                            {groupKey !== 'reserve' && (
                                              <button 
                                                type="button"
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, p.job, 'reserve')} 
                                                className="bg-slate-900 hover:bg-slate-855 text-slate-200 text-[11px] px-2 py-1.5 rounded-lg border border-slate-800 transition font-bold"
                                              >
                                                候補
                                              </button>
                                            )}
                                          </div>
                                          <button 
                                            type="button"
                                            onClick={() => handleKickParticipant(activeRaid.id, p.userId, p.ign, p.job)} 
                                            className="bg-rose-955/40 hover:bg-rose-900/60 border border-rose-900/50 text-rose-300 text-[11px] px-2 py-1.5 rounded-lg transition font-bold shrink-0"
                                          >
                                            剔除
                                          </button>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </div>
                      );
                    };

                    return (
                      <div className="mt-8">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-5 gap-3">
                          <h3 className="text-xl font-black text-white">👥 遠征小隊分組名單</h3>
                          
                          {isCreator && (
                            <div className="flex items-center space-x-2 bg-slate-900/60 p-1.5 rounded-xl border border-slate-800/80">
                              <span className="text-xs text-slate-400 px-2 font-bold select-none">調整組數:</span>
                              {partyCount < 2 && (
                                <button 
                                  type="button"
                                  onClick={() => handleUpdatePartyCount(activeRaid.id, 2)} 
                                  className="bg-emerald-600/30 hover:bg-emerald-600 border border-emerald-500/40 text-emerald-300 text-xs font-bold px-3 py-1.5 rounded-lg transition active:scale-95"
                                >
                                  ➕ 增加遠征二隊
                                </button>
                              )}
                              {partyCount < 3 && partyCount >= 2 && (
                                <button 
                                  type="button"
                                  onClick={() => handleUpdatePartyCount(activeRaid.id, 3)} 
                                  className="bg-violet-600/30 hover:bg-violet-600 border border-violet-500/40 text-violet-300 text-xs font-bold px-3 py-1.5 rounded-lg transition active:scale-95"
                                >
                                  ➕ 增加遠征三隊
                                </button>
                              )}
                              {partyCount > 1 && (
                                <button 
                                  type="button"
                                  onClick={() => handleUpdatePartyCount(activeRaid.id, partyCount - 1)} 
                                  className="bg-slate-800/60 hover:bg-slate-755 border border-slate-700 text-slate-300 text-xs font-bold px-3 py-1.5 rounded-lg transition active:scale-95"
                                >
                                  ➖ 減少小隊
                                </button>
                              )}
                            </div>
                          )}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          {renderRosterGroup('遠征一隊 (Party 1)', party1, '1', 'bg-blue-500')}
                          {partyCount >= 2 && renderRosterGroup('遠征二隊 (Party 2)', party2, '2', 'bg-emerald-500')}
                          {partyCount >= 3 && renderRosterGroup('遠征三隊 (Party 3)', party3, '3', 'bg-violet-500')}
                          {renderRosterGroup('候補與預備名單 (Reserves)', reserves, 'reserve', 'bg-slate-500')}
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}
            </main>
          </div>

          {/* 💡 浮動討論區按鈕 & 懸浮即時聊天窗 */}
          {activeRaid && (
            <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end space-y-4">
              {isChatOpen && (
                <div className={`bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-2xl flex flex-col transition-all duration-300 ease-in-out animate-in fade-in slide-in-from-bottom-5 ${
                  isChatMaximized 
                    ? "fixed inset-4 md:inset-10 md:m-auto md:w-full md:max-w-4xl md:h-[80vh] h-[calc(100vh-2rem)] w-[calc(100vw-2rem)] z-50" 
                    : "h-[520px] w-96 max-w-[calc(100vw-2rem)] max-h-[70vh]"
                }`}>
                  <div className="border-b border-slate-800 pb-3 mb-3 flex items-center justify-between">
                    <div className="flex items-center space-x-2">
                      <span className="text-xl">💬</span>
                      <h3 className="font-extrabold text-base text-slate-100">遠征即時討論區</h3>
                      <span className="bg-indigo-500/10 text-indigo-400 text-[10px] px-2.5 py-0.5 rounded-full font-bold">
                        {chatMessages.length} 則訊息
                      </span>
                    </div>
                    
                    <div className="flex items-center space-x-2.5">
                      <span className="text-[10px] text-slate-500 animate-pulse">● 實時</span>
                      
                      {/* 放大全螢幕按鈕 */}
                      <button 
                        type="button"
                        onClick={() => setIsChatMaximized(!isChatMaximized)}
                        className="text-slate-400 hover:text-white text-sm font-bold p-1 bg-slate-950/60 rounded-lg border border-slate-800/80 hover:border-slate-700 transition"
                        title={isChatMaximized ? "恢復原本大小" : "放大至全螢幕"}
                      >
                        {isChatMaximized ? (
                          <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7" />
                          </svg>
                        ) : (
                          <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                          </svg>
                        )}
                      </button>

                      {/* 關閉按鈕 */}
                      <button 
                        onClick={() => setIsChatOpen(false)}
                        className="text-slate-400 hover:text-white text-sm font-bold p-1 bg-slate-950/60 rounded-lg border border-slate-800/80 hover:border-slate-700 transition"
                      >
                        ✕
                      </button>
                    </div>
                  </div>

                  {/* 討論對話框 - 實時加載 Discord 用戶大頭貼與身分 👑 */}
                  <div 
                    ref={chatContainerRef}
                    className="flex-1 overflow-y-auto pr-1 space-y-4 mb-3 scrollbar-thin scrollbar-thumb-slate-800"
                  >
                    {chatMessages.length === 0 ? (
                      <div className="h-full flex flex-col items-center justify-center text-center p-6 text-slate-600 italic">
                        <span className="text-3xl mb-1">💬</span>
                        <p className="text-xs">目前還沒有討論訊息，快來留言確認並協調出團時間吧！</p>
                      </div>
                    ) : (
                      (() => {
                        let hasRenderedRedLine = false;
                        return chatMessages.map((msg, index) => {
                          const isMe = msg.userId === customUid && msg.ign === activeCharacter.ign;
                          const msgTime = msg.timestamp || (msg.createdAt?.seconds ? msg.createdAt.seconds * 1000 : 0);
                          
                          const showRedLine = msgTime > chatOpenedLastReadTime && index > 0 && !hasRenderedRedLine;
                          if (showRedLine) {
                            hasRenderedRedLine = true;
                          }

                          const msgDate = new Date(msgTime);
                          const timeString = msgDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                          const isRecalled = msg.recalled === true;

                          return (
                            <React.Fragment key={msg.id || index}>
                              {showRedLine && (
                                <div className="flex items-center my-4 select-none">
                                  <div className="flex-1 border-t-2 border-rose-500/70"></div>
                                  <span className="mx-3 text-[10px] font-extrabold text-rose-400 bg-rose-955 border border-rose-500/45 px-3 py-1 rounded-md tracking-wider flex items-center space-x-1.5 shadow-md shadow-rose-950/50">
                                    <span className="w-1.5 h-1.5 bg-rose-500 rounded-full animate-ping"></span>
                                    <span>以下為新訊息</span>
                                    <span className="opacity-50 font-normal font-mono">({timeString})</span>
                                  </span>
                                  <div className="flex-1 border-t-2 border-rose-500/70"></div>
                                </div>
                              )}

                              <div className={`flex flex-row items-start space-x-2.5 ${isMe ? 'flex-row-reverse space-x-reverse' : ''} group`}>
                                {/* 左側頭像區域：優先採用 Discord 頭像，其次職業 Icon */}
                                {msg.discord ? (
                                  <img 
                                    src={msg.discord.avatar} 
                                    className="w-9 h-9 rounded-full border border-[#5865F2]/45 shrink-0 mt-1 shadow shadow-[#5865F2]/10 object-cover" 
                                    alt="User DC Avatar"
                                  />
                                ) : (
                                  <div className="mt-1 shrink-0">
                                    {renderJobIcon(msg.job, "w-9 h-9")}
                                  </div>
                                )}

                                <div className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} space-y-1 max-w-[80%]`}>
                                  {/* 頂部身分條 */}
                                  <div className={`flex flex-wrap items-center gap-1.5 text-xs ${isMe ? 'flex-row-reverse' : ''}`}>
                                    <span className="font-black text-slate-100 tracking-wide">{msg.ign}</span>
                                    
                                    {msg.discord && (
                                      <span className="text-[9px] font-bold text-slate-400 bg-slate-950 px-1.5 py-0.5 rounded border border-slate-800">
                                        @{msg.discord.username}
                                      </span>
                                    )}

                                    <span className="text-[10px] text-slate-500 font-mono select-none">
                                      {timeString}
                                    </span>
                                  </div>

                                  {/* 對話泡泡 */}
                                  <div className={`px-4 py-2.5 rounded-2xl text-sm leading-relaxed break-all ${
                                    isMe 
                                      ? isRecalled
                                        ? 'bg-slate-900/40 text-slate-500 border border-slate-800/40 rounded-tr-none italic'
                                        : 'bg-indigo-600 text-white rounded-tr-none shadow shadow-indigo-600/10' 
                                      : isRecalled
                                        ? 'bg-slate-900/40 text-slate-500 border border-slate-800/40 rounded-tl-none italic'
                                        : 'bg-slate-950 text-slate-200 rounded-tl-none border border-slate-800'
                                  }`}>
                                    {isRecalled ? (
                                      <span className="flex items-center space-x-1.5 opacity-85">
                                        <span>🚫</span>
                                        <span>此訊息已收回</span>
                                      </span>
                                    ) : (
                                      msg.text
                                    )}
                                  </div>

                                  {/* 收回與管理動作 */}
                                  {!isRecalled && (
                                    <div className="flex space-x-2 text-[10px] text-slate-500 mt-0.5 opacity-0 group-hover:opacity-100 transition select-none">
                                      {isMe && (
                                        <button 
                                          type="button" 
                                          onClick={() => handleRecallMessage(msg.id)}
                                          className="hover:text-indigo-400 hover:underline"
                                        >
                                          [收回]
                                        </button>
                                      )}
                                      {isAdminLoggedIn && (
                                        <button 
                                          type="button" 
                                          onClick={() => handleDeleteMessage(msg.id)}
                                          className="hover:text-rose-400 hover:underline"
                                        >
                                          [刪除]
                                        </button>
                                      )}
                                    </div>
                                  )}
                                </div>
                              </div>
                            </React.Fragment>
                          );
                        });
                      })()
                    )}
                  </div>

                  {/* 輸入欄 */}
                  <form onSubmit={handleSendMessage} className="flex gap-2 border-t border-slate-800/80 pt-3">
                    <input
                      type="text"
                      value={chatInput}
                      onChange={(e) => setChatInput(e.target.value)}
                      placeholder={activeCharacter.ign ? "輸入訊息與大家討論..." : "請先設定角色卡才能發言"}
                      disabled={!activeCharacter.ign}
                      className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none placeholder-slate-600 disabled:opacity-50"
                    />
                    <button
                      type="submit"
                      disabled={!chatInput.trim() || !activeCharacter.ign}
                      className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-black px-4 py-2 rounded-xl transition disabled:opacity-40 animate-pulse"
                    >
                      傳送
                    </button>
                  </form>
                </div>
              )}

              {/* 滾動跟隨懸浮按鈕 */}
              <button
                onClick={() => setIsChatOpen(!isChatOpen)}
                className="bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white font-black p-4 rounded-full shadow-lg shadow-indigo-500/30 hover:shadow-indigo-500/50 hover:scale-105 active:scale-95 transition-all duration-200 flex items-center justify-center relative group select-none"
              >
                <span className="text-2xl">💬</span>
                <span className="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-300 ease-out whitespace-nowrap font-extrabold text-xs pl-0 group-hover:pl-2">
                  遠征即時討論區
                </span>
                
                {getUnreadCount(activeRaid.id) > 0 && (
                  <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full ring-2 ring-slate-950 animate-pulse select-none">
                    {getUnreadCount(activeRaid.id)}
                  </span>
                )}
              </button>
            </div>
          )}

          {/* 底部隱私資訊 */}
          <footer className="max-w-6xl mx-auto w-full px-4 py-8 text-center text-xs text-slate-700 border-t border-slate-900 mt-10 font-semibold">
            <p>© 2026 NyxShade 遠征隊. All Rights Reserved.</p>
            <div className="mt-2 space-x-3">
              {isAdminLoggedIn ? (
                <>
                  <button onClick={() => setShowAdminConsole(true)} className="text-amber-500 hover:text-amber-400 hover:underline font-bold transition">🔑 開啟管理員控制台</button>
                  <span className="text-slate-800">•</span>
                  <button onClick={handleAdminLogout} className="text-rose-500 hover:text-rose-400 hover:underline transition">登出管理模式</button>
                </>
              ) : (
                <button onClick={() => setShowAdminLoginModal(true)} className="text-slate-600 hover:text-slate-500 hover:underline transition">🔑 系統管理者登入</button>
              )}
            </div>
          </footer>

          {/* ==========================================
              A. 發起揪團彈出視窗 
             ========================================== */}
          {isCreating && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm overflow-y-auto font-semibold">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-lg shadow-2xl relative my-8">
                <button onClick={() => setIsCreating(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl font-bold">✕</button>
                <h3 className="text-xl font-extrabold text-white mb-2">🍁 發起全新遠征隊揪團</h3>
                <p className="text-xs text-slate-400 mb-6">請選擇出團模式與預設小隊組數，設定您的挑戰主題！</p>

                <form onSubmit={handleCreateRaid} className="space-y-4 text-sm">
                  
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">1. 選擇揪團模式</label>
                    <div className="grid grid-cols-2 gap-3">
                      <button
                        type="button"
                        onClick={() => setNewRaid({ ...newRaid, mode: 'datetime' })}
                        className={`py-3 px-4 rounded-xl border text-center transition flex flex-col items-center justify-center gap-1 ${newRaid.mode !== 'interest' ? 'bg-indigo-600/20 border-indigo-500 text-white shadow' : 'bg-slate-950 border-slate-855 text-slate-400'}`}
                      >
                        <span className="font-bold text-xs">📅 指定日期時間</span>
                        <span className="text-[10px] opacity-75 font-normal">填寫具體時間供成員排班投票</span>
                      </button>
                      <button
                        type="button"
                        onClick={() => setNewRaid({ ...newRaid, mode: 'interest' })}
                        className={`py-3 px-4 rounded-xl border text-center transition flex flex-col items-center justify-center gap-1 ${newRaid.mode === 'interest' ? 'bg-indigo-600/20 border-indigo-500 text-white shadow' : 'bg-slate-950 border-slate-855 text-slate-400'}`}
                      >
                        <span className="font-bold text-xs">🙋 收集出團意願</span>
                        <span className="text-[10px] opacity-75 font-normal">只調查「可以/不行」線上再協同</span>
                      </button>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">2. 選擇挑戰 Boss</label>
                    <div className="grid grid-cols-2 gap-2 max-h-[160px] overflow-y-auto pr-1">
                      {bosses.map((b) => (
                        <button
                          key={b.id}
                          type="button"
                          onClick={() => {
                            const defaultParties = b.maxPlayers > 12 ? 3 : (b.maxPlayers > 6 ? 2 : 1);
                            setNewRaid({ ...newRaid, bossId: b.id, partyCount: defaultParties });
                          }}
                          className={`p-3 rounded-xl border text-left flex items-center space-x-2 transition ${newRaid.bossId === b.id ? 'bg-slate-800 border-indigo-500 shadow-md shadow-indigo-500/10' : 'bg-slate-950 border-slate-855 text-slate-300'}`}
                        >
                          <span className="text-2xl">{b.icon || '👹'}</span>
                          <div className="min-w-0 flex-1">
                            <p className="font-bold text-xs text-white truncate">{b.name.split(' (')[0]}</p>
                            <p className="text-[10px] text-slate-400 truncate">最多{b.maxPlayers}人</p>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">3. 設定預設小隊組數</label>
                    <div className="flex gap-2">
                      {[1, 2, 3].map((count) => (
                        <button
                          key={count}
                          type="button"
                          onClick={() => setNewRaid({ ...newRaid, partyCount: count })}
                          className={`flex-1 py-2.5 rounded-xl border text-center font-bold text-xs transition-all ${
                            newRaid.partyCount === count
                              ? 'bg-amber-500/20 border-amber-400 text-amber-300 shadow ring-1 ring-amber-450'
                              : 'bg-slate-950 border-slate-855 text-slate-400 hover:border-slate-800'
                          }`}
                        >
                          {count === 1 ? '🔵 一隊 (6人)' : count === 2 ? '🟢 二隊 (12人)' : '🟣 三隊 (18人)'}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">4. 揪團主題 / 團隊公告</label>
                    <input
                      type="text"
                      required
                      value={newRaid.title}
                      onChange={(e) => setNewRaid({ ...newRaid, title: e.target.value })}
                      placeholder="例：週六晚上普通炎魔首發團"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 focus:outline-none text-slate-100"
                    />
                  </div>

                  {newRaid.mode !== 'interest' && (
                    <div>
                      <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center justify-between">
                        <span>📅 候選日期與時間</span>
                        <button
                          type="button"
                          onClick={() => setNewRaid({ ...newRaid, proposedTimes: [...newRaid.proposedTimes, ''] })}
                          className="text-xs text-indigo-400 hover:underline font-bold"
                        >
                          + 新增時間段
                        </button>
                      </label>
                      <div className="space-y-2">
                        {newRaid.proposedTimes.map((time, index) => (
                          <div key={index} className="flex items-center space-x-2">
                            <input
                              type="datetime-local"
                              required
                              value={time}
                              onChange={(e) => {
                                const updated = [...newRaid.proposedTimes];
                                updated[index] = e.target.value;
                                setNewRaid({ ...newRaid, proposedTimes: updated });
                              }}
                              style={{ colorScheme: 'dark' }}
                              className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                            />
                            {newRaid.proposedTimes.length > 1 && (
                              <button
                                type="button"
                                onClick={() => {
                                  const updated = newRaid.proposedTimes.filter((_, i) => i !== index);
                                  setNewRaid({ ...newRaid, proposedTimes: updated });
                                }}
                                className="text-rose-500 px-2 font-bold"
                              >
                                ✕
                              </button>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">詳細備註</label>
                    <textarea
                      value={newRaid.notes}
                      onChange={(e) => setNewRaid({ ...newRaid, notes: e.target.value })}
                      placeholder="打王要求，自備藥水等..."
                      rows={3}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none resize-none font-semibold"
                    />
                  </div>

                  <div className="flex space-x-3 pt-3">
                    <button type="button" onClick={() => setIsCreating(false)} className="flex-1 bg-slate-855 py-2.5 rounded-xl text-slate-300">取消</button>
                    <button type="submit" className="flex-1 bg-gradient-to-r from-orange-500 to-amber-500 py-2.5 rounded-xl text-white font-bold">確認建立</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ==========================================
              F. 編輯遠征隊資訊與時間彈出視窗
             ========================================== */}
          {isEditingRaid && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm overflow-y-auto font-semibold">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-lg shadow-2xl relative my-8">
                <button onClick={() => setIsEditingRaid(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-amber-400 mb-2">✏️ 編輯遠征隊時間與設定</h3>
                <p className="text-xs text-slate-400 mb-6">修改本次揪團的王、公告主題、小隊組數 or 變更揪團模式。</p>

                <form onSubmit={handleSaveRaidEdit} className="space-y-4 text-sm">
                  
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">揪團模式</label>
                    <div className="grid grid-cols-2 gap-3">
                      <button
                        type="button"
                        onClick={() => setEditRaidData({ ...editRaidData, mode: 'datetime' })}
                        className={`py-2 px-3 rounded-xl border font-bold text-xs ${editRaidData.mode !== 'interest' ? 'bg-indigo-600/20 border-indigo-500 text-white shadow' : 'bg-slate-950 border-slate-855 text-slate-400'}`}
                      >
                        📅 指定日期時間
                      </button>
                      <button
                        type="button"
                        onClick={() => setEditRaidData({ ...editRaidData, mode: 'interest' })}
                        className={`py-2 px-3 rounded-xl border font-bold text-xs ${editRaidData.mode === 'interest' ? 'bg-indigo-600/20 border-indigo-500 text-white shadow' : 'bg-slate-950 border-slate-855 text-slate-400'}`}
                      >
                        🙋 收集出團意願
                      </button>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">挑戰 Boss</label>
                    <div className="grid grid-cols-2 gap-2 max-h-[160px] overflow-y-auto pr-1">
                      {bosses.map((b) => (
                        <button
                          key={b.id}
                          type="button"
                          onClick={() => {
                            const defaultParties = b.maxPlayers > 12 ? 3 : (b.maxPlayers > 6 ? 2 : 1);
                            setEditRaidData({ ...editRaidData, bossId: b.id, partyCount: defaultParties });
                          }}
                          className={`p-3 rounded-xl border text-left flex items-center space-x-2 transition ${editRaidData.bossId === b.id ? 'bg-slate-800 border-indigo-500 shadow-md shadow-indigo-500/10' : 'bg-slate-950 border-slate-855 text-slate-300'}`}
                        >
                          <span className="text-2xl">{b.icon || '👹'}</span>
                          <div className="min-w-0 flex-1">
                            <p className="font-bold text-xs text-white truncate">{b.name.split(' (')[0]}</p>
                            <p className="text-[10px] text-slate-400 truncate">最多{b.maxPlayers}人</p>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">設定小隊組數</label>
                    <div className="flex gap-2">
                      {[1, 2, 3].map((count) => (
                        <button
                          key={count}
                          type="button"
                          onClick={() => setEditRaidData({ ...editRaidData, partyCount: count })}
                          className={`flex-1 py-2 rounded-xl border text-center font-bold text-xs transition-all ${
                            editRaidData.partyCount === count
                              ? 'bg-amber-500/20 border-amber-400 text-amber-300 shadow'
                              : 'bg-slate-950 border-slate-855 text-slate-400 hover:border-slate-800'
                          }`}
                        >
                          {count === 1 ? '🔵 一隊' : count === 2 ? '🟢 二隊' : '🟣 三隊'}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">修改主題 / 團隊公告</label>
                    <input
                      type="text"
                      required
                      value={editRaidData.title}
                      onChange={(e) => setEditRaidData({ ...editRaidData, title: e.target.value })}
                      placeholder="例如：週六晚上普通炎魔首發團"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 focus:outline-none text-slate-100"
                    />
                  </div>

                  {editRaidData.mode !== 'interest' && (
                    <div>
                      <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center justify-between">
                        <span>📅 調整候選出團時間</span>
                        <button
                          type="button"
                          onClick={() => setEditRaidData({ ...editRaidData, proposedTimes: [...editRaidData.proposedTimes, ''] })}
                          className="text-xs text-indigo-400 hover:underline font-bold"
                        >
                          + 新增候選時間
                        </button>
                      </label>
                      <div className="space-y-2">
                        {editRaidData.proposedTimes.map((time, index) => (
                          <div key={index} className="flex items-center space-x-2">
                            <input
                              type="datetime-local"
                              required
                              value={time}
                              onChange={(e) => {
                                const updated = [...editRaidData.proposedTimes];
                                updated[index] = e.target.value;
                                setEditRaidData({ ...editRaidData, proposedTimes: updated });
                              }}
                              style={{ colorScheme: 'dark' }}
                              className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                            />
                            {editRaidData.proposedTimes.length > 1 && (
                              <button
                                type="button"
                                onClick={() => {
                                  const updated = editRaidData.proposedTimes.filter((_, i) => i !== index);
                                  setEditRaidData({ ...editRaidData, proposedTimes: updated });
                                }}
                                className="text-rose-500 px-2 font-bold"
                              >
                                ✕
                              </button>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">修改詳細備註</label>
                    <textarea
                      value={editRaidData.notes}
                      onChange={(e) => setEditRaidData({ ...editRaidData, notes: e.target.value })}
                      placeholder="打王戰術要求，或藥水等裝備限制..."
                      rows={3}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none resize-none"
                    />
                  </div>

                  <div className="flex space-x-3 pt-3">
                    <button type="button" onClick={() => setIsEditingRaid(false)} className="flex-1 bg-slate-855 py-2.5 rounded-xl text-slate-300">取消</button>
                    <button type="submit" className="flex-1 bg-gradient-to-r from-orange-500 to-amber-500 py-2.5 rounded-xl text-white font-bold">確認儲存</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ==========================================
              B. 個人檔案編輯 (已優化 Discord 綁定排版 👑)
             ========================================== */}
          {showProfileModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 w-full max-w-2xl shadow-2xl relative my-8">
                <button onClick={() => setShowProfileModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                
                <h3 className="text-2xl font-black text-white mb-2 flex items-center space-x-2">
                  <span>⚙️ 設定我的遊戲角色身分卡</span>
                </h3>
                <p className="text-sm text-slate-400 mb-6">
                  登錄多個遊戲身分。連結 Discord 帳號，角色卡與出團紀錄自動雲端備份漫遊！
                </p>

                {/* 🛡️ Discord 連結身分卡面板 */}
                <div className="mb-6 font-semibold">
                  {discordUser ? (
                    <div className="flex items-center justify-between bg-slate-950 border border-indigo-500/20 p-4 rounded-2xl shadow-inner">
                      <div className="flex items-center space-x-3.5 min-w-0">
                        <img 
                          src={discordUser.avatar} 
                          className="w-12 h-12 rounded-full border-2 border-[#5865F2] object-cover shrink-0" 
                          alt="Discord Avatar"
                        />
                        <div className="min-w-0">
                          <span className="text-[10px] bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded font-black block w-max select-none">
                            🟢 已啟用 Discord 雲端備份
                          </span>
                          <p className="text-sm font-black text-slate-100 mt-1 truncate">@{discordUser.username}</p>
                        </div>
                      </div>
                      <button
                        type="button"
                        onClick={handleDisconnectDiscord}
                        className="bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/20 text-rose-400 text-xs font-bold px-4 py-2 rounded-xl transition active:scale-95 shrink-0"
                      >
                        解除連結
                      </button>
                    </div>
                  ) : (
                    <div className="p-6 bg-slate-950 border border-slate-855 rounded-2xl text-center space-y-4">
                      <div className="flex items-center justify-center space-x-2">
                        <svg className="w-6 h-6 fill-[#5865F2]" viewBox="0 0 127.14 96.36">
                          <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.5-5c.9-.65,1.76-1.34,2.58-2a75.59,75.59,0,0,0,73,0c.83.68,1.69,1.37,2.58,2a68.43,68.43,0,0,1-10.5,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31.06-18.83C129.87,48.24,123.7,25.41,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69ZM42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
                        </svg>
                        <h4 className="text-sm font-black text-slate-200">連結 Discord 以漫遊保存進度</h4>
                      </div>
                      <p className="text-xs text-slate-500 max-w-md mx-auto leading-relaxed">
                        連結後，不論清除瀏覽器快取還是更換裝置，只要透過 Discord 登入即可一秒還原所有的多角色卡與排班數據！
                      </p>
                      <div>
                        {discordConfig?.clientId ? (
                          <a
                            href={getDiscordLoginUrl()}
                            className="inline-flex items-center justify-center space-x-2.5 bg-[#5865F2] hover:bg-[#4752C4] text-white font-extrabold px-6 py-3 rounded-xl transition shadow-lg transform active:scale-95 text-sm w-full sm:w-auto animate-pulse"
                          >
                            <span>⚡ 連結 Discord 帳號</span>
                          </a>
                        ) : (
                          <div className="text-xs text-slate-600 italic">
                            請在底部「管理者控制台」先完成 Discord Client ID 配置方能啟用。
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>

                {/* 角色表單區 - 💡 如果沒有登入 DC，則鎖定本區並提示 */}
                <div className="relative">
                  {!discordUser && (
                    <div className="absolute inset-0 z-10 bg-slate-900/80 backdrop-blur-sm rounded-2xl flex flex-col items-center justify-center text-center p-6 border border-slate-800">
                      <span className="text-4xl mb-3">🔒</span>
                      <h4 className="text-base font-black text-amber-400">出團角色卡已鎖定</h4>
                      <p className="text-xs text-slate-400 max-w-sm mt-2 leading-relaxed">
                        系統目前已啟用 Discord 強制安全綁定。<br />
                        請先點擊上方按鈕完成 <strong className="text-indigo-400">Discord 連結認證</strong> 即可解鎖建立、編輯與儲存角色卡！
                      </p>
                    </div>
                  )}

                  <div className={`space-y-4 max-h-[320px] overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-slate-800 font-semibold font-bold transition-all duration-300 ${!discordUser ? 'blur-sm pointer-events-none opacity-40 select-none' : ''}`}>
                    {tempCharacters.map((char, index) => (
                      <div key={index} className="p-5 bg-slate-950 border border-slate-800 rounded-2xl space-y-4 relative">
                        <div className="flex items-center justify-between">
                          <label className="flex items-center space-x-2.5 cursor-pointer">
                            <input
                              type="radio"
                              name="activeCharacter"
                              checked={tempActiveIndex === index}
                              onChange={() => setTempActiveIndex(index)}
                              className="text-indigo-600 focus:ring-indigo-500 bg-slate-900 border-slate-800 h-5 w-5"
                            />
                            <span className="flex items-center space-x-2">
                              {renderJobIcon(char.job, "w-4 h-4")}
                              <span className={`text-sm font-extrabold ${tempActiveIndex === index ? 'text-emerald-400' : 'text-slate-400'}`}>
                                {tempActiveIndex === index ? '🟢 設為當前出團主身分' : '設為當前出團身分'}
                              </span>
                            </span>
                          </label>

                          {tempCharacters.length > 1 && (
                            <button
                              type="button"
                              onClick={() => {
                                const updated = tempCharacters.filter((_, i) => i !== index);
                                setTempCharacters(updated);
                                if (tempActiveIndex >= updated.length) {
                                  setTempActiveIndex(0);
                                }
                              }}
                              className="text-rose-400 hover:text-rose-300 text-xs font-bold"
                            >
                              🗑️ 刪除此角色
                            </button>
                          )}
                        </div>

                        {(() => {
                          const derived = findJobCategoryAndTier(char.job);
                          const currentCategory = derived.category;
                          const currentTier = derived.tier;
                          const catObj = jobCategories[currentCategory] || {};
                          const availableJobs = (catObj && typeof catObj === 'object' && !Array.isArray(catObj))
                            ? (catObj[currentTier] || [])
                            : [];

                          return (
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                              <div>
                                <label className="block text-xs font-bold text-slate-400 mb-2">遊戲 ID (IGN)</label>
                                <input
                                  type="text"
                                  required={!!discordUser}
                                  value={char.ign}
                                  onChange={(e) => {
                                    const updated = [...tempCharacters];
                                    updated[index].ign = e.target.value;
                                    setTempCharacters(updated);
                                  }}
                                  placeholder="例如：純粹"
                                  className="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2.5 text-base text-slate-100 focus:outline-none"
                                />
                              </div>

                              <div className="md:col-span-2 grid grid-cols-3 gap-2 bg-slate-900/50 p-2.5 rounded-xl border border-slate-800/80">
                                <div>
                                  <label className="block text-[11px] font-bold text-slate-500 mb-1">1. 大系</label>
                                  <select
                                    value={currentCategory}
                                    onChange={(e) => {
                                      const newCat = e.target.value;
                                      const targetCatObj = jobCategories[newCat] || {};
                                      const newJobs = (targetCatObj[currentTier] || targetCatObj['4轉'] || Object.values(targetCatObj)[0] || []);
                                      const updated = [...tempCharacters];
                                      updated[index].job = newJobs[0] || '未知';
                                      setTempCharacters(updated);
                                    }}
                                    className="w-full bg-slate-955 border border-slate-800 rounded-lg px-2 py-2 text-xs text-slate-100 focus:outline-none cursor-pointer"
                                  >
                                    {Object.keys(jobCategories).map(cat => (
                                      <option key={cat} value={cat}>{cat}</option>
                                    ))}
                                  </select>
                                </div>

                                <div>
                                  <label className="block text-[11px] font-bold text-slate-500 mb-1">2. 轉職</label>
                                  <select
                                    value={currentTier}
                                    onChange={(e) => {
                                      const newTier = e.target.value;
                                      const targetCatObj = jobCategories[currentCategory] || {};
                                      const newJobs = targetCatObj[newTier] || [];
                                      const updated = [...tempCharacters];
                                      updated[index].job = newJobs[0] || '未知';
                                      setTempCharacters(updated);
                                    }}
                                    className="w-full bg-slate-955 border border-slate-800 rounded-lg px-2 py-2 text-xs text-slate-100 focus:outline-none cursor-pointer"
                                  >
                                    <option value="2轉">2轉 (Lv.30)</option>
                                    <option value="3轉">3轉 (Lv.70)</option>
                                    <option value="4轉">4轉 (Lv.120)</option>
                                  </select>
                                </div>

                                <div>
                                  <label className="block text-[11px] font-bold text-amber-500/80 mb-1">3. 職業</label>
                                  <select
                                    value={char.job}
                                    onChange={(e) => {
                                      const updated = [...tempCharacters];
                                      updated[index].job = e.target.value;
                                      setTempCharacters(updated);
                                    }}
                                    className="w-full bg-slate-955 border border-slate-800 rounded-lg px-2 py-2 text-xs text-amber-400 font-extrabold focus:outline-none cursor-pointer"
                                  >
                                    {availableJobs.map(j => (
                                      <option key={j} value={j}>{j}</option>
                                    ))}
                                  </select>
                                </div>
                              </div>

                              <div>
                                <label className="block text-xs font-bold text-slate-400 mb-2">等級 (Lv.)</label>
                                <input
                                  type="number"
                                  required={!!discordUser}
                                  min={1}
                                  max={200}
                                  value={char.level}
                                  onChange={(e) => {
                                    const updated = [...tempCharacters];
                                    updated[index].level = Number(e.target.value);
                                    setTempCharacters(updated);
                                  }}
                                  className="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2.5 text-base text-slate-100 focus:outline-none"
                                />
                              </div>
                            </div>
                          );
                        })()}

                        <div>
                          <label className="block text-xs font-bold text-slate-400 mb-2">💡 出團預設備註（錄取後會自動顯示在分組名單中！）</label>
                          <input
                            type="text"
                            value={char.memo || ''}
                            onChange={(e) => {
                              const updated = [...tempCharacters];
                              updated[index].memo = e.target.value;
                              setTempCharacters(updated);
                            }}
                            placeholder="例：已洗血、滿聖火、祈禱滿、天怒20"
                            className="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2 text-xs text-slate-200 focus:outline-none placeholder-slate-600"
                          />
                        </div>
                      </div>
                    ))}
                  </div>

                  {discordUser && (
                    <button
                      type="button"
                      onClick={() => {
                        setTempCharacters([...tempCharacters, { ign: '', job: '主教', level: 120, memo: '' }]);
                      }}
                      className="w-full bg-slate-955 hover:bg-slate-900 text-indigo-400 font-bold py-3 rounded-2xl text-sm transition border border-dashed border-slate-800 flex items-center justify-center space-x-2 mt-4"
                    >
                      <span>➕ 新增另一個遊戲身分角色卡</span>
                    </button>
                  )}
                </div>

                {/* 底部按鈕區 */}
                <div className="flex space-x-4 pt-4 border-t border-slate-800 mt-6">
                  <button 
                    type="button" 
                    onClick={() => setShowProfileModal(false)} 
                    className="flex-1 bg-slate-855 hover:bg-slate-755 py-3 rounded-xl text-sm font-bold text-slate-300"
                  >
                    取消
                  </button>
                  {discordUser && (
                    <button 
                      type="submit" 
                      onClick={saveProfile}
                      disabled={isSavingProfile}
                      className="flex-1 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white font-extrabold py-3 rounded-xl text-sm shadow-lg transition active:scale-95"
                    >
                      {isSavingProfile ? "⏳ 儲存中..." : "確認並儲存變更"}
                    </button>
                  )}
                </div>

              </div>
            </div>
          )}

          {/* ==========================================
              自訂 Boss 管理彈出視窗
             ========================================== */}
          {showBossManagerModal && isAdminLoggedIn && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm overflow-y-auto font-semibold">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 w-full max-w-2xl shadow-2xl relative my-8">
                <button onClick={() => setShowBossManagerModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                
                <h3 className="text-2xl font-black text-indigo-400 mb-2 flex items-center space-x-2">
                  <span>👾 自訂突襲 Boss 管理工具</span>
                </h3>
                <p className="text-xs text-slate-400 mb-6">為伺服器新增全新的突襲 Boss。無須手動輸入 ID，系統將自動配置！</p>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                  <form onSubmit={handleCreateCustomBoss} className="space-y-4 text-sm border-r border-slate-800/80 pr-0 lg:pr-6">
                    <h4 className="font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center space-x-1.5">
                      <span>➕ 新建突襲王</span>
                    </h4>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">Boss 顯示名稱</label>
                      <input
                        type="text"
                        required
                        placeholder="例如: 混沌黑龍王 (Chaos Horntail)"
                        value={newBossData.name}
                        onChange={(e) => setNewBossData({ ...newBossData, name: e.target.value })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 focus:outline-none text-slate-100"
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div className="col-span-2">
                        <label className="block text-xs font-bold text-slate-400 mb-2">選擇 Emoji 圖標 ({newBossData.icon})</label>
                        <div className="grid grid-cols-6 gap-1.5 p-2.5 bg-slate-950 border border-slate-855 rounded-xl">
                          {BOSS_EMOJIS_LIST.map((emoji) => (
                            <button
                              key={emoji}
                              type="button"
                              onClick={() => setNewBossData({ ...newBossData, icon: emoji })}
                              className={`text-xl p-1.5 rounded-lg hover:bg-slate-800 transition ${newBossData.icon === emoji ? 'bg-indigo-600/30 border-indigo-500 scale-105' : 'border border-transparent'}`}
                            >
                              {emoji}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div className="col-span-2">
                        <label className="block text-xs font-bold text-slate-400 mb-1.5">最大出征人數</label>
                        <input
                          type="number"
                          required
                          placeholder="18"
                          value={newBossData.maxPlayers}
                          onChange={(e) => setNewBossData({ ...newBossData, maxPlayers: Number(e.target.value) || 18 })}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 focus:outline-none text-slate-100 font-mono"
                        />
                      </div>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-2">選擇卡片漸層主題色</label>
                      <div className="grid grid-cols-3 gap-2">
                        {BOSS_GRADIENTS_PRESETS.map((preset) => (
                          <button
                            key={preset.value}
                            type="button"
                            onClick={() => setNewBossData({ ...newBossData, color: preset.value })}
                            className={`p-2 rounded-lg border text-[10px] font-black tracking-wide text-center transition bg-gradient-to-r ${preset.value} ${newBossData.color === preset.value ? 'border-amber-400 ring-2 ring-amber-450/35 scale-105' : 'border-slate-855 opacity-80 hover:opacity-100'}`}
                          >
                            <span className="text-white drop-shadow-sm">{preset.name}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">出征要求描述（選填）</label>
                      <input
                        type="text"
                        placeholder="例: 極高血量與走位挑戰..."
                        value={newBossData.desc}
                        onChange={(e) => setNewBossData({ ...newBossData, desc: e.target.value })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 focus:outline-none text-slate-100 text-xs"
                      />
                    </div>

                    <button 
                      type="submit" 
                      className="w-full bg-gradient-to-r from-indigo-500 to-violet-600 text-white font-extrabold py-2.5 rounded-xl text-xs shadow-md shadow-indigo-500/10 hover:brightness-110 active:scale-95 transition"
                    >
                      儲存至資料庫
                    </button>
                  </form>

                  <div className="space-y-4">
                    <h4 className="font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center justify-between">
                      <span>🛠️ 目前自訂 Boss 列表</span>
                      <span className="text-xs bg-slate-800 text-slate-400 px-2.5 py-0.5 rounded-full font-bold">
                        {customBossesList.length} 個
                      </span>
                    </h4>
                    
                    {customBossesList.length === 0 ? (
                      <div className="py-20 text-center text-slate-500 text-xs italic bg-slate-950 border border-slate-855 rounded-2xl">
                        目前尚無任何自訂突襲 Boss 紀錄
                      </div>
                    ) : (
                      <div className="max-h-[350px] overflow-y-auto pr-2 space-y-2.5 scrollbar-thin scrollbar-thumb-slate-800">
                        {customBossesList.map((b) => (
                          <div key={b.id} className="flex items-center justify-between p-3.5 bg-slate-950 rounded-xl border border-slate-855 hover:border-slate-800 transition text-xs">
                            <div className="flex items-center space-x-3 truncate">
                              <span className="text-2xl shrink-0">{b.icon || '👹'}</span>
                              <div className="truncate min-w-0">
                                <p className="font-extrabold text-slate-100 truncate text-sm">{b.name}</p>
                                <p className="text-[10px] text-slate-500 mt-0.5 font-bold">人數限制: {b.maxPlayers}人</p>
                              </div>
                            </div>
                            <button
                              type="button"
                              onClick={() => handleDeleteBoss(b.id, b.name)}
                              className="bg-rose-955/30 hover:bg-rose-900/60 border border-rose-900/50 text-rose-300 font-extrabold px-3 py-1.5 rounded-lg text-[10px] transition shrink-0"
                            >
                              🗑️ 刪除
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                <div className="flex justify-end space-x-2 border-t border-slate-800 pt-3 mt-6 text-xs font-bold">
                  <button onClick={() => setShowBossManagerModal(false)} className="bg-slate-800 hover:bg-slate-755 px-5 py-2.5 rounded-xl text-slate-300 font-bold transition">關閉面板</button>
                </div>

              </div>
            </div>
          )}

          {/* ==========================================
              遠征隊職業管理工具
             ========================================== */}
          {showJobManagerModal && isAdminLoggedIn && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm overflow-y-auto font-semibold font-bold">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 w-full max-w-2xl shadow-2xl relative my-8">
                <button onClick={() => setShowJobManagerModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                
                <h3 className="text-2xl font-black text-teal-400 mb-2 flex items-center space-x-2">
                  <span>⚔️ 遠征隊職業管理工具</span>
                </h3>
                <p className="text-xs text-slate-400 mb-6">管理員可在五大類別中自由新增或刪除各轉職階段的職業身分名稱。</p>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                  <form onSubmit={handleAddJob} className="space-y-4 text-sm border-r border-slate-800/80 pr-0 lg:pr-6">
                    <h4 className="font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center space-x-1.5">
                      <span>➕ 新增職業身分</span>
                    </h4>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">選擇歸屬職業系</label>
                      <select
                        value={newJobData.category}
                        onChange={(e) => setNewJobData({ ...newJobData, category: e.target.value })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 focus:outline-none text-slate-100 cursor-pointer"
                      >
                        {Object.keys(jobCategories).map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">選擇轉職階段</label>
                      <select
                        value={newJobData.tier}
                        onChange={(e) => setNewJobData({ ...newJobData, category: e.target.value })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 focus:outline-none text-slate-100 cursor-pointer"
                      >
                        <option value="2轉">2轉 (Lv.30)</option>
                        <option value="3轉">3轉 (Lv.70)</option>
                        <option value="4轉">4轉 (Lv.120)</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">職業名稱</label>
                      <input
                        type="text"
                        required
                        placeholder="例如: 魂騎士, 破風使者"
                        value={newJobData.name}
                        onChange={(e) => setNewJobData({ ...newJobData, name: e.target.value })}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 focus:outline-none text-slate-100"
                      />
                    </div>

                    <button 
                      type="submit" 
                      className="w-full bg-gradient-to-r from-teal-500 to-emerald-600 text-white font-extrabold py-2.5 rounded-xl text-xs shadow-md shadow-teal-500/10 hover:brightness-110 active:scale-95 transition"
                    >
                      確認儲存並新增職業
                    </button>
                  </form>

                  <div className="space-y-4">
                    <h4 className="font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center justify-between">
                      <span>🛠️ 職業分類一覽與刪除</span>
                    </h4>
                    
                    <div className="max-h-[380px] overflow-y-auto pr-2 space-y-4 scrollbar-thin scrollbar-thumb-slate-800 text-xs">
                      {Object.entries(jobCategories).map(([cat, tiers]) => {
                        const isNested = tiers && typeof tiers === 'object' && !Array.isArray(tiers);
                        return (
                          <div key={cat} className="space-y-3 p-3.5 bg-slate-950 rounded-xl border border-slate-855">
                            <div className="flex items-center space-x-2 border-b border-slate-800/60 pb-1 mb-2">
                              {renderJobIcon(cat === '法師' ? '主教' : (cat === '劍士' ? '英雄' : (cat === '弓箭手' ? '箭神' : (cat === '盜賊' ? '夜使者' : '拳霸'))), "w-4 h-4")}
                              <span className="font-extrabold text-indigo-300 text-sm">{cat}</span>
                            </div>
                            
                            {isNested ? (
                              ['2轉', '3轉', '4轉'].map(tier => {
                                const jobs = tiers[tier] || [];
                                return (
                                  <div key={tier} className="space-y-1.5 pl-2 border-l border-slate-800/80">
                                    <span className="text-[11px] font-bold text-amber-500/80 block">{tier}職業：</span>
                                    <div className="flex flex-wrap gap-2">
                                      {jobs.length > 0 ? (
                                        jobs.map((job) => (
                                          <span 
                                            key={job}
                                            className="inline-flex items-center bg-slate-900 border border-slate-800/80 rounded-lg px-2.5 py-1 text-slate-300 font-extrabold space-x-1.5"
                                          >
                                            <span>{job}</span>
                                            <button 
                                              type="button" 
                                              onClick={() => handleDeleteJob(cat, tier, job)}
                                              className="text-rose-500 hover:text-rose-400 font-black pl-1 select-none transition"
                                              title="刪除此職業"
                                            >
                                              ✕
                                            </button>
                                          </span>
                                        ))
                                      ) : (
                                        <span className="text-slate-600 italic">目前無職業設定</span>
                                      )}
                                    </div>
                                  </div>
                                );
                              })
                            ) : (
                              <div className="flex flex-wrap gap-2">
                                {Array.isArray(tiers) && tiers.map((job) => (
                                  <span 
                                    key={job}
                                    className="inline-flex items-center bg-slate-900 border border-slate-800/80 rounded-lg px-2.5 py-1 text-slate-300 font-extrabold space-x-1.5"
                                  >
                                    <span>{job}</span>
                                    <button 
                                      type="button" 
                                      onClick={() => handleDeleteJob(cat, null, job)}
                                      className="text-rose-500 hover:text-rose-400 font-black pl-1 select-none transition"
                                      title="刪除此職業"
                                    >
                                      ✕
                                    </button>
                                  </span>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                <div className="flex justify-end space-x-2 border-t border-slate-800 pt-3 mt-6 text-xs font-bold">
                  <button onClick={() => setShowJobManagerModal(false)} className="bg-slate-800 hover:bg-slate-755 px-5 py-2.5 rounded-xl text-slate-300 font-bold transition">關閉職業管理</button>
                </div>

              </div>
            </div>
          )}

          {/* C. 管理者登入視窗 */}
          {showAdminLoginModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl relative">
                <button onClick={() => setShowAdminLoginModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-amber-400 mb-2">🔑 管理者後台登入</h3>
                <p className="text-xs text-slate-400 mb-5">請輸入管理者帳號與密碼以啟用名單編輯功能。</p>

                <form onSubmit={handleAdminLoginSubmit} className="space-y-4 text-sm font-semibold font-bold">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">管理員帳號</label>
                    <input
                      type="text"
                      required
                      value={adminUsername}
                      onChange={(e) => setAdminUsername(e.target.value)}
                      placeholder="請輸入帳號"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">管理者密碼</label>
                    <input
                      type="password"
                      required
