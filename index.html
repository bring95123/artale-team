<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyxShade遠征隊組隊系統</title>
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel (用於在瀏覽器中直接解析 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase Compat SDKs (全域引入) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // 遊戲常數設定 (Boss、職業等)
    // ==========================================
    const BOSS_LIST = [
      { id: 'zakum_normal', name: '普通炎魔 (Normal Zakum)', icon: '🔥', color: 'from-amber-600 to-red-700', maxPlayers: 18, desc: '最經典的 8 手炎魔，需要良好調度。' },
      { id: 'papu_normal', name: '普通拉圖斯 (Normal Papulatus)', icon: '⏰', color: 'from-blue-500 to-indigo-600', maxPlayers: 6, desc: '需要注意計時器與地圖炸彈。' },
      { id: 'papu_hard', name: '困難拉圖斯 (Hard Papulatus)', icon: '⏰', color: 'from-violet-600 to-fuchsia-850', maxPlayers: 6, desc: 'Artale 超高難度挑戰，極度考驗輸出與走位。' },
      { id: 'horntail', name: '闇黑龍王 (Horntail)', icon: '🐉', color: 'from-emerald-600 to-teal-800', maxPlayers: 18, desc: '三顆龙头與多部位挑戰，誘惑控制是關鍵。' },
      { id: 'pink_bean', name: '蝴蝶(艾畢) (Pink Bean)', icon: '🦋', color: 'from-pink-400 to-rose-600', maxPlayers: 30, desc: '目前終極 Boss，雕像攻略與反射考驗。' }
    ];

    const JOB_CATEGORIES = {
      '劍士': ['英雄', '聖騎士', '黑騎士'],
      '法師': ['大魔導士(火/毒)', '大魔導士(冰/雷)', '主教'],
      '弓箭手': ['箭神', '神射手'],
      '盜賊': ['夜使者', '暗影神偷'],
      '海盜': ['拳霸', '槍神']
    };

    // 時間格式化輔助函數
    const formatDateTime = (dateTimeStr) => {
      if (!dateTimeStr) return '';
      if (!dateTimeStr.includes('T')) return dateTimeStr;
      try {
        const date = new Date(dateTimeStr);
        if (isNaN(date.getTime())) return dateTimeStr;
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        return `${year}-${month}-${day} (${weekdays[date.getDay()]}) ${hours}:${minutes}`;
      } catch (e) {
        return dateTimeStr;
      }
    };

    // 寬鬆的 Firebase Config 提取解析器
    function parseFirebaseConfig(text) {
      try {
        return JSON.parse(text);
      } catch (e) {
        const config = {};
        const keys = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
        keys.forEach(key => {
          const match = text.match(new RegExp(`['"]?${key}['"]?\\s*:\\s*['"]([^'"]+)['"]`));
          if (match) config[key] = match[1];
        });
        if (config.apiKey && config.projectId) return config;
        throw new Error("無法解析，請確認複製的內容是否包含 apiKey 與 projectId。");
      }
    }

   function App() {
      // ------------------------------------------
      // Firebase 初始化與連線狀態
      // ------------------------------------------
      const [dbConfig, setDbConfig] = useState(() => {
        const local = localStorage.getItem('artale_firebase_config');
        if (window.__firebase_config) return window.__firebase_config;
        return local ? JSON.parse(local) : null;
      });

      const [configInput, setConfigInput] = useState('');
      const [appId] = useState(() => window.__app_id || 'artale-expedition-default');
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [db, setDb] = useState(null);
      const [auth, setAuth] = useState(null);
      const [dbStatus, setDbStatus] = useState('connecting'); // 'no-config' | 'connecting' | 'connected' | 'error'

      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState({ ign: '', job: '主教', level: 120 });
      const [profileLoaded, setProfileLoaded] = useState(false);
      const [showProfileModal, setShowProfileModal] = useState(false);
      const [isSavingProfile, setIsSavingProfile] = useState(false);

      const [raids, setRaids] = useState([]);
      const [currentRaidId, setCurrentRaidId] = useState(null);
      const [isCreating, setIsCreating] = useState(false);

      // 隱藏重設點擊次數狀態 (點 5 次灰色小字重設)
      const [hiddenResetClicks, setHiddenResetClicks] = useState(0);

      // 管理者帳號狀態
      const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(() => {
        return sessionStorage.getItem('artale_is_admin') === 'true';
      });
      const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
      const [showAdminConsole, setShowAdminConsole] = useState(false);
      const [adminUsername, setAdminUsername] = useState('');
      const [adminPassword, setAdminPassword] = useState('');
      const [registeredUsers, setRegisteredUsers] = useState([]);
      const [searchUserQuery, setSearchUserQuery] = useState('');

      // 表單與通用 UI 狀態
      const [newRaid, setNewRaid] = useState({ title: '', bossId: 'zakum_normal', notes: '', proposedTimes: [''] });
      const [signUpMemo, setSignUpMemo] = useState('');
      const [toast, setToast] = useState(null);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 5000); 
      };

      const triggerConfirm = (title, message, onConfirmCallback) => {
        setConfirmModal({
          isOpen: true,
          title,
          message,
          onConfirm: () => {
            onConfirmCallback();
            setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null });
          }
        });
      };

      // 儲存手動輸入的 Firebase 金鑰
      const handleSaveConfig = (e) => {
        e.preventDefault();
        try {
          const parsed = parseFirebaseConfig(configInput);
          localStorage.setItem('artale_firebase_config', JSON.stringify(parsed));
          setDbConfig(parsed);
          showToast("資料庫設定成功！網頁即將自動連線。");
        } catch (err) {
          alert("金鑰解析失敗，請確認是否完整複製了 firebaseConfig 的內容！");
        }
      };

      // 清除金鑰設定
      const handleResetConfig = () => {
        triggerConfirm(
          "確定要重置資料庫設定嗎？",
          "重置後網頁將會重新整理，並需要再次輸入 Firebase 金鑰才能繼續使用組隊系統。",
          () => {
            localStorage.removeItem('artale_firebase_config');
            window.location.reload();
          }
        );
      };

      // 點擊小助手標題觸發隱藏重設
      const handleSecretClick = () => {
        setHiddenResetClicks(prev => {
          const next = prev + 1;
          if (next >= 5) {
            handleResetConfig();
            return 0;
          }
          return next;
        });
      };

      // 管理者登入邏輯
      const handleAdminLoginSubmit = (e) => {
        e.preventDefault();
        // ------------------------------------------
        // 🔑 預設管理者帳密設定 (您可以在此隨意修改)
        // ------------------------------------------
        const DEFAULT_ADMIN_USER = "admin";
        const DEFAULT_ADMIN_PASS = "nyxshadeadmin";

        if (adminUsername.toLowerCase() === DEFAULT_ADMIN_USER && adminPassword === DEFAULT_ADMIN_PASS) {
          setIsAdminLoggedIn(true);
          sessionStorage.setItem('artale_is_admin', 'true');
          setShowAdminLoginModal(false);
          setAdminUsername('');
          setAdminPassword('');
          showToast("🔑 管理者權限驗證成功！已啟用後台控制。");
          setShowAdminConsole(true);
        } else {
          showToast("帳號或密碼錯誤，請重新確認！", "error");
        }
      };

      const handleAdminLogout = () => {
        setIsAdminLoggedIn(false);
        sessionStorage.removeItem('artale_is_admin');
        setShowAdminConsole(false);
        showToast("已成功登出管理者模式。");
      };

      // 初始化 Firebase
      useEffect(() => {
        if (!dbConfig) {
          setDbStatus('no-config');
          return;
        }
        try {
          let app;
          if (firebase.apps.length === 0) {
            app = firebase.initializeApp(dbConfig);
          } else {
            app = firebase.app();
          }
          const firestoreDb = firebase.firestore(app);
          const firebaseAuth = firebase.auth(app);
          
          setDb(firestoreDb);
          setAuth(firebaseAuth);
          setDbStatus('connecting');
        } catch (err) {
          console.error(err);
          setDbStatus('error');
          alert("Firebase 初始化失敗，可能是您的金鑰有誤，請點擊底部的管理登入重置。");
        }
      }, [dbConfig]);

      // 身份驗證與登入監聽
      useEffect(() => {
        if (!auth || !db) return;

        const initAuth = async () => {
          try {
            if (window.__initial_auth_token) {
              await auth.signInWithCustomToken(window.__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Firebase 登入失敗：", error);
            setDbStatus('error');
            showToast(`登入失敗: ${error.message} (請確認 Firebase 是否已開啟「匿名登入」功能)`, "error");
          }
        };

        initAuth();
        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            setDbStatus('connected');
          }
        });
        return () => unsubscribe();
      }, [auth, db]);

      // 個人檔案載入與後台靜態同步
      useEffect(() => {
        if (!user || !db) return;

        const fetchProfile = async () => {
          try {
            const profileRef = db.doc(`artifacts/${appId}/users/${user.uid}/profile/info`);
            const docSnap = await profileRef.get();
            if (docSnap.exists) {
              const data = docSnap.data();
              const loadedProfile = {
                ign: data.ign || '',
                job: data.job || '主教',
                level: Number(data.level) || 120
              };
              setProfile(loadedProfile);

              // [背景同步] 讓管理員能夠在後台看見此成員並進行管理
              db.doc(`artifacts/${appId}/public/data/registered_users/${user.uid}`).set({
                userId: user.uid,
                ign: loadedProfile.ign,
                job: loadedProfile.job,
                level: loadedProfile.level,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              }).catch(e => console.error("背景成員名冊同步失敗：", e));

            } else {
              setShowProfileModal(true);
            }
            setProfileLoaded(true);
          } catch (err) {
            console.error("載入個人檔案失敗：", err);
          }
        };
        fetchProfile();
      }, [user, db]);

      // 監聽所有已註冊隊員名冊 (僅限管理者模式加載，節省流量)
      useEffect(() => {
        if (!user || !db || !isAdminLoggedIn) return;

        const regUsersCollection = db.collection(`artifacts/${appId}/public/data/registered_users`);
        const unsubscribe = regUsersCollection.onSnapshot((snapshot) => {
          const usersList = [];
          snapshot.forEach((doc) => {
            usersList.push({ id: doc.id, ...doc.data() });
          });
          usersList.sort((a, b) => b.level - a.level);
          setRegisteredUsers(usersList);
        }, (error) => {
          console.error("讀取成員清單發生錯誤：", error);
        });

        return () => unsubscribe();
      }, [user, db, isAdminLoggedIn]);

      // 儲存角色檔案（防呆 + 雙重同步寫入）
      const saveProfile = async (e) => {
        e.preventDefault();
        if (!user || !db) {
          showToast("尚未連線至資料庫，請稍後再試！", "error");
          return;
        }
        if (!profile.ign.trim()) {
          showToast("請輸入遊戲 ID (IGN)！", "error");
          return;
        }

        setIsSavingProfile(true);
        try {
          const profileData = {
            ign: profile.ign.trim(),
            job: profile.job,
            level: Number(profile.level) || 120,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          // 1. 寫入個人私有檔案 (Rule 1)
          const profileRef = db.doc(`artifacts/${appId}/users/${user.uid}/profile/info`);
          await profileRef.set(profileData);

          // 2. 寫入公用成員清單以供管理者後台管理 (Rule 1)
          const publicRef = db.doc(`artifacts/${appId}/public/data/registered_users/${user.uid}`);
          await publicRef.set({
            userId: user.uid,
            ...profileData
          });

          setShowProfileModal(false);
          showToast("個人檔案更新成功！");
        } catch (err) {
          console.error("儲存個人檔案發生錯誤：", err);
          showToast(`儲存失敗: ${err.message} (請確認 Firebase 是否已開啟匿名登入)`, "error");
        } finally {
          setIsSavingProfile(false);
        }
      };

      // 管理者專用：徹底刪除某隊員的角色資料卡
      const handleDeleteUserProfile = (targetUserId, targetIgn) => {
        triggerConfirm(
          `確定要刪除玩家 【${targetIgn}】 的角色資料嗎？`,
          "這將會徹底抹除該隊員在資料庫中的角色卡紀錄（IGN、職業、等級），使其下次登入時必須重新設定。此操作不可逆！",
          async () => {
            try {
              // 1. 刪除公用後台列表紀錄
              await db.doc(`artifacts/${appId}/public/data/registered_users/${targetUserId}`).delete();
              // 2. 嘗試刪除該玩家的個人私有檔案
              await db.doc(`artifacts/${appId}/users/${targetUserId}/profile/info`).delete();
              
              showToast(`已成功刪除 【${targetIgn}】 的所有角色檔案！`);
            } catch (err) {
              console.error(err);
              showToast(`刪除失敗: ${err.message}`, "error");
            }
          }
        );
      };

      // 實時監聽組隊列表
      useEffect(() => {
        if (!user || !db) return;

        const raidsCollection = db.collection(`artifacts/${appId}/public/data/raids`);
        const unsubscribe = raidsCollection.onSnapshot((snapshot) => {
          const raidsData = [];
          snapshot.forEach((doc) => {
            raidsData.push({ id: doc.id, ...doc.data() });
          });
          raidsData.sort((a, b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return bTime - aTime;
          });
          setRaids(raidsData);
        }, (error) => {
          console.error("即時同步發生錯誤：", error);
        });
        return () => unsubscribe();
      }, [user, db]);

      // 發起新團
      const handleCreateRaid = async (e) => {
        e.preventDefault();
        if (!user || !db) return;
        if (!profile.ign) {
          showToast("請先設定您的遊戲 ID！", "error");
          setShowProfileModal(true);
          return;
        }
        const filteredTimes = newRaid.proposedTimes.filter(t => t.trim() !== '');
        if (filteredTimes.length === 0) {
          showToast("請至少填寫一個候選時間！", "error");
          return;
        }

        try {
          await db.collection(`artifacts/${appId}/public/data/raids`).add({
            title: newRaid.title,
            bossId: newRaid.bossId,
            notes: newRaid.notes,
            proposedTimes: filteredTimes,
            creatorId: user.uid,
            creatorIgn: profile.ign,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            participants: [],
            votes: []
          });
          setNewRaid({ title: '', bossId: 'zakum_normal', notes: '', proposedTimes: [''] });
          setIsCreating(false);
          showToast("成功發起遠征隊揪團！");
        } catch (err) {
          showToast(`建立失敗: ${err.message}`, "error");
        }
      };

      // 刪除團
      const handleDeleteRaid = (raidId) => {
        triggerConfirm(
          "確定要刪除此遠征隊嗎？",
          "此操作不可逆，將清空所有報名與投票資訊。",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).delete();
              if (currentRaidId === raidId) setCurrentRaidId(null);
              showToast("已刪除該遠征隊。");
            } catch (err) {
              showToast("刪除失敗", "error");
            }
          }
        );
      };

      // 重置團名單
      const handleResetRaid = (raidId) => {
        triggerConfirm(
          "確定要重置此團名單嗎？",
          "這會清空所有的報名、小隊編組與投票，但保留本團的標題、時間與基本設定。",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({
                participants: [],
                votes: []
              });
              showToast("已重置名單，大家可以開始重新報名囉！");
            } catch (err) {
              showToast("重置失敗", "error");
            }
          }
        );
      };

      // 投票時間
      const handleVoteTime = async (raidId, timeIndex, choice) => {
        if (!profile.ign) {
          showToast("請先在右上角填寫您的遊戲 ID (IGN) 才能進行投票！", "error");
          setShowProfileModal(true);
          return;
        }
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;

        try {
          const raidRef = db.doc(`artifacts/${appId}/public/data/raids/${raidId}`);
          let updatedVotes = [...(raid.votes || [])];
          const userVoteIndex = updatedVotes.findIndex(v => v.userId === user.uid);

          if (userVoteIndex > -1) {
            const userVote = { ...updatedVotes[userVoteIndex] };
            userVote.ign = profile.ign;
            userVote.job = profile.job;
            userVote.level = profile.level;
            userVote.votes = { ...userVote.votes, [timeIndex]: choice };
            updatedVotes[userVoteIndex] = userVote;
          } else {
            updatedVotes.push({
              userId: user.uid,
              ign: profile.ign,
              job: profile.job,
              level: profile.level,
              votes: { [timeIndex]: choice }
            });
          }
          await raidRef.update({ votes: updatedVotes });
          showToast("投票成功！");
        } catch (err) {
          showToast(`投票失敗: ${err.message}`, "error");
        }
      };

      // 報名
      const handleSignUp = async (raidId) => {
        if (!profile.ign) {
          showToast("請先在右上角填寫您的遊戲 ID (IGN) 才能報名！", "error");
          setShowProfileModal(true);
          return;
        }
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;
        if (raid.participants?.some(p => p.userId === user.uid)) {
          showToast("您已經在名單中了！", "error");
          return;
        }

        try {
          const raidRef = db.doc(`artifacts/${appId}/public/data/raids/${raidId}`);
          const updatedParticipants = [...(raid.participants || [])];
          updatedParticipants.push({
            userId: user.uid,
            ign: profile.ign,
            job: profile.job,
            level: profile.level,
            memo: signUpMemo.trim(),
            party: 'reserve'
          });
          await raidRef.update({ participants: updatedParticipants });
          setSignUpMemo('');
          showToast("報名成功！已進入候補名單。");
        } catch (err) {
          showToast(`報名失敗: ${err.message}`, "error");
        }
      };

      // 一鍵錄取投票人員
      const handleQuickEnroll = async (raidId, voter) => {
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;
        if (raid.participants?.some(p => p.userId === voter.userId)) {
          showToast(`${voter.ign} 已經在名單中囉！`, "error");
          return;
        }
        try {
          const raidRef = db.doc(`artifacts/${appId}/public/data/raids/${raidId}`);
          const updatedParticipants = [...(raid.participants || [])];
          updatedParticipants.push({
            userId: voter.userId,
            ign: voter.ign,
            job: voter.job || '未知',
            level: voter.level || 120,
            memo: '由時間投票一鍵錄取',
            party: 'reserve'
          });
          await raidRef.update({ participants: updatedParticipants });
          showToast(`已成功錄取 【${voter.ign}】！`);
        } catch (err) {
          showToast("錄取失敗", "error");
        }
      };

      // 取消報名
      const handleCancelSignUp = async (raidId) => {
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;
        try {
          const updatedParticipants = raid.participants.filter(p => p.userId !== user.uid);
          await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({ participants: updatedParticipants });
          showToast("已取消報名。");
        } catch (err) {
          console.error(err);
        }
      };

      // 分組
      const handleAssignParty = async (raidId, targetUserId, targetParty) => {
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;
        try {
          const updatedParticipants = raid.participants.map(p => {
            if (p.userId === targetUserId) return { ...p, party: targetParty };
            return p;
          });
          await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({ participants: updatedParticipants });
          showToast("分組更新成功！");
        } catch (err) {
          console.error(err);
        }
      };

      // 踢人
      const handleKickParticipant = (raidId, targetUserId) => {
        triggerConfirm(
          "確定要移出此玩家嗎？",
          "此操作將會將該玩家從出團與分組名單中移除。",
          async () => {
            const raid = raids.find(r => r.id === raidId);
            if (!raid) return;
            try {
              const updatedParticipants = raid.participants.filter(p => p.userId !== targetUserId);
              await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({ participants: updatedParticipants });
              showToast("已成功移出玩家。");
            } catch (err) {
              console.error(err);
            }
          }
        );
      };

      // 複製公告格式
      const copyGroupFormat = (raid) => {
        const boss = BOSS_LIST.find(b => b.id === raid.bossId);
        let bestTimeText = "待定";
        let maxYesCount = -1;
        raid.proposedTimes.forEach((time, index) => {
          const yesVotes = raid.votes?.filter(v => v.votes?.[index] === 'yes').length || 0;
          if (yesVotes > maxYesCount) {
            maxYesCount = yesVotes;
            bestTimeText = formatDateTime(time);
          }
        });

        const participants = raid.participants || [];
        const party1 = participants.filter(p => p.party === '1');
        const party2 = participants.filter(p => p.party === '2');
        const party3 = participants.filter(p => p.party === '3');
        const reserves = participants.filter(p => p.party === 'reserve' || !p.party);

        let text = `⚔️ **【Artale 遠征隊公車】${boss?.name || ''}** ⚔️\n`;
        text += `📌 **主題**：${raid.title}\n`;
        text += `📅 **預計時間**：${bestTimeText} (最高得票)\n`;
        if (raid.notes) {
          text += `📝 **備註**：${raid.notes}\n`;
        }
        text += `\n📋 **實時遠征隊名單**：\n`;

        const formatParty = (pList, pName) => {
          if (pList.length === 0) return `${pName}：(尚無隊員)\n`;
          let pText = `${pName}：\n`;
          pList.forEach((p, idx) => {
            pText += `  ${idx + 1}. [${p.job}] ${p.ign} (Lv.${p.level})${p.memo ? ` - ${p.memo}` : ''}\n`;
          });
          return pText;
        };

        text += formatParty(party1, '🔵 【遠征一隊】');
        if (boss?.maxPlayers > 6) text += formatParty(party2, '🟢 【遠征二隊】');
        if (boss?.maxPlayers > 12) text += formatParty(party3, '🟣 【遠征三隊】');
        if (reserves.length > 0) {
          text += `\n🔸 **【候補名單】**：\n`;
          reserves.forEach(p => {
            text += `  - [${p.job}] ${p.ign} (Lv.${p.level})${p.memo ? ` - ${p.memo}` : ''}\n`;
          });
        }
        text += `\n🔗 **即時投票/卡位系統**：${window.location.href}`;

        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          showToast("排班表格式已複製到剪貼簿！可直接貼在群組中。");
        } catch (err) {
          showToast("複製失敗，請手動複製", "error");
        }
        document.body.removeChild(textarea);
      };

      // ==========================================
      // 未設定資料庫時的引導畫面
      // ==========================================
      if (!dbConfig) {
        return (
          <div className="max-w-md mx-auto mt-20 p-6 bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl">
            <h2 className="text-2xl font-bold text-center text-amber-400 flex items-center justify-center space-x-2">
              <span>🍁 NyxShade 組隊系統</span>
            </h2>
            <p className="text-xs text-slate-400 text-center mt-2">首次在 GitHub 使用，請先設定您的 Firebase 資料庫。</p>
            
            <form onSubmit={handleSaveConfig} className="mt-6 space-y-4">
              <div>
                <label className="block text-xs font-bold text-slate-400 uppercase mb-2">
                  請貼上您的 Firebase Config 程式碼段落
                </label>
                <textarea
                  required
                  rows={8}
                  value={configInput}
                  onChange={(e) => setConfigInput(e.target.value)}
                  placeholder={`例：\nconst firebaseConfig = {\n  apiKey: "AIzaSy...",\n  authDomain: "...",\n  projectId: "..."\n};`}
                  className="w-full bg-slate-950 border border-slate-800 focus:border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200 placeholder-slate-600 font-mono focus:outline-none resize-none"
                />
              </div>

              <div className="p-3 bg-slate-950 rounded-xl border border-slate-800 text-[10px] text-slate-500 space-y-1.5 leading-relaxed">
                <p className="font-semibold text-slate-400">如何取得？</p>
                <p>1. 到 <a href="https://console.firebase.google.com" target="_blank" className="text-indigo-400 underline">Firebase 控制台</a> 免費建立一個專案。</p>
                <p>2. 到 <b>Firestore Database</b> 點擊建立資料庫（以測試模式啟動）。</p>
                <p>3. 到 <b>Authentication</b> 啟用「匿名登入 (Anonymous)」功能。</p>
                <p>4. 在專案首頁註冊 Web 應用程式，即可獲得此 config 程式碼，整段複製貼上到上方按確認即可！</p>
              </div>

              <button
                type="submit"
                className="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white font-bold py-2.5 rounded-xl shadow-lg transition"
              >
                儲存金鑰並啟用系統
              </button>
            </form>
          </div>
        );
      }

      // ------------------------------------------
      // 💡 修正核心：動態計算 activeRaid、boss 與 isCreator
      // ------------------------------------------
      const activeRaid = raids.find(r => r.id === currentRaidId);
      const boss = activeRaid ? BOSS_LIST.find(b => b.id === activeRaid.bossId) : null;
      const isCreator = user && activeRaid ? (user.uid === activeRaid.creatorId || isAdminLoggedIn) : false;

      return (
        <div className="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col justify-between">
          
          <div>
            {/* 頂部導航列 - 100% 乾淨防呆，提供實時連線狀態 */}
            <header className="sticky top-0 z-30 bg-slate-900/80 backdrop-blur border-b border-slate-800 px-4 py-3 shadow-lg">
              <div className="max-w-6xl mx-auto flex items-center justify-between">
                <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setCurrentRaidId(null)}>
                  <div className="text-3xl">🍁</div>
                  <div>
                    <h1 className="text-xl font-bold bg-gradient-to-r from-orange-400 to-amber-300 bg-clip-text text-transparent">
                      NyxShade遠征隊組隊系統
                    </h1>
                    <p 
                      onClick={handleSecretClick}
                      className="text-[10px] text-slate-500 select-none cursor-pointer active:text-amber-400 hover:text-slate-400 transition"
                      title="快速點擊5次可觸發資料庫管理"
                    >
                      MSW 懷舊楓之谷出團小助手
                    </p>
                  </div>
                </div>

                {/* 右側玩家角色卡 + 🟢 資料庫連線狀態燈 */}
                <div className="flex items-center space-x-3">
                  {/* 連線狀態標記 */}
                  <div className="hidden sm:block">
                    {dbStatus === 'connecting' && <span className="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-1 rounded-lg text-xs font-semibold animate-pulse">⏳ 正在連線資料庫</span>}
                    {dbStatus === 'connected' && <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-1 rounded-lg text-xs font-semibold">🟢 連線成功</span>}
                    {dbStatus === 'error' && <span className="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2 py-1 rounded-lg text-xs font-semibold">⚠️ 連線異常</span>}
                  </div>

                  {profileLoaded ? (
                    <button 
                      onClick={() => setShowProfileModal(true)}
                      className="bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-slate-500 rounded-lg px-3 py-1.5 flex items-center space-x-2 transition text-sm"
                    >
                      <span className="text-indigo-400">🛡️</span>
                      <span className="font-semibold text-slate-200">
                        {profile.ign ? `${profile.ign} (${profile.job})` : '設定遊戲ID'}
                      </span>
                    </button>
                  ) : (
                    <div className="h-8 w-24 bg-slate-800 animate-pulse rounded-lg" />
                  )}
                </div>
              </div>
            </header>

            {/* 主體內容 */}
            <main className="max-w-6xl mx-auto p-4 md:p-6 pb-20">
              
              {/* 手機板的狀態提示 */}
              <div className="sm:hidden mb-4 text-center">
                {dbStatus === 'connecting' && <span className="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full text-[10px] font-semibold animate-pulse">⏳ 正在連線資料庫</span>}
                {dbStatus === 'connected' && <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-[10px] font-semibold">🟢 連線成功</span>}
                {dbStatus === 'error' && <span className="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full text-[10px] font-semibold">⚠️ 連線異常</span>}
              </div>

              {/* 1. 大廳列表 */}
              {!activeRaid ? (
                <div>
                  <div className="mb-8 p-6 rounded-2xl bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 shadow-xl relative overflow-hidden">
                    <div className="absolute top-0 right-0 opacity-10 text-9xl">🍁</div>
                    <div className="relative z-10 max-w-2xl">
                      <span className="px-3 py-1 bg-amber-500/10 text-amber-400 border border-amber-500/20 text-xs rounded-full font-semibold">
                        跨平台多端同步
                      </span>
                      <h2 className="text-2xl md:text-3xl font-extrabold mt-3 text-white">Artale 組隊</h2>
                      <p className="text-slate-400 mt-2 text-sm md:text-base whitespace-pre-line">隊員線上自主投票時間、報名打王</p>
                      <div className="mt-5 flex flex-wrap gap-2">
                        <button 
                          onClick={() => setIsCreating(true)}
                          className="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-bold px-5 py-2.5 rounded-xl shadow-lg transition flex items-center space-x-2 text-sm"
                        >
                          <span>➕ 發起全新遠征隊</span>
                        </button>
                        <button 
                          onClick={() => setShowProfileModal(true)}
                          className="bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold px-4 py-2.5 rounded-xl border border-slate-700 transition text-sm"
                        >
                          ⚙️ 設定我的角色資料
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="flex items-center justify-between mb-4">
                    <h3 className="text-lg font-bold text-slate-200 flex items-center space-x-2">
                      <span>⚔️ 目前進行中的遠征隊</span>
                      <span className="bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full text-xs font-normal">
                        {raids.length}
                      </span>
                    </h3>
                  </div>

                  {raids.length === 0 ? (
                    <div className="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-12 text-center">
                      <span className="text-5xl block mb-4">🦖</span>
                      <h4 className="text-slate-300 font-bold text-lg">目前沒有任何發起的遠征隊</h4>
                      <p className="text-slate-500 text-sm mt-1">立刻點選上方「發起全新遠征隊」來揪團打王吧！</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {raids.map((raid) => {
                        const bItem = BOSS_LIST.find(b => b.id === raid.bossId);
                        const participantCount = raid.participants?.length || 0;
                        const voteCount = raid.votes?.length || 0;

                        return (
                          <div 
                            key={raid.id}
                            onClick={() => setCurrentRaidId(raid.id)}
                            className="bg-slate-900 hover:bg-slate-800/90 border border-slate-800 hover:border-slate-700 rounded-2xl p-5 cursor-pointer transition transform hover:-translate-y-0.5 shadow-md flex flex-col justify-between"
                          >
                            <div>
                              <div className="flex items-center justify-between mb-3">
                                <span className={`px-2.5 py-1 text-xs font-bold rounded-lg text-white bg-gradient-to-r ${bItem?.color || 'from-slate-600 to-slate-700'}`}>
                                  {bItem?.icon} {bItem?.name.split(' (')[0]}
                                </span>
                                <span className="text-xs text-slate-500">
                                  開團者: <span className="text-slate-300 font-semibold">{raid.creatorIgn}</span>
                                </span>
                              </div>

                              <h4 className="text-lg font-bold text-slate-100 mb-2 line-clamp-1">{raid.title}</h4>
                              <p className="text-slate-400 text-xs line-clamp-2 mb-4 bg-slate-950/40 p-2.5 rounded-lg border border-slate-800/60 min-h-[48px]">
                                {raid.notes || "沒有提供備註說明。"}
                              </p>
                            </div>

                            <div className="flex items-center justify-between text-xs border-t border-slate-800 pt-3">
                              <div className="flex space-x-4 text-slate-400">
                                <span className="flex items-center space-x-1">
                                  <span>👥</span>
                                  <strong>{participantCount}</strong>
                                  <span>人報名</span>
                                </span>
                                <span className="flex items-center space-x-1">
                                  <span>🗳️</span>
                                  <strong>{voteCount}</strong>
                                  <span>人投票</span>
                                </span>
                              </div>
                              <span className="text-indigo-400 font-semibold hover:underline flex items-center space-x-1">
                                <span>進入組隊系統 ➜</span>
                              </span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ) : (
                /* 2. 遠征隊詳細主控台 */
                <div>
                  <button 
                    onClick={() => setCurrentRaidId(null)}
                    className="mb-5 flex items-center space-x-1.5 text-sm text-slate-400 hover:text-white transition"
                  >
                    <span>⬅ 返回大廳列表</span>
                  </button>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    {/* 左欄：基本資訊與投票 */}
                    <div className="lg:col-span-2 space-y-6">
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
                        <div className={`p-6 bg-gradient-to-r ${boss?.color} text-white relative`}>
                          <div className="absolute right-6 top-6 opacity-20 text-6xl">{boss?.icon}</div>
                          <span className="bg-black/30 text-white font-bold text-xs px-2.5 py-1 rounded-full uppercase tracking-wider backdrop-blur">
                            遠征隊出征
                          </span>
                          <h2 className="text-2xl font-extrabold mt-3">{activeRaid.title}</h2>
                          <p className="text-white/80 text-sm mt-1.5">{boss?.name} • 團隊容量最多 {boss?.maxPlayers} 人</p>
                        </div>

                        <div className="p-6 space-y-4">
                          <div>
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">隊伍備註 / 戰術要求</h4>
                            <div className="p-4 bg-slate-950/60 rounded-xl border border-slate-800/80 text-sm text-slate-300 leading-relaxed whitespace-pre-wrap">
                              {activeRaid.notes || "團長沒有提供詳細備註。"}
                            </div>
                          </div>

                          <div className="flex flex-wrap items-center justify-between gap-3 pt-2 text-xs text-slate-400 border-t border-slate-855">
                            <div>
                              發起人：<strong className="text-slate-300">{activeRaid.creatorIgn}</strong>
                            </div>
                            <div className="flex space-x-2">
                              <button
                                onClick={() => copyGroupFormat(activeRaid)}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-3 py-1.5 rounded-lg transition text-xs animate-pulse"
                              >
                                📋 複製公告排班表
                              </button>
                              {isCreator && (
                                <button
                                  onClick={() => handleDeleteRaid(activeRaid.id)}
                                  className="bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900 text-rose-300 px-3 py-1.5 rounded-lg transition text-xs"
                                >
                                  🗑️ 刪除此團
                                </button>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* 時間投票區 */}
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                        <div className="flex items-center justify-between mb-4 border-b border-slate-800 pb-3">
                          <div>
                            <h3 className="text-lg font-bold text-white">📅 候選出團時間投票</h3>
                            <p className="text-xs text-slate-400 mt-1">請選擇您可以配合的時間。{isCreator && <span className="text-amber-400 font-semibold">（團長可一鍵錄取投票人員）</span>}</p>
                          </div>
                          <span className="text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-1 rounded-md font-semibold">
                            多人在線同步
                          </span>
                        </div>

                        <div className="space-y-6">
                          {activeRaid.proposedTimes?.map((time, idx) => {
                            const yesVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'yes') || [];
                            const maybeVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'maybe') || [];
                            const noVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'no') || [];

                            const myVoteRecord = activeRaid.votes?.find(v => v.userId === user?.uid);
                            const myChoice = myVoteRecord?.votes?.[idx] || null;

                            const renderVoterBadges = (votersList, badgeColor, emoji) => {
                              if (votersList.length === 0) return null;
                              return (
                                <div className="flex flex-wrap gap-2 mt-2">
                                  {votersList.map((voter) => {
                                    const alreadyInRaid = activeRaid.participants?.some(p => p.userId === voter.userId);
                                    return (
                                      <div 
                                        key={voter.userId}
                                        className="inline-flex items-center space-x-1.5 bg-slate-950/80 hover:bg-slate-900 border border-slate-800 px-2.5 py-1 rounded-lg text-xs transition"
                                      >
                                        <span className={badgeColor}>{emoji}</span>
                                        <span className="font-semibold text-slate-200">{voter.ign}</span>
                                        <span className="text-[10px] text-slate-500">
                                          ({voter.job || '無職業'} Lv.{voter.level || '?'})
                                        </span>
                                        {isCreator && (
                                          alreadyInRaid ? (
                                            <span className="text-emerald-500 font-bold ml-1.5">✓</span>
                                          ) : (
                                            <button
                                              onClick={(e) => {
                                                e.stopPropagation();
                                                handleQuickEnroll(activeRaid.id, voter);
                                              }}
                                              className="ml-1.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-1.5 py-0.5 rounded text-[10px] transition active:scale-95"
                                            >
                                              ➕ 錄取
                                            </button>
                                          )
                                        )}
                                      </div>
                                    );
                                  })}
                                </div>
                              );
                            };

                            return (
                              <div key={idx} className="p-4 bg-slate-950/40 rounded-xl border border-slate-800/80 flex flex-col gap-4">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                  <div className="flex-1">
                                    <span className="text-xs font-semibold text-indigo-400">候選時間 #{idx + 1}</span>
                                    <h4 className="text-base font-bold text-slate-200 mt-0.5">{formatDateTime(time)}</h4>
                                  </div>

                                  <div className="flex items-center space-x-1.5">
                                    <button
                                      onClick={() => handleVoteTime(activeRaid.id, idx, 'yes')}
                                      className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${myChoice === 'yes' ? 'bg-emerald-600 text-white shadow shadow-emerald-500/30' : 'bg-slate-800 hover:bg-slate-750 text-slate-300'}`}
                                    >
                                      🟢 可以
                                    </button>
                                    <button
                                      onClick={() => handleVoteTime(activeRaid.id, idx, 'maybe')}
                                      className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${myChoice === 'maybe' ? 'bg-amber-600 text-white shadow shadow-amber-500/30' : 'bg-slate-800 hover:bg-slate-750 text-slate-300'}`}
                                    >
                                      🟡 也許
                                    </button>
                                    <button
                                      onClick={() => handleVoteTime(activeRaid.id, idx, 'no')}
                                      className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${myChoice === 'no' ? 'bg-rose-600 text-white shadow shadow-rose-500/30' : 'bg-slate-800 hover:bg-slate-750 text-slate-300'}`}
                                    >
                                      🔴 不行
                                    </button>
                                  </div>
                                </div>

                                <div className="border-t border-slate-855/60 pt-2 space-y-2">
                                  {yesVotes.length > 0 && (
                                    <div>
                                      <span className="text-[11px] text-emerald-400 font-bold block mb-1">🟢 可以配合的隊員：</span>
                                      {renderVoterBadges(yesVotes, 'text-emerald-400', '🟢')}
                                    </div>
                                  )}
                                  {maybeVotes.length > 0 && (
                                    <div>
                                      <span className="text-[11px] text-amber-400 font-bold block mb-1">🟡 可能配合的隊員：</span>
                                      {renderVoterBadges(maybeVotes, 'text-amber-400', '🟡')}
                                    </div>
                                  )}
                                  {noVotes.length > 0 && (
                                    <div>
                                      <span className="text-[11px] text-rose-400 font-bold block mb-1">🔴 無法配合的隊員：</span>
                                      {renderVoterBadges(noVotes, 'text-rose-400', '🔴')}
                                    </div>
                                  )}
                                  {yesVotes.length === 0 && maybeVotes.length === 0 && noVotes.length === 0 && (
                                    <span className="text-slate-600 text-xs italic block py-1">目前尚無人對此時間段投票</span>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>

                    {/* 右欄：報名與出團管理 */}
                    <div className="space-y-6">
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                        <h3 className="text-lg font-bold text-white mb-3">✍️ 報名此遠征隊</h3>
                        {activeRaid.participants?.some(p => p.userId === user?.uid) ? (
                          <div className="space-y-3">
                            <div className="p-3 bg-indigo-950/40 border border-indigo-900 rounded-xl text-center">
                              <p className="text-sm font-semibold text-indigo-300">🎉 您已經成功報名本遠征隊！</p>
                              <p className="text-[10px] text-slate-400 mt-1">目前處於候補，等待團長分配小隊。</p>
                            </div>
                            <button
                              onClick={() => handleCancelSignUp(activeRaid.id)}
                              className="w-full bg-slate-800 hover:bg-rose-950/40 border border-slate-700 hover:border-rose-900 text-slate-400 hover:text-rose-300 font-bold py-2 rounded-xl transition text-sm"
                            >
                              取消報名離隊
                            </button>
                          </div>
                        ) : (
                          <div className="space-y-4">
                            <div className="p-3 bg-slate-950/50 rounded-xl border border-slate-855 text-xs text-slate-400 space-y-1.5">
                              <p>角色資訊：</p>
                              <p className="text-slate-200 font-semibold flex flex-wrap gap-1.5">
                                IGN: {profile.ign || "未填寫"} | {profile.job} | Lv.{profile.level}
                              </p>
                              <button onClick={() => setShowProfileModal(true)} className="text-indigo-400 hover:underline font-bold text-[10px]">
                                修改角色卡 ✎
                              </button>
                            </div>

                            <div>
                              <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">個人備註 (選填)</label>
                              <input
                                type="text"
                                value={signUpMemo}
                                onChange={(e) => setSignUpMemo(e.target.value)}
                                placeholder="例：滿聖火、已洗血"
                                className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm focus:outline-none text-slate-200"
                              />
                            </div>

                            <button
                              onClick={() => handleSignUp(activeRaid.id)}
                              className="w-full bg-gradient-to-r from-indigo-500 to-violet-600 text-white font-bold py-2.5 rounded-xl text-sm shadow"
                            >
                              立即報名 (排入候補)
                            </button>
                          </div>
                        )}
                      </div>

                      {isCreator && (
                        <div className="bg-slate-900 border border-amber-500/20 rounded-2xl p-6 shadow-xl">
                          <h3 className="text-md font-bold text-amber-400 mb-1">👑 團長排班工具</h3>
                          <p className="text-xs text-slate-400 mb-4">使用下方分組名單中的按鈕將隊員歸類，完成後複製排班表即可貼回群組！</p>
                          <button
                            onClick={() => handleResetRaid(activeRaid.id)}
                            className="w-full bg-slate-950 hover:bg-slate-850 border border-amber-500/30 text-amber-400 font-bold py-2.5 rounded-xl text-xs transition"
                          >
                            🔄 一鍵重置此團名單與投票
                          </button>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* 分組名單 */}
                  {(() => {
                    const participants = activeRaid.participants || [];
                    const party1 = participants.filter(p => p.party === '1');
                    const party2 = participants.filter(p => p.party === '2');
                    const party3 = participants.filter(p => p.party === '3');
                    const reserves = participants.filter(p => p.party === 'reserve' || !p.party);

                    const renderRosterGroup = (title, pList, groupKey, color) => (
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg flex flex-col justify-between">
                        <div>
                          <div className="flex items-center justify-between border-b border-slate-800 pb-3 mb-3">
                            <h4 className="font-extrabold text-base flex items-center space-x-2">
                              <span className={`w-3 h-3 rounded-full ${color}`} />
                              <span>{title}</span>
                            </h4>
                            <span className="text-xs font-semibold bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full">
                              {pList.length} / 6
                            </span>
                          </div>

                          {pList.length === 0 ? (
                            <div className="py-8 text-center text-slate-600 text-xs italic">尚無隊員被分配到本隊</div>
                          ) : (
                            <div className="space-y-2">
                              {pList.map((p, idx) => (
                                <div key={p.userId} className="bg-slate-950/60 p-3 rounded-xl border border-slate-855 text-xs flex flex-col justify-between gap-2">
                                  <div className="flex items-center justify-between">
                                    <span className="font-bold text-slate-200">{idx + 1}. {p.ign}</span>
                                    <span className="text-[10px] bg-slate-800 text-indigo-300 px-1.5 py-0.5 rounded font-bold">{p.job}</span>
                                  </div>
                                  <div className="text-slate-400 flex items-center justify-between text-[10px]">
                                    <span>等級: <strong className="text-slate-300">{p.level}</strong></span>
                                    {p.memo && <span className="text-amber-400 italic max-w-[140px] truncate">💬 {p.memo}</span>}
                                  </div>
                                  {isCreator && (
                                    <div className="mt-2 pt-2 border-t border-slate-855 flex flex-wrap gap-1">
                                      {groupKey !== '1' && <button onClick={() => handleAssignParty(activeRaid.id, p.userId, '1')} className="bg-slate-800 px-1.5 py-0.5 rounded text-[9px] hover:bg-slate-750 transition">一隊</button>}
                                      {groupKey !== '2' && boss?.maxPlayers > 6 && <button onClick={() => handleAssignParty(activeRaid.id, p.userId, '2')} className="bg-slate-800 px-1.5 py-0.5 rounded text-[9px] hover:bg-slate-750 transition">二隊</button>}
                                      {groupKey !== '3' && boss?.maxPlayers > 12 && <button onClick={() => handleAssignParty(activeRaid.id, p.userId, '3')} className="bg-slate-800 px-1.5 py-0.5 rounded text-[9px] hover:bg-slate-750 transition">三隊</button>}
                                      {groupKey !== 'reserve' && <button onClick={() => handleAssignParty(activeRaid.id, p.userId, 'reserve')} className="bg-slate-800 px-1.5 py-0.5 rounded text-[9px] hover:bg-slate-750 transition">候補</button>}
                                      <button onClick={() => handleKickParticipant(activeRaid.id, p.userId)} className="bg-rose-950/40 text-rose-400 px-1.5 py-0.5 rounded text-[9px] ml-auto hover:bg-rose-900/40 transition">剔除</button>
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    );

                    return (
                      <div className="mt-8">
                        <h3 className="text-lg font-bold text-white mb-4">👥 遠征小隊分組名單</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                          {renderRosterGroup('遠征一隊 (Party 1)', party1, '1', 'bg-blue-500')}
                          {boss?.maxPlayers > 6 && renderRosterGroup('遠征二隊 (Party 2)', party2, '2', 'bg-emerald-500')}
                          {boss?.maxPlayers > 12 && renderRosterGroup('遠征三隊 (Party 3)', party3, '3', 'bg-violet-500')}
                          
                          {/* 候補 */}
                          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg flex flex-col justify-between">
                            <div>
                              <div className="flex items-center justify-between border-b border-slate-800 pb-3 mb-3">
                                <h4 className="font-extrabold text-base flex items-center space-x-2">
                                  <span className="w-3 h-3 rounded-full bg-slate-600" />
                                  <span>候補與預備名單</span>
                                </h4>
                                <span className="text-xs font-semibold bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full">{reserves.length}</span>
                              </div>

                              {reserves.length === 0 ? (
                                <div className="py-8 text-center text-slate-600 text-xs italic">目前無任何候補人員</div>
                              ) : (
                                <div className="space-y-2">
                                  {reserves.map((p) => (
                                    <div key={p.userId} className="bg-slate-950/60 p-3 rounded-xl border border-slate-850 text-xs flex flex-col justify-between gap-2">
                                      <div className="flex items-center justify-between">
                                        <span className="font-bold text-slate-200">{p.ign}</span>
                                        <span className="text-[10px] bg-slate-800 text-indigo-300 px-1.5 py-0.5 rounded font-bold">{p.job}</span>
                                      </div>
                                      <div className="text-slate-400 flex items-center justify-between text-[10px]">
                                        <span>等級: <strong className="text-slate-300">{p.level}</strong></span>
                                        {p.memo && <span className="text-amber-400 italic max-w-[140px] truncate">💬 {p.memo}</span>}
                                      </div>
                                      {isCreator && (
                                        <div className="mt-2 pt-2 border-t border-slate-855/60 flex flex-wrap gap-1">
                                          <button onClick={() => handleAssignParty(activeRaid.id, p.userId, '1')} className="bg-slate-800 px-1.5 py-0.5 rounded text-[9px] hover:bg-slate-750 transition">一隊</button>
                                          {boss?.maxPlayers > 6 && <button onClick={() => handleAssignParty(activeRaid.id, p.userId, '2')} className="bg-slate-800 px-1.5 py-0.5 rounded text-[9px] hover:bg-slate-750 transition">二隊</button>}
                                          {boss?.maxPlayers > 12 && <button onClick={() => handleAssignParty(activeRaid.id, p.userId, '3')} className="bg-slate-800 px-1.5 py-0.5 rounded text-[9px] hover:bg-slate-750 transition">三隊</button>}
                                          <button onClick={() => handleKickParticipant(activeRaid.id, p.userId)} className="bg-rose-950/40 text-rose-400 px-1.5 py-0.5 rounded text-[9px] ml-auto hover:bg-rose-900/40 transition">剔除</button>
                                        </div>
                                      )}
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}
            </main>
          </div>

          {/* 底部隱私資訊與管理者後台按鈕 */}
          <footer className="max-w-6xl mx-auto w-full px-4 py-8 text-center text-xs text-slate-700 border-t border-slate-900 mt-10">
            <p>© 2026 NyxShade 遠征隊. All Rights Reserved.</p>
            <div className="mt-2 space-x-3">
              {isAdminLoggedIn ? (
                <>
                  <button onClick={() => setShowAdminConsole(true)} className="text-amber-500 hover:text-amber-400 hover:underline font-bold transition">🔑 開啟管理員控制台</button>
                  <span className="text-slate-800">•</span>
                  <button onClick={handleAdminLogout} className="text-rose-500 hover:text-rose-400 hover:underline transition">登出管理模式</button>
                </>
              ) : (
                <button onClick={() => setShowAdminLoginModal(true)} className="text-slate-600 hover:text-slate-500 hover:underline transition">🔑 系統管理者登入</button>
              )}
            </div>
          </footer>

          {/* ==========================================
              A. 發起揪團彈出視窗
             ========================================== */}
          {isCreating && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-lg shadow-2xl relative my-8">
                <button onClick={() => setIsCreating(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-white mb-2">🍁 發起全新遠征隊揪團</h3>
                <p className="text-xs text-slate-400 mb-6">點選下方日曆選擇出團時間，發起線上投票！</p>

                <form onSubmit={handleCreateRaid} className="space-y-4 text-sm">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">選擇挑戰 Boss</label>
                    <div className="grid grid-cols-2 gap-2">
                      {BOSS_LIST.map((b) => (
                        <button
                          key={b.id}
                          type="button"
                          onClick={() => setNewRaid({ ...newRaid, bossId: b.id })}
                          className={`p-3 rounded-xl border text-left flex items-center space-x-2 transition ${newRaid.bossId === b.id ? 'bg-slate-800 border-indigo-500 shadow-md shadow-indigo-500/10' : 'bg-slate-950 border-slate-855 text-slate-300'}`}
                        >
                          <span className="text-2xl">{b.icon}</span>
                          <div>
                            <p className="font-bold text-xs text-white truncate">{b.name.split(' (')[0]}</p>
                            <p className="text-[10px] text-slate-400 truncate">最多{b.maxPlayers}人</p>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">揪團主題 / 團隊公告</label>
                    <input
                      type="text"
                      required
                      value={newRaid.title}
                      onChange={(e) => setNewRaid({ ...newRaid, title: e.target.value })}
                      placeholder="例：週六晚上普通炎魔首發團 (招募聖火黑騎、主教)"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 focus:outline-none text-slate-100"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center justify-between">
                      <span>📅 候選日期與時間</span>
                      <button
                        type="button"
                        onClick={() => setNewRaid({ ...newRaid, proposedTimes: [...newRaid.proposedTimes, ''] })}
                        className="text-xs text-indigo-400 hover:underline"
                      >
                        + 新增時間段
                      </button>
                    </label>
                    <div className="space-y-2">
                      {newRaid.proposedTimes.map((time, index) => (
                        <div key={index} className="flex items-center space-x-2">
                          <input
                            type="datetime-local"
                            required
                            value={time}
                            onChange={(e) => {
                              const updated = [...newRaid.proposedTimes];
                              updated[index] = e.target.value;
                              setNewRaid({ ...newRaid, proposedTimes: updated });
                            }}
                            style={{ colorScheme: 'dark' }}
                            className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                          />
                          {newRaid.proposedTimes.length > 1 && (
                            <button
                              type="button"
                              onClick={() => {
                                const updated = newRaid.proposedTimes.filter((_, i) => i !== index);
                                setNewRaid({ ...newRaid, proposedTimes: updated });
                              }}
                              className="text-rose-500 px-2 font-bold"
                            >
                              ✕
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">詳細備註</label>
                    <textarea
                      value={newRaid.notes}
                      onChange={(e) => setNewRaid({ ...newRaid, notes: e.target.value })}
                      placeholder="打王要求，自備藥水等..."
                      rows={3}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none resize-none"
                    />
                  </div>

                  <div className="flex space-x-3 pt-3">
                    <button type="button" onClick={() => setIsCreating(false)} className="flex-1 bg-slate-800 py-2.5 rounded-xl text-slate-300">取消</button>
                    <button type="submit" className="flex-1 bg-gradient-to-r from-orange-500 to-amber-500 py-2.5 rounded-xl text-white font-bold">確認建立</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ==========================================
              B. 個人檔案編輯 (防呆防空防當機制已載入)
             ========================================== */}
          {showProfileModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl relative">
                <button onClick={() => setShowProfileModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-white mb-2">⚙️ 設定我的遊戲角色卡</h3>
                <p className="text-xs text-slate-400 mb-5">設定後，每次投票與報名會自動帶入此身分。</p>

                <form onSubmit={saveProfile} className="space-y-4 text-sm">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">遊戲 ID (IGN)</label>
                    <input
                      type="text"
                      required
                      value={profile.ign}
                      onChange={(e) => setProfile({ ...profile, ign: e.target.value })}
                      placeholder="例如：純粹"
                      disabled={isSavingProfile}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none disabled:opacity-50"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">四轉職業</label>
                    <select
                      value={profile.job}
                      disabled={isSavingProfile}
                      onChange={(e) => setProfile({ ...profile, job: e.target.value })}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none disabled:opacity-50"
                    >
                      {Object.entries(JOB_CATEGORIES).map(([cat, jobs]) => (
                        <optgroup key={cat} label={cat}>
                          {jobs.map(j => <option key={j} value={j}>{j}</option>)}
                        </optgroup>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">等級 (Lv.)</label>
                    <input
                      type="number"
                      required
                      min={120}
                      max={200}
                      value={profile.level}
                      disabled={isSavingProfile}
                      onChange={(e) => setProfile({ ...profile, level: Number(e.target.value) })}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none disabled:opacity-50"
                    />
                  </div>

                  {/* 診斷提醒說明 */}
                  {dbStatus !== 'connected' && (
                    <div className="p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-[11px] text-rose-400 space-y-1">
                      <p className="font-bold">⚠️ 目前資料庫未連線：</p>
                      <p>1. 請確認右上角狀態燈是否為「🟢 連線成功」。</p>
                      <p>2. 請至 Firebase Console 啟用 <b>Authentication - 匿名 (Anonymous) 登入</b>功能。</p>
                      <p>3. 請確認您的網頁廣告阻擋插件（如 AdBlock）未封鎖 Firebase API。</p>
                    </div>
                  )}

                  <button 
                    type="submit" 
                    disabled={isSavingProfile || dbStatus !== 'connected'}
                    className={`w-full py-2.5 rounded-xl font-bold transition duration-200 ${
                      dbStatus !== 'connected'
                        ? 'bg-slate-800 text-slate-500 cursor-not-allowed'
                        : 'bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white shadow-lg active:scale-95'
                    }`}
                  >
                    {isSavingProfile ? "⏳ 儲存中，請稍候..." : dbStatus !== 'connected' ? "❌ 資料庫尚未連線" : "儲存設定"}
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* ==========================================
              C. 管理者登入視窗
             ========================================== */}
          {showAdminLoginModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl relative">
                <button onClick={() => setShowAdminLoginModal(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-amber-400 mb-2">🔑 管理者後台登入</h3>
                <p className="text-xs text-slate-400 mb-5">請輸入管理者帳號與密碼以啟用名單編輯功能。</p>

                <form onSubmit={handleAdminLoginSubmit} className="space-y-4 text-sm">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">管理員帳號</label>
                    <input
                      type="text"
                      required
                      value={adminUsername}
                      onChange={(e) => setAdminUsername(e.target.value)}
                      placeholder="請輸入帳號"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">管理者密碼</label>
                    <input
                      type="password"
                      required
                      value={adminPassword}
                      onChange={(e) => setAdminPassword(e.target.value)}
                      placeholder="請輸入密碼"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                    />
                  </div>

                  {/* 貼心提示：告知使用者預設帳密 */}
                  <div className="p-3 bg-amber-500/5 rounded-xl border border-amber-500/10 text-[10px] text-amber-300 leading-relaxed">
                    <span className="font-bold">💡 貼心提醒：</span><br />
                    本系統目前預設管理帳號為 <code className="bg-slate-950 px-1 py-0.5 rounded font-mono">***</code>，密碼為 <code className="bg-slate-950 px-1 py-0.5 rounded font-mono">***</code>。(可在本網頁原始碼內隨意修改之)。
                  </div>

                  <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-2.5 rounded-xl transition">核對密碼並登入</button>
                </form>
              </div>
            </div>
          )}

          {/* ==========================================
              D. 管理者控制台面板 (集中化、最安全)
             ========================================== */}
          {showAdminConsole && isAdminLoggedIn && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm overflow-y-auto">
              <div className="bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-2xl shadow-2xl relative my-8">
                <button onClick={() => setShowAdminConsole(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                
                <div className="border-b border-slate-800 pb-3 mb-4">
                  <h3 className="text-xl font-extrabold text-amber-400 flex items-center space-x-2">
                    <span>🔑 NyxShade 遠征隊管理者控制台</span>
                  </h3>
                  <p className="text-xs text-slate-400 mt-1">您好管理員，您可以在此管理全體註冊成員的名單或更動系統底層設定。</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  
                  {/* 左側：成員角色卡名單與刪除管理 */}
                  <div className="space-y-4">
                    <div className="flex items-center justify-between">
                      <h4 className="font-bold text-sm text-slate-200 flex items-center space-x-1.5">
                        <span>👥 成員角色卡管理</span>
                        <span className="bg-slate-800 text-slate-400 text-[10px] px-2 py-0.5 rounded-full font-normal">
                          {registeredUsers.length} 人已登錄
                        </span>
                      </h4>
                    </div>

                    {/* 搜尋欄 */}
                    <input
                      type="text"
                      value={searchUserQuery}
                      onChange={(e) => setSearchUserQuery(e.target.value)}
                      placeholder="🔍 搜尋玩家 IGN 或職業..."
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-1.5 text-xs text-slate-200 focus:outline-none"
                    />

                    {/* 註冊清單列表 */}
                    <div className="max-h-[300px] overflow-y-auto pr-2 space-y-2 scrollbar-thin scrollbar-thumb-slate-800">
                      {(() => {
                        const filtered = registeredUsers.filter(u => 
                          (u.ign || '').toLowerCase().includes(searchUserQuery.toLowerCase()) ||
                          (u.job || '').toLowerCase().includes(searchUserQuery.toLowerCase())
                        );

                        if (filtered.length === 0) {
                          return (
                            <div className="text-center text-slate-600 text-xs italic py-10">
                              沒有找到符合搜尋條件的玩家角色卡
                            </div>
                          );
                        }

                        return filtered.map(u => (
                          <div key={u.id} className="flex items-center justify-between bg-slate-950/80 p-2.5 rounded-xl border border-slate-850 text-xs">
                            <div className="truncate pr-2">
                              <p className="font-bold text-slate-200 truncate">{u.ign}</p>
                              <p className="text-[10px] text-slate-500 mt-0.5">
                                {u.job} • Lv.{u.level}
                              </p>
                            </div>
                            <button
                              onClick={() => handleDeleteUserProfile(u.userId, u.ign)}
                              className="bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900 text-rose-300 font-bold px-2.5 py-1.5 rounded-lg text-[10px] transition shrink-0"
                            >
                              🗑️ 刪除角色卡
                            </button>
                          </div>
                        ));
                      })()}
                    </div>
                  </div>

                  {/* 右側：資料庫維護與系統重置 */}
                  <div className="space-y-4">
                    <h4 className="font-bold text-sm text-slate-200">⚙️ 資料庫與連線維護</h4>
                    
                    <div className="p-4 bg-slate-950/60 rounded-xl border border-slate-850 space-y-3">
                      <p className="text-xs text-slate-400 leading-relaxed">
                        <span className="font-bold text-amber-500">⚠ 注意事項：</span><br />
                        如果您不小心更動或貼錯了 Firebase 的 Config 造成網頁連線死當，或之後遠征隊更換了全新的專案資料庫，您可以按下下方按鈕將其抹除。
                      </p>
                      
                      <button
                        onClick={handleResetConfig}
                        className="w-full bg-rose-950 hover:bg-rose-900 border border-rose-800 text-rose-300 font-bold py-2 rounded-xl text-xs transition active:scale-95"
                      >
                        ⚠️ 移除並重置本網頁 Firebase 金鑰
                      </button>
                    </div>

                    {/* 資料庫安全性規則指南（貼心提供） */}
                    <div className="p-3 bg-slate-950/40 border border-slate-855 rounded-xl text-[10px] text-slate-500 leading-relaxed">
                      <p className="font-bold text-slate-400">💡 遠征隊刪除規則小撇步：</p>
                      <p className="mt-1">為了確保您在管理後台能一鍵剔除與刪除所有隊員，請確認您的 Firebase Firestore Database 安全性規則 (Rules) 為寬鬆測試模式，例如：</p>
                      <pre className="bg-slate-950 p-2 rounded mt-1 text-slate-400 font-mono text-[9px] overflow-x-auto">
{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if true;
    }
  }
}`}
                      </pre>
                    </div>

                  </div>

                </div>

                <div className="flex justify-end space-x-2 border-t border-slate-800 pt-3 mt-4 text-xs">
                  <button onClick={() => setShowAdminConsole(false)} className="bg-slate-800 hover:bg-slate-750 px-4 py-2 rounded-xl text-slate-300">關閉後台</button>
                </div>

              </div>
            </div>
          )}

          {/* E. 通用 React 自訂確認對話視窗 */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                <h3 className="text-lg font-bold text-rose-400">⚠️ 系統確認</h3>
                <p className="text-sm font-semibold text-slate-100 mt-2">{confirmModal.title}</p>
                <p className="text-xs text-slate-400 mt-1.5 leading-relaxed">{confirmModal.message}</p>
                <div className="flex space-x-3 mt-6">
                  <button onClick={() => setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null })} className="flex-1 bg-slate-850 py-2 rounded-xl text-xs hover:bg-slate-800 transition">取消</button>
                  <button onClick={confirmModal.onConfirm} className="flex-1 bg-rose-600 py-2 rounded-xl text-xs text-white font-bold hover:bg-rose-700 transition active:scale-95">確認執行</button>
                </div>
              </div>
            </div>
          )}

          {/* 全域通知 (Toast) */}
          {toast && (
            <div className="fixed bottom-4 right-4 z-50 animate-bounce">
              <div className={`px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-2 border ${
                toast.type === 'error' 
                  ? 'bg-rose-950/90 border-rose-800 text-rose-200' 
                  : 'bg-emerald-950/90 border-emerald-800 text-emerald-200'
              }`}>
                <span>{toast.type === 'error' ? '❌' : '✅'}</span>
                <span className="text-sm font-medium">{toast.message}</span>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
