<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyxShade遠征隊組隊系統</title>
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel (用於在瀏覽器中直接解析 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase Compat SDKs (全域引入) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // =========================================================================
    // 📢 【管理員設定區】全域預設 Firebase 金鑰設定（已為您預先載入金鑰 🔑）
    // =========================================================================
    const DEFAULT_FIREBASE_CONFIG = {
      apiKey: "AIzaSyAQBMRNTYfViM-iPy-nOZs3IdPEQRCQ56w",
      authDomain: "msw-artale.firebaseapp.com",
      projectId: "msw-artale",
      storageBucket: "msw-artale.firebasestorage.app",
      messagingSenderId: "793229546795",
      appId: "1:793229546795:web:8cff2b6f43ae48ac1d616e",
      measurementId: "G-YH8KBMMQGC"
    }; 

    // ==========================================
    // 遊戲常數設定 (Boss、職業等)
    // ==========================================
    const BOSS_LIST = [
      { id: 'zakum_normal', name: '普通炎魔 (Normal Zakum)', icon: '🔥', color: 'from-amber-600 to-red-700', maxPlayers: 18, desc: '最經典的 8 手炎魔，需要良好調度。' },
      { id: 'papu_normal', name: '普通拉圖斯 (Normal Papulatus)', icon: '⏰', color: 'from-blue-500 to-indigo-600', maxPlayers: 6, desc: '需要注意計時器與地圖炸彈。' },
      { id: 'papu_hard', name: '困難拉圖斯 (Hard Papulatus)', icon: '⏰', color: 'from-violet-600 to-fuchsia-850', maxPlayers: 6, desc: 'Artale 超高難度挑戰，極度考驗輸出與走位。' },
      { id: 'horntail', name: '闇黑龍王 (Horntail)', icon: '🐉', color: 'from-emerald-600 to-teal-800', maxPlayers: 18, desc: '三顆龙头與多部位挑戰，誘惑控制是關鍵。' },
      { id: 'pink_bean', name: '蝴蝶(艾畢) (Pink Bean)', icon: '🦋', color: 'from-pink-400 to-rose-600', maxPlayers: 30, desc: '目前終極 Boss，雕像攻略與反射考驗。' }
    ];

    const JOB_CATEGORIES = {
      '劍士': ['英雄', '聖騎士', '黑騎士'],
      '法師': ['大魔導士(火/毒)', '大魔導士(冰/雷)', '主教'],
      '弓箭手': ['箭神', '神射手'],
      '盜賊': ['夜使者', '暗影神偷'],
      '海盜': ['拳霸', '槍神']
    };

    // 時間格式化輔助函數
    const formatDateTime = (dateTimeStr) => {
      if (!dateTimeStr) return '';
      if (!dateTimeStr.includes('T')) return dateTimeStr;
      try {
        const date = new Date(dateTimeStr);
        if (isNaN(date.getTime())) return dateTimeStr;
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        return `${year}-${month}-${day} (${weekdays[date.getDay()]}) ${hours}:${minutes}`;
      } catch (e) {
        return dateTimeStr;
      }
    };

    // 寬鬆的 Firebase Config 提取解析器
    function parseFirebaseConfig(text) {
      try {
        return JSON.parse(text);
      } catch (e) {
        const config = {};
        const keys = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
        keys.forEach(key => {
          const match = text.match(new RegExp(`['"]?${key}['"]?\\s*:\\s*['"]([^'"]+)['"]`));
          if (match) config[key] = match[1];
        });
        if (config.apiKey && config.projectId) return config;
        throw new Error("無法解析，請確認複製的內容是否包含 apiKey 與 projectId。");
      }
    }

   function App() {
      // ------------------------------------------
      // Firebase 初始化與連線狀態
      // ------------------------------------------
      const [dbConfig, setDbConfig] = useState(() => {
        if (DEFAULT_FIREBASE_CONFIG) return DEFAULT_FIREBASE_CONFIG;
        if (window.__firebase_config) return window.__firebase_config;
        const local = localStorage.getItem('artale_firebase_config');
        return local ? JSON.parse(local) : null;
      });

      const [configInput, setConfigInput] = useState('');
      const [appId] = useState(() => window.__app_id || 'artale-expedition-default');
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [db, setDb] = useState(null);
      const [auth, setAuth] = useState(null);
      const [dbStatus, setDbStatus] = useState('connecting'); // 'no-config' | 'connecting' | 'connected' | 'error'

      const [user, setUser] = useState(null);
      
      // 💡 支援多角色設定
      const [profile, setProfile] = useState({
        activeCharacterIndex: 0,
        characters: [{ ign: '', job: '主教', level: 120 }]
      });
      const [tempCharacters, setTempCharacters] = useState([]);
      const [tempActiveIndex, setTempActiveIndex] = useState(0);

      const [profileLoaded, setProfileLoaded] = useState(false);
      const [showProfileModal, setShowProfileModal] = useState(false);
      const [isSavingProfile, setIsSavingProfile] = useState(false);

      const [raids, setRaids] = useState([]);
      const [currentRaidId, setCurrentRaidId] = useState(null);
      const [isCreating, setIsCreating] = useState(false);
      
      // 💡 管理員編輯現有遠征隊狀態
      const [isEditingRaid, setIsEditingRaid] = useState(false);
      const [editRaidData, setEditRaidData] = useState({ title: '', bossId: 'zakum_normal', notes: '', proposedTimes: [''] });

      // 隱藏重設點擊次數狀態 (點 5 次灰色小字重設)
      const [hiddenResetClicks, setHiddenResetClicks] = useState(0);

      // 管理者帳號狀態
      const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(() => {
        return sessionStorage.getItem('artale_is_admin') === 'true';
      });
      const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
      const [showAdminConsole, setShowAdminConsole] = useState(false);
      const [adminUsername, setAdminUsername] = useState('');
      const [adminPassword, setAdminPassword] = useState('');
      const [registeredUsers, setRegisteredUsers] = useState([]);
      const [searchUserQuery, setSearchUserQuery] = useState('');

      // 表單與通用 UI 狀態
      const [newRaid, setNewRaid] = useState({ title: '', bossId: 'zakum_normal', notes: '', proposedTimes: [''] });
      const [signUpMemo, setSignUpMemo] = useState('');
      const [toast, setToast] = useState(null);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 5000); 
      };

      const triggerConfirm = (title, message, onConfirmCallback) => {
        setConfirmModal({
          isOpen: true,
          title,
          message,
          onConfirm: () => {
            onConfirmCallback();
            setConfirmModal({ isOpen: false, title: '', message: '', onConfirm: null });
          }
        });
      };

      // 儲存手動輸入的 Firebase 金鑰
      const handleSaveConfig = (e) => {
        e.preventDefault();
        try {
          const parsed = parseFirebaseConfig(configInput);
          localStorage.setItem('artale_firebase_config', JSON.stringify(parsed));
          setDbConfig(parsed);
          showToast("資料庫設定成功！網頁即將自動連線。");
        } catch (err) {
          alert("金鑰解析失敗，請確認是否完整複製了 firebaseConfig 的內容！");
        }
      };

      // 清除金鑰設定
      const handleResetConfig = () => {
        triggerConfirm(
          "確定要重置資料庫設定嗎？",
          "重置後網頁將會重新整理，並需要再次輸入 Firebase 金鑰才能繼續使用組隊系統。",
          () => {
            localStorage.removeItem('artale_firebase_config');
            window.location.reload();
          }
        );
      };

      // 點擊小助手標題觸發隱藏重設
      const handleSecretClick = () => {
        setHiddenResetClicks(prev => {
          const next = prev + 1;
          if (next >= 5) {
            handleResetConfig();
            return 0;
          }
          return next;
        });
      };

      // 管理者登入邏輯
      const handleAdminLoginSubmit = (e) => {
        e.preventDefault();
        const DEFAULT_ADMIN_USER = "admin";
        const DEFAULT_ADMIN_PASS = "nyxshadeadmin";

        if (adminUsername.toLowerCase() === DEFAULT_ADMIN_USER && adminPassword === DEFAULT_ADMIN_PASS) {
          setIsAdminLoggedIn(true);
          sessionStorage.setItem('artale_is_admin', 'true');
          setShowAdminLoginModal(false);
          setAdminUsername('');
          setAdminPassword('');
          showToast("🔑 管理者權限驗證成功！已啟用後台控制。");
          setShowAdminConsole(true);
        } else {
          showToast("帳號或密碼錯誤，請重新確認！", "error");
        }
      };

      const handleAdminLogout = () => {
        setIsAdminLoggedIn(false);
        sessionStorage.removeItem('artale_is_admin');
        setShowAdminConsole(false);
        showToast("已成功登出管理者模式。");
      };

      // 初始化 Firebase
      useEffect(() => {
        if (!dbConfig) {
          setDbStatus('no-config');
          return;
        }
        try {
          let app;
          if (firebase.apps.length === 0) {
            app = firebase.initializeApp(dbConfig);
          } else {
            app = firebase.app();
          }
          const firestoreDb = firebase.firestore(app);
          const firebaseAuth = firebase.auth(app);
          
          setDb(firestoreDb);
          setAuth(firebaseAuth);
          setDbStatus('connecting');
        } catch (err) {
          console.error(err);
          setDbStatus('error');
          alert("Firebase 初始化失敗，可能是您的金鑰有誤，請點擊底部的管理登入重置。");
        }
      }, [dbConfig]);

      // 身份驗證與登入監聽
      useEffect(() => {
        if (!auth || !db) return;

        const initAuth = async () => {
          try {
            if (window.__initial_auth_token) {
              await auth.signInWithCustomToken(window.__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Firebase 登入失敗：", error);
            setDbStatus('error');
            showToast(`登入失敗: ${error.message} (請確認 Firebase 是否已開啟「匿名登入」功能)`, "error");
          }
        };

        initAuth();
        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            setDbStatus('connected');
          }
        });
        return () => unsubscribe();
      }, [auth, db]);

      // 個人檔案載入與後台靜態同步（支援多身分格式相容與遷移）
      useEffect(() => {
        if (!user || !db) return;

        const fetchProfile = async () => {
          try {
            const profileRef = db.doc(`artifacts/${appId}/users/${user.uid}/profile/info`);
            const docSnap = await profileRef.get();
            if (docSnap.exists) {
              const data = docSnap.data();
              let loadedProfile = {};
              
              if (data.characters && data.characters.length > 0) {
                loadedProfile = {
                  activeCharacterIndex: Number(data.activeCharacterIndex) || 0,
                  characters: data.characters
                };
              } else {
                // 舊單身分格式轉移
                loadedProfile = {
                  activeCharacterIndex: 0,
                  characters: [{
                    ign: data.ign || '',
                    job: data.job || '主教',
                    level: Number(data.level) || 120
                  }]
                };
              }
              setProfile(loadedProfile);

              // [背景同步] 成員名冊同步
              db.doc(`artifacts/${appId}/public/data/registered_users/${user.uid}`).set({
                userId: user.uid,
                ...loadedProfile,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              }).catch(e => console.error("背景成員名冊同步失敗：", e));

            } else {
              setShowProfileModal(true);
            }
            setProfileLoaded(true);
          } catch (err) {
            console.error("載入個人檔案失敗：", err);
          }
        };
        fetchProfile();
      }, [user, db]);

      // 監聽所有已註冊隊員名冊 (僅限管理者模式加載)
      useEffect(() => {
        if (!user || !db || !isAdminLoggedIn) return;

        const regUsersCollection = db.collection(`artifacts/${appId}/public/data/registered_users`);
        const unsubscribe = regUsersCollection.onSnapshot((snapshot) => {
          const usersList = [];
          snapshot.forEach((doc) => {
            usersList.push({ id: doc.id, ...doc.data() });
          });
          setRegisteredUsers(usersList);
        }, (error) => {
          console.error("讀取成員清單發生錯誤：", error);
        });

        return () => unsubscribe();
      }, [user, db, isAdminLoggedIn]);

      // 初始化角色卡編輯對話框暫存狀態
      useEffect(() => {
        if (showProfileModal) {
          if (profile.characters && profile.characters.length > 0) {
            setTempCharacters(JSON.parse(JSON.stringify(profile.characters)));
            setTempActiveIndex(profile.activeCharacterIndex);
          } else {
            setTempCharacters([{ ign: '', job: '主教', level: 120 }]);
            setTempActiveIndex(0);
          }
        }
      }, [showProfileModal, profile]);

      // 儲存角色檔案（支援多身分儲存）
      const saveProfile = async (e) => {
        e.preventDefault();
        if (!user || !db) {
          showToast("尚未連線至資料庫，請稍後再試！", "error");
          return;
        }

        const hasEmptyIgn = tempCharacters.some(c => !c.ign.trim());
        if (hasEmptyIgn) {
          showToast("所有角色的 遊戲 ID (IGN) 均不可為空！", "error");
          return;
        }

        setIsSavingProfile(true);
        try {
          const profileData = {
            activeCharacterIndex: tempActiveIndex,
            characters: tempCharacters.map(c => ({
              ign: c.ign.trim(),
              job: c.job,
              level: Number(c.level) || 120
            })),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          // 1. 寫入個人私有檔案 (Rule 1)
          const profileRef = db.doc(`artifacts/${appId}/users/${user.uid}/profile/info`);
          await profileRef.set(profileData);

          // 2. 寫入公用成員清單以供管理者後台管理 (Rule 1)
          const publicRef = db.doc(`artifacts/${appId}/public/data/registered_users/${user.uid}`);
          await publicRef.set({
            userId: user.uid,
            ...profileData
          });

          setProfile(profileData);
          setShowProfileModal(false);
          showToast("角色身分檔案更新成功！");
        } catch (err) {
          console.error("儲存個人檔案發生錯誤：", err);
          showToast(`儲存失敗: ${err.message}`, "error");
        } finally {
          setIsSavingProfile(false);
        }
      };

      // 管理者專用：徹底刪除某隊員的角色資料卡
      const handleDeleteUserProfile = (targetUserId, targetIgn) => {
        triggerConfirm(
          `確定要刪除該玩家的所有身分角色卡嗎？`,
          "這將會徹底抹除該隊員在資料庫中的所有角色紀錄。此操作不可逆！",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/registered_users/${targetUserId}`).delete();
              await db.doc(`artifacts/${appId}/users/${targetUserId}/profile/info`).delete();
              showToast(`已成功刪除該使用者的所有角色檔案！`);
            } catch (err) {
              console.error(err);
              showToast(`刪除失敗: ${err.message}`, "error");
            }
          }
        );
      };

      // 實時監聽組隊列表
      useEffect(() => {
        if (!user || !db) return;

        const raidsCollection = db.collection(`artifacts/${appId}/public/data/raids`);
        const unsubscribe = raidsCollection.onSnapshot((snapshot) => {
          const raidsData = [];
          snapshot.forEach((doc) => {
            raidsData.push({ id: doc.id, ...doc.data() });
          });
          raidsData.sort((a, b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return bTime - aTime;
          });
          setRaids(raidsData);
        }, (error) => {
          console.error("即時同步發生錯誤：", error);
        });
        return () => unsubscribe();
      }, [user, db]);

      // 取得當前使用的出團角色
      const activeCharacter = profile.characters?.[profile.activeCharacterIndex] || profile.characters?.[0] || { ign: '', job: '主教', level: 120 };

      // 發起新團
      const handleCreateRaid = async (e) => {
        e.preventDefault();
        if (!user || !db) return;
        if (!activeCharacter.ign) {
          showToast("請先設定您的遊戲 ID！", "error");
          setShowProfileModal(true);
          return;
        }
        const filteredTimes = newRaid.proposedTimes.filter(t => t.trim() !== '');
        if (filteredTimes.length === 0) {
          showToast("請至少填寫一個候選時間！", "error");
          return;
        }

        try {
          await db.collection(`artifacts/${appId}/public/data/raids`).add({
            title: newRaid.title,
            bossId: newRaid.bossId,
            notes: newRaid.notes,
            proposedTimes: filteredTimes,
            creatorId: user.uid,
            creatorIgn: activeCharacter.ign,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            participants: [],
            votes: []
          });
          setNewRaid({ title: '', bossId: 'zakum_normal', notes: '', proposedTimes: [''] });
          setIsCreating(false);
          showToast("成功發起遠征隊揪團！");
        } catch (err) {
          showToast(`建立失敗: ${err.message}`, "error");
        }
      };

      // 💡 管理員/團長編輯遠征隊資訊與時間
      const startEditingRaid = () => {
        const activeRaid = raids.find(r => r.id === currentRaidId);
        if (!activeRaid) return;
        setEditRaidData({
          title: activeRaid.title || '',
          bossId: activeRaid.bossId || 'zakum_normal',
          notes: activeRaid.notes || '',
          proposedTimes: [...(activeRaid.proposedTimes || [''])]
        });
        setIsEditingRaid(true);
      };

      const handleSaveRaidEdit = async (e) => {
        e.preventDefault();
        if (!user || !db || !currentRaidId) return;
        const filteredTimes = editRaidData.proposedTimes.filter(t => t.trim() !== '');
        if (filteredTimes.length === 0) {
          showToast("請至少填寫一個候選時間！", "error");
          return;
        }

        try {
          await db.doc(`artifacts/${appId}/public/data/raids/${currentRaidId}`).update({
            title: editRaidData.title,
            bossId: editRaidData.bossId,
            notes: editRaidData.notes,
            proposedTimes: filteredTimes
          });
          setIsEditingRaid(false);
          showToast("遠征隊資訊與時間修改成功！");
        } catch (err) {
          showToast(`修改失敗: ${err.message}`, "error");
        }
      };

      // 刪除團
      const handleDeleteRaid = (raidId) => {
        triggerConfirm(
          "確定要刪除此遠征隊嗎？",
          "此操作不可逆，將清空所有報名與投票資訊。",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).delete();
              if (currentRaidId === raidId) setCurrentRaidId(null);
              showToast("已刪除該遠征隊。");
            } catch (err) {
              showToast("刪除失敗", "error");
            }
          }
        );
      };

      // 重置團名單
      const handleResetRaid = (raidId) => {
        triggerConfirm(
          "確定要重置此團名單嗎？",
          "這會清空所有的報名、小隊編組與投票，但保留本團的標題、時間與基本設定。",
          async () => {
            try {
              await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({
                participants: [],
                votes: []
              });
              showToast("已重置名單，大家可以開始重新報名囉！");
            } catch (err) {
              showToast("重置失敗", "error");
            }
          }
        );
      };

      // 投票時間 (基於當前啟用之身分角色進行)
      const handleVoteTime = async (raidId, timeIndex, choice) => {
        if (!activeCharacter.ign) {
          showToast("請先點擊右上角設定您的遊戲角色卡才能進行投票！", "error");
          setShowProfileModal(true);
          return;
        }
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;

        try {
          const raidRef = db.doc(`artifacts/${appId}/public/data/raids/${raidId}`);
          let updatedVotes = [...(raid.votes || [])];
          
          // 支援多身分分開投票
          const userVoteIndex = updatedVotes.findIndex(v => v.userId === user.uid && v.ign === activeCharacter.ign);

          if (userVoteIndex > -1) {
            const userVote = { ...updatedVotes[userVoteIndex] };
            userVote.job = activeCharacter.job;
            userVote.level = activeCharacter.level;
            userVote.votes = { ...userVote.votes, [timeIndex]: choice };
            updatedVotes[userVoteIndex] = userVote;
          } else {
            updatedVotes.push({
              userId: user.uid,
              ign: activeCharacter.ign,
              job: activeCharacter.job,
              level: activeCharacter.level,
              votes: { [timeIndex]: choice }
            });
          }
          await raidRef.update({ votes: updatedVotes });
          showToast("投票成功！");
        } catch (err) {
          showToast(`投票失敗: ${err.message}`, "error");
        }
      };

      // 報名 (支援當前切換的角色獨立候補)
      const handleSignUp = async (raidId) => {
        if (!activeCharacter.ign) {
          showToast("請先設定您的出團遊戲角色卡才能報名！", "error");
          setShowProfileModal(true);
          return;
        }
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;

        // 避免重複用同一個角色報名
        if (raid.participants?.some(p => p.userId === user.uid && p.ign === activeCharacter.ign)) {
          showToast(`角色 【${activeCharacter.ign}】 已經在報名名單中了！`, "error");
          return;
        }

        try {
          const raidRef = db.doc(`artifacts/${appId}/public/data/raids/${raidId}`);
          const updatedParticipants = [...(raid.participants || [])];
          updatedParticipants.push({
            userId: user.uid,
            ign: activeCharacter.ign,
            job: activeCharacter.job,
            level: activeCharacter.level,
            memo: signUpMemo.trim(),
            party: 'reserve'
          });
          await raidRef.update({ participants: updatedParticipants });
          setSignUpMemo('');
          showToast(`【${activeCharacter.ign}】報名成功！已進入候補名單。`);
        } catch (err) {
          showToast(`報名失敗: ${err.message}`, "error");
        }
      };

      // 一鍵錄取投票人員 (升級多身分綁定 - 💡已移除預設備註文字)
      const handleQuickEnroll = async (raidId, voter) => {
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;
        if (raid.participants?.some(p => p.userId === voter.userId && p.ign === voter.ign)) {
          showToast(`${voter.ign} 已經在名單中囉！`, "error");
          return;
        }
        try {
          const raidRef = db.doc(`artifacts/${appId}/public/data/raids/${raidId}`);
          const updatedParticipants = [...(raid.participants || [])];
          updatedParticipants.push({
            userId: voter.userId,
            ign: voter.ign,
            job: voter.job || '未知',
            level: voter.level || 120,
            memo: '', // 💡將預設文字移除，改為空白，避免顯示惱人的預設泡泡
            party: 'reserve'
          });
          await raidRef.update({ participants: updatedParticipants });
          showToast(`已成功錄取 【${voter.ign}】！`);
        } catch (err) {
          showToast("錄取失敗", "error");
        }
      };

      // 取消報名 (僅撤回當前選擇之角色)
      const handleCancelSignUp = async (raidId) => {
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;
        try {
          const updatedParticipants = raid.participants.filter(p => !(p.userId === user.uid && p.ign === activeCharacter.ign));
          await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({ participants: updatedParticipants });
          showToast(`已取消角色 【${activeCharacter.ign}】 的報名。`);
        } catch (err) {
          console.error(err);
        }
      };

      // 分組 (綁定 userId + ign 雙重鍵)
      const handleAssignParty = async (raidId, targetUserId, targetIgn, targetParty) => {
        const raid = raids.find(r => r.id === raidId);
        if (!raid) return;
        try {
          const updatedParticipants = raid.participants.map(p => {
            if (p.userId === targetUserId && p.ign === targetIgn) return { ...p, party: targetParty };
            return p;
          });
          await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({ participants: updatedParticipants });
          showToast("分組更新成功！");
        } catch (err) {
          console.error(err);
        }
      };

      // 踢人 (綁定 userId + ign 雙重鍵)
      const handleKickParticipant = (raidId, targetUserId, targetIgn) => {
        triggerConfirm(
          "確定要移出此玩家嗎？",
          `將把 【${targetIgn}】 從出團與分組名單中移除。`,
          async () => {
            const activeRaid = raids.find(r => r.id === raidId);
            if (!activeRaid) return;
            try {
              const updatedParticipants = activeRaid.participants.filter(p => !(p.userId === targetUserId && p.ign === targetIgn));
              await db.doc(`artifacts/${appId}/public/data/raids/${raidId}`).update({ participants: updatedParticipants });
              showToast("已成功移出玩家。");
            } catch (err) {
              console.error(err);
            }
          }
        );
      };

      // 複製公告格式
      const copyGroupFormat = (raid) => {
        const boss = BOSS_LIST.find(b => b.id === raid.bossId);
        let bestTimeText = "待定";
        let maxYesCount = -1;
        raid.proposedTimes.forEach((time, index) => {
          const yesVotes = raid.votes?.filter(v => v.votes?.[index] === 'yes').length || 0;
          if (yesVotes > maxYesCount) {
            maxYesCount = yesVotes;
            bestTimeText = formatDateTime(time);
          }
        });

        const participants = raid.participants || [];
        const party1 = participants.filter(p => p.party === '1');
        const party2 = participants.filter(p => p.party === '2');
        const party3 = participants.filter(p => p.party === '3');
        const reserves = participants.filter(p => p.party === 'reserve' || !p.party);

        let text = `⚔️ **【Artale 遠征隊公車】${boss?.name || ''}** ⚔️\n`;
        text += `📌 **主題**：${raid.title}\n`;
        text += `📅 **預計時間**：${bestTimeText} (最高得票)\n`;
        if (raid.notes) {
          text += `📝 **備註**：${raid.notes}\n`;
        }
        text += `\n📋 **實時遠征隊名單**：\n`;

        const formatParty = (pList, pName) => {
          if (pList.length === 0) return `${pName}：(尚無隊員)\n`;
          let pText = `${pName}：\n`;
          pList.forEach((p, idx) => {
            pText += `  ${idx + 1}. [${p.job}] ${p.ign} (Lv.${p.level})${p.memo ? ` - ${p.memo}` : ''}\n`;
          });
          return pText;
        };

        text += formatParty(party1, '🔵 【遠征一隊】');
        if (boss?.maxPlayers > 6) text += formatParty(party2, '🟢 【遠征二隊】');
        if (boss?.maxPlayers > 12) text += formatParty(party3, '🟣 【遠征三隊】');
        if (reserves.length > 0) {
          text += `\n🔸 **【候補名單】**：\n`;
          reserves.forEach(p => {
            text += `  - [${p.job}] ${p.ign} (Lv.${p.level})${p.memo ? ` - ${p.memo}` : ''}\n`;
          });
        }
        text += `\n🔗 **即時投票/卡位系統**：${window.location.href}`;

        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          showToast("排班表格式已複製到剪貼簿！可直接貼在群組中。");
        } catch (err) {
          showToast("複製失敗，請手動複製", "error");
        }
        document.body.removeChild(textarea);
      };

      // 未設定資料庫時的引導畫面
      if (!dbConfig) {
        return (
          <div className="max-w-md mx-auto mt-20 p-6 bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl">
            <h2 className="text-2xl font-bold text-center text-amber-400 flex items-center justify-center space-x-2">
              <span>🍁 NyxShade 組隊系統</span>
            </h2>
            <p className="text-xs text-slate-400 text-center mt-2">首次在 GitHub 使用，請先設定您的 Firebase 資料庫。</p>
            <form onSubmit={handleSaveConfig} className="mt-6 space-y-4">
              <div>
                <label className="block text-xs font-bold text-slate-400 uppercase mb-2">請貼上您的 Firebase Config 程式碼段落</label>
                <textarea
                  required
                  rows={8}
                  value={configInput}
                  onChange={(e) => setConfigInput(e.target.value)}
                  placeholder={`例：\nconst firebaseConfig = {\n  apiKey: "AIzaSy...",\n  authDomain: "...",\n  projectId: "..."\n};`}
                  className="w-full bg-slate-950 border border-slate-800 focus:border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200 placeholder-slate-600 font-mono focus:outline-none resize-none"
                />
              </div>
              <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white font-bold py-2.5 rounded-xl shadow-lg transition">
                儲存金鑰並啟用系統
              </button>
            </form>
          </div>
        );
      }

      const activeRaid = raids.find(r => r.id === currentRaidId);
      const boss = activeRaid ? BOSS_LIST.find(b => b.id === activeRaid.bossId) : null;
      const isCreator = user && activeRaid ? (user.uid === activeRaid.creatorId || isAdminLoggedIn) : false;

      return (
        <div className="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col justify-between">
          
          <div>
            {/* 頂部導航列 - 100% 乾淨防呆，提供實時連線狀態 */}
            <header className="sticky top-0 z-30 bg-slate-900/80 backdrop-blur border-b border-slate-800 px-4 py-3.5 shadow-lg">
              <div className="max-w-6xl mx-auto flex items-center justify-between">
                <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setCurrentRaidId(null)}>
                  <div className="text-4xl">🍁</div>
                  <div>
                    <h1 className="text-xl md:text-2xl font-black bg-gradient-to-r from-orange-400 to-amber-300 bg-clip-text text-transparent">
                      NyxShade遠征隊組隊系統
                    </h1>
                    <p 
                      onClick={handleSecretClick}
                      className="text-xs text-slate-500 select-none cursor-pointer active:text-amber-400 hover:text-slate-400 transition"
                      title="快速點擊5次可管理金鑰"
                    >
                      MSW 懷舊楓之谷出團小助手
                    </p>
                  </div>
                </div>

                {/* 右側玩家角色卡 + 🔄 多身分快速切換選單 */}
                <div className="flex items-center space-x-2.5">
                  <div className="hidden sm:block">
                    {dbStatus === 'connecting' && <span className="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-lg text-xs font-bold animate-pulse">⏳ 連線中</span>}
                    {dbStatus === 'connected' && <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-lg text-xs font-bold">🟢 連線成功</span>}
                    {dbStatus === 'error' && <span className="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-lg text-xs font-bold">⚠️ 連線異常</span>}
                  </div>

                  {profileLoaded ? (
                    <div className="flex items-center space-x-2">
                      {/* 當前活躍角色展示 */}
                      <button 
                        onClick={() => setShowProfileModal(true)}
                        className="bg-slate-900/95 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 rounded-xl px-4 py-2.5 flex items-center space-x-2.5 transition text-base"
                      >
                        <span className="text-xl text-amber-400">🛡️</span>
                        <span className="font-bold text-slate-100">
                          {activeCharacter.ign ? `${activeCharacter.ign} (${activeCharacter.job})` : '設定出團身分'}
                        </span>
                      </button>

                      {/* 🔄 快速切換下拉選單 */}
                      {profile.characters && profile.characters.length > 1 && (
                        <select
                          value={profile.activeCharacterIndex}
                          onChange={async (e) => {
                            const nextIdx = Number(e.target.value);
                            const updatedProfile = { ...profile, activeCharacterIndex: nextIdx };
                            setProfile(updatedProfile);
                            try {
                              await db.doc(`artifacts/${appId}/users/${user.uid}/profile/info`).update({ activeCharacterIndex: nextIdx });
                              await db.doc(`artifacts/${appId}/public/data/registered_users/${user.uid}`).update({ activeCharacterIndex: nextIdx });
                              showToast(`已快速切換出團角色為：【${profile.characters[nextIdx].ign}】`);
                            } catch (err) {
                              console.error(err);
                            }
                          }}
                          className="bg-slate-900 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-amber-400 font-bold focus:outline-none cursor-pointer hover:border-slate-700 transition"
                        >
                          {profile.characters.map((c, i) => (
                            <option key={i} value={i} className="bg-slate-900 font-bold text-slate-200">
                              🔄 切換: {c.ign} ({c.job})
                            </option>
                          ))}
                        </select>
                      )}
                    </div>
                  ) : (
                    <div className="h-10 w-32 bg-slate-850 animate-pulse rounded-xl" />
                  )}
                </div>
              </div>
            </header>

            {/* 主體內容 */}
            <main className="max-w-6xl mx-auto p-4 md:p-6 pb-20">
              
              <div className="sm:hidden mb-4 text-center">
                {dbStatus === 'connecting' && <span className="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full text-xs font-bold animate-pulse">⏳ 連線中</span>}
                {dbStatus === 'connected' && <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-xs font-bold">🟢 連線成功</span>}
                {dbStatus === 'error' && <span className="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full text-xs font-bold">⚠️ 連線異常</span>}
              </div>

              {/* 1. 大廳列表 */}
              {!activeRaid ? (
                <div>
                  <div className="mb-8 p-8 rounded-3xl bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 shadow-xl relative overflow-hidden">
                    <div className="absolute top-0 right-0 opacity-10 text-9xl">🍁</div>
                    <div className="relative z-10 max-w-2xl">
                      <span className="px-3.5 py-1.5 bg-amber-500/10 text-amber-400 border border-amber-500/20 text-xs rounded-full font-bold">
                        跨平台多端同步
                      </span>
                      <h2 className="text-3xl md:text-4xl font-black mt-4 text-white">Artale 遠征隊組隊</h2>
                      <p className="text-slate-400 mt-2.5 text-base md:text-lg whitespace-pre-line leading-relaxed">
                        支援多身分角色登錄！隊員可線上自主投票時間、隨時切換角色報名打王。
                      </p>
                      <div className="mt-6 flex flex-wrap gap-3">
                        <button 
                          onClick={() => setIsCreating(true)}
                          className="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-extrabold px-6 py-3 rounded-xl shadow-lg transition flex items-center space-x-2 text-sm md:text-base"
                        >
                          <span>➕ 發起全新遠征隊</span>
                        </button>
                        <button 
                          onClick={() => setShowProfileModal(true)}
                          className="bg-slate-800 hover:bg-slate-750 text-slate-200 font-bold px-5 py-3 rounded-xl border border-slate-700 transition text-sm md:text-base"
                        >
                          ⚙️ 管理我的角色卡
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="flex items-center justify-between mb-5">
                    <h3 className="text-xl font-black text-slate-100 flex items-center space-x-2.5">
                      <span>⚔️ 目前進行中的遠征隊</span>
                      <span className="bg-slate-800 text-slate-400 px-3 py-1 rounded-full text-xs font-bold">
                        {raids.length}
                      </span>
                    </h3>
                  </div>

                  {raids.length === 0 ? (
                    <div className="bg-slate-900/40 border border-slate-800/80 rounded-3xl p-16 text-center">
                      <span className="text-6xl block mb-4">🦖</span>
                      <h4 className="text-slate-300 font-bold text-xl">目前沒有任何發起的遠征隊</h4>
                      <p className="text-slate-500 text-sm mt-2">立刻點選上方「發起全新遠征隊」來揪團打王吧！</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {raids.map((raid) => {
                        const raidBoss = BOSS_LIST.find(b => b.id === raid.bossId);
                        const participantCount = raid.participants?.length || 0;
                        const voteCount = raid.votes?.length || 0;

                        return (
                          <div 
                            key={raid.id}
                            onClick={() => setCurrentRaidId(raid.id)}
                            className="bg-slate-900 hover:bg-slate-855 border border-slate-800 hover:border-slate-700 rounded-3xl p-6 cursor-pointer transition transform hover:-translate-y-1 shadow-lg flex flex-col justify-between"
                          >
                            <div>
                              <div className="flex items-center justify-between mb-4">
                                <span className={`px-3 py-1 text-xs font-black rounded-lg text-white bg-gradient-to-r ${raidBoss?.color || 'from-slate-600 to-slate-700'}`}>
                                  {raidBoss?.icon} {raidBoss?.name.split(' (')[0]}
                                </span>
                                <span className="text-xs text-slate-400">
                                  開團者: <span className="text-slate-200 font-bold">{raid.creatorIgn}</span>
                                </span>
                              </div>

                              <h4 className="text-xl font-extrabold text-slate-100 mb-2.5 line-clamp-1">{raid.title}</h4>
                              <p className="text-slate-400 text-sm line-clamp-2 mb-4 bg-slate-950/40 p-3 rounded-xl border border-slate-800/60 min-h-[56px] leading-relaxed">
                                {raid.notes || "沒有提供備註說明。"}
                              </p>
                            </div>

                            <div className="flex items-center justify-between text-sm border-t border-slate-800 pt-4 mt-2">
                              <div className="flex space-x-4 text-slate-300 font-semibold">
                                <span className="flex items-center space-x-1.5">
                                  <span>👥</span>
                                  <strong>{participantCount}</strong>
                                  <span>人報名</span>
                                </span>
                                <span className="flex items-center space-x-1.5">
                                  <span>🗳️</span>
                                  <strong>{voteCount}</strong>
                                  <span>人投票</span>
                                </span>
                              </div>
                              <span className="text-indigo-400 font-bold hover:underline flex items-center space-x-1">
                                <span>進入揪團系統 ➜</span>
                              </span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ) : (
                /* 2. 遠征隊詳細主控台 */
                <div>
                  <button 
                    onClick={() => setCurrentRaidId(null)}
                    className="mb-5 flex items-center space-x-1.5 text-sm md:text-base text-slate-400 hover:text-white transition font-bold"
                  >
                    <span>⬅ 返回大廳列表</span>
                  </button>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    {/* 左欄：基本資訊與投票 */}
                    <div className="lg:col-span-2 space-y-6">
                      <div className="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-xl">
                        <div className={`p-8 bg-gradient-to-r ${boss?.color} text-white relative`}>
                          <div className="absolute right-6 top-6 opacity-20 text-7xl">{boss?.icon}</div>
                          <span className="bg-black/30 text-white font-bold text-xs px-3 py-1 rounded-full uppercase tracking-wider backdrop-blur">
                            遠征隊出征
                          </span>
                          <h2 className="text-2xl md:text-3xl font-black mt-4">{activeRaid.title}</h2>
                          <p className="text-white/90 text-sm md:text-base mt-2">{boss?.name} • 團隊上限最多 {boss?.maxPlayers} 人</p>
                        </div>

                        <div className="p-6 space-y-4">
                          <div>
                            <h4 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">隊伍備註 / 戰術要求</h4>
                            <div className="p-4 bg-slate-950/60 rounded-xl border border-slate-800 text-sm md:text-base text-slate-300 leading-relaxed whitespace-pre-wrap">
                              {activeRaid.notes || "團長沒有提供詳細備註。"}
                            </div>
                          </div>

                          <div className="flex flex-wrap items-center justify-between gap-3 pt-3 text-sm text-slate-400 border-t border-slate-855">
                            <div>
                              發起人：<strong className="text-slate-200">{activeRaid.creatorIgn}</strong>
                            </div>
                            <div className="flex space-x-2">
                              <button
                                onClick={() => copyGroupFormat(activeRaid)}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-xl transition text-xs md:text-sm shadow-sm"
                              >
                                📋 複製公告排班表
                              </button>
                              
                              {/* 💡 團長排班：編輯本團與刪除本團 */}
                              {isCreator && (
                                <>
                                  <button
                                    onClick={startEditingRaid}
                                    className="bg-amber-600 hover:bg-amber-700 text-white font-bold px-4 py-2 rounded-xl transition text-xs md:text-sm shadow-sm"
                                  >
                                    ✏️ 編輯此團
                                  </button>
                                  <button
                                    onClick={() => handleDeleteRaid(activeRaid.id)}
                                    className="bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900 text-rose-300 px-4 py-2 rounded-xl transition text-xs md:text-sm"
                                  >
                                    🗑️ 刪除此團
                                  </button>
                                </>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* 時間投票區 */}
                      <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                        <div className="flex items-center justify-between mb-4 border-b border-slate-800 pb-4">
                          <div>
                            <h3 className="text-lg md:text-xl font-extrabold text-white">📅 候選出團時間投票</h3>
                            <p className="text-xs md:text-sm text-slate-400 mt-1">請選擇可以配合的時間。<span className="text-amber-400 font-bold">（以右上角當前選取的角色身份投票）</span></p>
                          </div>
                        </div>

                        <div className="space-y-6">
                          {activeRaid.proposedTimes?.map((time, idx) => {
                            const yesVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'yes') || [];
                            const maybeVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'maybe') || [];
                            const noVotes = activeRaid.votes?.filter(v => v.votes?.[idx] === 'no') || [];

                            const myVoteRecord = activeRaid.votes?.find(v => v.userId === user?.uid && v.ign === activeCharacter.ign);
                            const myChoice = myVoteRecord?.votes?.[idx] || null;

                            const renderVoterBadges = (votersList, badgeColor, emoji) => {
                              if (votersList.length === 0) return null;
                              return (
                                <div className="flex flex-wrap gap-2.5 mt-2">
                                  {votersList.map((voter, vIdx) => {
                                    const alreadyInRaid = activeRaid.participants?.some(p => p.userId === voter.userId && p.ign === voter.ign);
                                    return (
                                      <div 
                                        key={voter.userId + '-' + voter.ign + '-' + vIdx}
                                        className="inline-flex items-center space-x-2 bg-slate-950 border border-slate-800 px-4 py-2 rounded-xl text-sm transition hover:border-slate-700 max-w-full truncate"
                                      >
                                        <span className="text-base shrink-0">{emoji}</span>
                                        <span className="font-extrabold text-slate-100 truncate">{voter.ign}</span>
                                        <span className="text-xs text-slate-400 font-bold shrink-0">
                                          ({voter.job || '無職業'} Lv.{voter.level || '?'})
                                        </span>
                                        {isCreator && (
                                          alreadyInRaid ? (
                                            <span className="text-emerald-400 font-black ml-1.5 text-base shrink-0">✓</span>
                                          ) : (
                                            <button
                                              onClick={(e) => {
                                                e.stopPropagation();
                                                handleQuickEnroll(activeRaid.id, voter);
                                              }}
                                              className="ml-2 bg-indigo-600 hover:bg-indigo-500 text-white font-black px-2 py-0.5 rounded text-xs transition active:scale-95 shrink-0"
                                            >
                                              ➕ 錄取
                                            </button>
                                          )
                                        )}
                                      </div>
                                    );
                                  })}
                                </div>
                              );
                            };

                            return (
                              <div key={idx} className="p-5 bg-slate-950/40 rounded-2xl border border-slate-800 flex flex-col gap-4">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                  <div className="flex-1">
                                    <span className="text-xs font-bold text-indigo-400 font-mono">候選時間 #{idx + 1}</span>
                                    <h4 className="text-lg font-bold text-slate-200 mt-0.5">{formatDateTime(time)}</h4>
                                  </div>

                                  <div className="flex items-center space-x-2">
                                    <button
                                      onClick={() => handleVoteTime(activeRaid.id, idx, 'yes')}
                                      className={`px-4 py-2 rounded-xl text-sm font-bold transition ${myChoice === 'yes' ? 'bg-emerald-600 text-white shadow shadow-emerald-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                    >
                                      🟢 可以
                                    </button>
                                    <button
                                      onClick={() => handleVoteTime(activeRaid.id, idx, 'maybe')}
                                      className={`px-4 py-2 rounded-xl text-sm font-bold transition ${myChoice === 'maybe' ? 'bg-amber-600 text-white shadow shadow-amber-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                    >
                                      🟡 也許
                                    </button>
                                    <button
                                      onClick={() => handleVoteTime(activeRaid.id, idx, 'no')}
                                      className={`px-4 py-2 rounded-xl text-sm font-bold transition ${myChoice === 'no' ? 'bg-rose-600 text-white shadow shadow-rose-500/30' : 'bg-slate-800 hover:bg-slate-755 text-slate-300'}`}
                                    >
                                      🔴 不行
                                    </button>
                                  </div>
                                </div>

                                <div className="border-t border-slate-800/85 pt-3 space-y-2">
                                  {yesVotes.length > 0 && (
                                    <div>
                                      <span className="text-xs text-emerald-400 font-bold block mb-1">🟢 可以配合的隊員：</span>
                                      {renderVoterBadges(yesVotes, 'text-emerald-400', '🟢')}
                                    </div>
                                  )}
                                  {maybeVotes.length > 0 && (
                                    <div>
                                      <span className="text-xs text-amber-400 font-bold block mb-1">🟡 可能配合的隊員：</span>
                                      {renderVoterBadges(maybeVotes, 'text-amber-400', '🟡')}
                                    </div>
                                  )}
                                  {noVotes.length > 0 && (
                                    <div>
                                      <span className="text-xs text-rose-400 font-bold block mb-1">🔴 無法配合的隊員：</span>
                                      {renderVoterBadges(noVotes, 'text-rose-400', '🔴')}
                                    </div>
                                  )}
                                  {yesVotes.length === 0 && maybeVotes.length === 0 && noVotes.length === 0 && (
                                    <span className="text-slate-600 text-xs italic block py-1">目前尚無人對此時間段投票</span>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>

                    {/* 右欄：報名與出團管理 */}
                    <div className="space-y-6">
                      <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                        <h3 className="text-lg md:text-xl font-bold text-white mb-3">✍️ 報名此遠征隊</h3>
                        
                        {activeRaid.participants?.some(p => p.userId === user?.uid && p.ign === activeCharacter.ign) ? (
                          <div className="space-y-3">
                            <div className="p-4 bg-indigo-950/40 border border-indigo-900 rounded-2xl text-center">
                              <p className="text-base font-bold text-indigo-300">🎉 【{activeCharacter.ign}】已報名成功！</p>
                              <p className="text-xs text-slate-400 mt-1">目前處於候補名單，待團長分配小隊。</p>
                            </div>
                            <button
                              onClick={() => handleCancelSignUp(activeRaid.id)}
                              className="w-full bg-slate-800 hover:bg-rose-950/40 border border-slate-700 hover:border-rose-900 text-slate-300 hover:text-rose-300 font-bold py-3 rounded-xl transition text-sm"
                            >
                              取消報名離隊
                            </button>
                          </div>
                        ) : (
                          <div className="space-y-4">
                            <div className="p-4 bg-slate-950/50 rounded-2xl border border-slate-800 text-sm text-slate-300 space-y-1.5">
                              <p className="text-slate-400 font-bold">當前選取要報名的角色：</p>
                              <p className="text-white font-black text-base flex flex-wrap gap-1.5">
                                {activeCharacter.ign ? `${activeCharacter.ign} | ${activeCharacter.job} | Lv.${activeCharacter.level}` : '⚠ 尚未設定角色名稱'}
                              </p>
                              <button onClick={() => setShowProfileModal(true)} className="text-indigo-400 hover:underline font-bold text-xs">
                                新增/修改其他角色卡 ✎
                              </button>
                            </div>

                            <div>
                              <label className="block text-xs font-bold text-slate-400 uppercase mb-2">個人出團備註 (選填)</label>
                              <input
                                type="text"
                                value={signUpMemo}
                                onChange={(e) => setSignUpMemo(e.target.value)}
                                placeholder="例：有聖火、高減傷、已洗血"
                                className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none text-slate-100 placeholder-slate-600"
                              />
                            </div>

                            <button
                              onClick={() => handleSignUp(activeRaid.id)}
                              className="w-full bg-gradient-to-r from-indigo-500 to-violet-600 text-white font-extrabold py-3 rounded-xl text-base shadow"
                            >
                              以【{activeCharacter.ign || '出團角色'}】報名候補
                            </button>
                          </div>
                        )}
                      </div>

                      {isCreator && (
                        <div className="bg-slate-900 border border-amber-500/20 rounded-3xl p-6 shadow-xl">
                          <h3 className="text-base font-extrabold text-amber-400 mb-1.5">👑 團長排班工具</h3>
                          <p className="text-xs text-slate-400 mb-4 leading-relaxed">請利用下方各隊名單中卡片底部的分組按鈕，直接將人員錄取、歸類或移出，變更將會即時同步！</p>
                          <button
                            onClick={() => handleResetRaid(activeRaid.id)}
                            className="w-full bg-slate-950 hover:bg-slate-900 border border-amber-500/30 text-amber-400 font-bold py-3 rounded-xl text-xs transition"
                          >
                            🔄 一鍵清空出團名單與投票
                          </button>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* 分組名單 */}
                  {(() => {
                    const participants = activeRaid.participants || [];
                    const party1 = participants.filter(p => p.party === '1');
                    const party2 = participants.filter(p => p.party === '2');
                    const party3 = participants.filter(p => p.party === '3');
                    const reserves = participants.filter(p => p.party === 'reserve' || !p.party);

                    // 💡 重構 Roster 隊員卡片 - 槽位化極簡與高清護眼大字體雙重設計
                    const renderRosterGroup = (title, pList, groupKey, color) => {
                      // 💡 補齊到 6 個槽位，呈現經典遊戲大廳空欄位
                      const slots = [...pList];
                      while (slots.length < 6) {
                        slots.push({ isPlaceholder: true });
                      }

                      return (
                        <div className="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl flex flex-col justify-between">
                          <div>
                            {/* 小隊標題 */}
                            <div className="flex items-center justify-between border-b border-slate-800 pb-3.5 mb-3.5 gap-2">
                              <h4 className="font-black text-base flex items-center space-x-2 min-w-0">
                                <span className={`w-3 h-3 rounded-full shrink-0 ${color}`} />
                                <span className="text-slate-200 truncate">{title.split(' (')[0]}</span>
                              </h4>
                              <span className="text-xs font-bold bg-slate-855 text-slate-400 px-2.5 py-0.5 rounded-full whitespace-nowrap shrink-0">
                                {pList.length} / 6
                              </span>
                            </div>

                            {/* 6格槽位列表 */}
                            <div className="space-y-3.5">
                              {slots.map((p, idx) => {
                                // 1. 空槽位渲染 (提高字體大小與邊框可讀性)
                                if (p.isPlaceholder) {
                                  return (
                                    <div 
                                      key={`empty-${groupKey}-${idx}`} 
                                      className="border border-dashed border-slate-800/80 bg-slate-950/20 rounded-2xl py-3 px-4 flex items-center justify-between text-slate-600 text-sm italic select-none"
                                    >
                                      <div className="flex items-center space-x-2.5">
                                        <span className="font-mono font-bold text-slate-700 text-sm">{idx + 1}.</span>
                                        <span className="text-slate-500 tracking-wide text-sm font-medium">🪹 待分配席位</span>
                                      </div>
                                      <span className="text-xs border border-dashed border-slate-800/80 px-2 py-0.5 rounded-lg font-bold text-slate-700 font-mono tracking-wider">EMPTY</span>
                                    </div>
                                  );
                                }

                                // 2. 已分配隊員卡片 (寬大護眼、結構分明、按鈕不再擁擠)
                                return (
                                  <div 
                                    key={p.userId + '-' + p.ign} 
                                    className="bg-slate-950/50 hover:bg-slate-950 p-5 rounded-2xl border border-slate-800 flex flex-col gap-3.5 transition shadow-sm hover:border-slate-750"
                                  >
                                    {/* 頂行：序號、IGN(大字體)、職業 Badge */}
                                    <div className="flex items-center justify-between gap-3 min-w-0">
                                      <div className="flex items-center space-x-2 min-w-0">
                                        <span className="font-mono font-bold text-slate-500 text-base">{idx + 1}.</span>
                                        <span className="font-extrabold text-slate-100 text-lg truncate" title={p.ign}>{p.ign}</span>
                                      </div>
                                      <span className="text-xs bg-slate-800/90 text-indigo-300 px-3 py-1 rounded-lg font-extrabold border border-slate-700/50 shrink-0 select-none">
                                        {p.job}
                                      </span>
                                    </div>

                                    {/* 中行：等級高對比顯示 */}
                                    <div className="text-sm text-slate-300 flex items-center justify-between">
                                      <span>等級：<strong className="text-white font-extrabold font-mono text-base">Lv. {p.level}</strong></span>
                                    </div>

                                    {/* 備註泡泡框：使用醒目的對話框呈現（如圖 image_252527.png 的高對比修改需求） */}
                                    {p.memo && (
                                      <div className="bg-slate-900/90 border border-amber-500/10 text-amber-300 text-sm px-3.5 py-2.5 rounded-xl flex items-start space-x-2 leading-relaxed break-all">
                                        <span className="shrink-0 text-amber-400 mt-0.5">💬</span>
                                        <span className="font-medium">{p.memo}</span>
                                      </div>
                                    )}

                                    {/* 底行：微縮管理按鈕（行內橫向排列，放大按鈕字體與大小） */}
                                    {isCreator && (
                                      <div className="flex flex-col gap-2 mt-1.5 pt-3 border-t border-slate-800/80 select-none">
                                        <span className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">調整隊長/小隊：</span>
                                        <div className="flex flex-wrap gap-1.5 items-center justify-between">
                                          <div className="flex flex-wrap gap-1.5">
                                            {groupKey !== '1' && (
                                              <button 
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, '1')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-xs px-2.5 py-1.5 rounded-xl border border-slate-800 transition font-bold"
                                              >
                                                一隊
                                              </button>
                                            )}
                                            {groupKey !== '2' && boss?.maxPlayers > 6 && (
                                              <button 
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, '2')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-xs px-2.5 py-1.5 rounded-xl border border-slate-800 transition font-bold"
                                              >
                                                二隊
                                              </button>
                                            )}
                                            {groupKey !== '3' && boss?.maxPlayers > 12 && (
                                              <button 
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, '3')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-xs px-2.5 py-1.5 rounded-xl border border-slate-800 transition font-bold"
                                              >
                                                三隊
                                              </button>
                                            )}
                                            {groupKey !== 'reserve' && (
                                              <button 
                                                onClick={() => handleAssignParty(activeRaid.id, p.userId, p.ign, 'reserve')} 
                                                className="bg-slate-900 hover:bg-slate-800 text-slate-200 text-xs px-2.5 py-1.5 rounded-xl border border-slate-800 transition font-bold"
                                              >
                                                候補
                                              </button>
                                            )}
                                          </div>
                                          <button 
                                            onClick={() => handleKickParticipant(activeRaid.id, p.userId, p.ign)} 
                                            className="bg-rose-950/40 hover:bg-rose-900/60 border border-rose-900/50 text-rose-300 text-xs px-2.5 py-1.5 rounded-xl transition font-bold shrink-0"
                                          >
                                            剔除
                                          </button>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </div>
                      );
                    };

                    return (
                      <div className="mt-8">
                        <h3 className="text-xl font-black text-white mb-5">👥 遠征小隊分組名單</h3>
                        {/* 💡 使用網格自適應佈局，避免平板拉扁擠壓 */}
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                          {renderRosterGroup('遠征一隊 (Party 1)', party1, '1', 'bg-blue-500')}
                          {boss?.maxPlayers > 6 && renderRosterGroup('遠征二隊 (Party 2)', party2, '2', 'bg-emerald-500')}
                          {boss?.maxPlayers > 12 && renderRosterGroup('遠征三隊 (Party 3)', party3, '3', 'bg-violet-500')}
                          {renderRosterGroup('候補與預備名單 (Reserves)', reserves, 'reserve', 'bg-slate-500')}
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}
            </main>
          </div>

          {/* 底部隱私資訊 */}
          <footer className="max-w-6xl mx-auto w-full px-4 py-8 text-center text-xs text-slate-700 border-t border-slate-900 mt-10">
            <p>© 2026 NyxShade 遠征隊. All Rights Reserved.</p>
            <div className="mt-2 space-x-3">
              {isAdminLoggedIn ? (
                <>
                  <button onClick={() => setShowAdminConsole(true)} className="text-amber-500 hover:text-amber-400 hover:underline font-bold transition">🔑 開啟管理員控制台</button>
                  <span className="text-slate-800">•</span>
                  <button onClick={handleAdminLogout} className="text-rose-500 hover:text-rose-400 hover:underline transition">登出管理模式</button>
                </>
              ) : (
                <button onClick={() => setShowAdminLoginModal(true)} className="text-slate-600 hover:text-slate-500 hover:underline transition">🔑 系統管理者登入</button>
              )}
            </div>
          </footer>

          {/* ==========================================
              A. 發起揪團彈出視窗
             ========================================== */}
          {isCreating && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-lg shadow-2xl relative my-8">
                <button onClick={() => setIsCreating(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-white mb-2">🍁 發起全新遠征隊揪團</h3>
                <p className="text-xs text-slate-400 mb-6">點選下方日曆選擇出團時間，發起線上投票！</p>

                <form onSubmit={handleCreateRaid} className="space-y-4 text-sm">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">選擇挑戰 Boss</label>
                    <div className="grid grid-cols-2 gap-2">
                      {BOSS_LIST.map((b) => (
                        <button
                          key={b.id}
                          type="button"
                          onClick={() => setNewRaid({ ...newRaid, bossId: b.id })}
                          className={`p-3 rounded-xl border text-left flex items-center space-x-2 transition ${newRaid.bossId === b.id ? 'bg-slate-800 border-indigo-500 shadow-md shadow-indigo-500/10' : 'bg-slate-950 border-slate-850 text-slate-300'}`}
                        >
                          <span className="text-2xl">{b.icon}</span>
                          <div>
                            <p className="font-bold text-xs text-white truncate">{b.name.split(' (')[0]}</p>
                            <p className="text-[10px] text-slate-400 truncate">最多{b.maxPlayers}人</p>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">揪團主題 / 團隊公告</label>
                    <input
                      type="text"
                      required
                      value={newRaid.title}
                      onChange={(e) => setNewRaid({ ...newRaid, title: e.target.value })}
                      placeholder="例：週六晚上普通炎魔首發團 (招募聖火黑騎、主教)"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 focus:outline-none text-slate-100"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center justify-between">
                      <span>📅 候選日期與時間</span>
                      <button
                        type="button"
                        onClick={() => setNewRaid({ ...newRaid, proposedTimes: [...newRaid.proposedTimes, ''] })}
                        className="text-xs text-indigo-400 hover:underline"
                      >
                        + 新增時間段
                      </button>
                    </label>
                    <div className="space-y-2">
                      {newRaid.proposedTimes.map((time, index) => (
                        <div key={index} className="flex items-center space-x-2">
                          <input
                            type="datetime-local"
                            required
                            value={time}
                            onChange={(e) => {
                              const updated = [...newRaid.proposedTimes];
                              updated[index] = e.target.value;
                              setNewRaid({ ...newRaid, proposedTimes: updated });
                            }}
                            style={{ colorScheme: 'dark' }}
                            className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none"
                          />
                          {newRaid.proposedTimes.length > 1 && (
                            <button
                              type="button"
                              onClick={() => {
                                const updated = newRaid.proposedTimes.filter((_, i) => i !== index);
                                setNewRaid({ ...newRaid, proposedTimes: updated });
                              }}
                              className="text-rose-500 px-2 font-bold"
                            >
                              ✕
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">詳細備註</label>
                    <textarea
                      value={newRaid.notes}
                      onChange={(e) => setNewRaid({ ...newRaid, notes: e.target.value })}
                      placeholder="打王要求，自備藥水等..."
                      rows={3}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 focus:outline-none resize-none"
                    />
                  </div>

                  <div className="flex space-x-3 pt-3">
                    <button type="button" onClick={() => setIsCreating(false)} className="flex-1 bg-slate-800 py-2.5 rounded-xl text-slate-300">取消</button>
                    <button type="submit" className="flex-1 bg-gradient-to-r from-orange-500 to-amber-500 py-2.5 rounded-xl text-white font-bold">確認建立</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ==========================================
              💡 F. 編輯遠征隊資訊與時間彈出視窗 (管理員專用)
             ========================================== */}
          {isEditingRaid && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-lg shadow-2xl relative my-8">
                <button onClick={() => setIsEditingRaid(false)} className="absolute right-4 top-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h3 className="text-xl font-extrabold text-amber-400 mb-2">✏️ 編輯遠征隊時間與設定</h3>
                <p className="text-xs text-slate-400 mb-6">修改本次揪團的王、公告主題、備註、或者新增/刪除候選出團時間。</p>

                <form onSubmit={handleSaveRaidEdit} className="space-y-4 text-sm">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-2">更換挑戰 Boss</label>
                    <div className="grid grid-cols-2 gap-2">
                      {BOSS_LIST.map((b) => (
                        <button
                          key={b.id}
                          type="button"
                          onClick={() => setEditRaidData({ ...editRaidData, bossId: b.id })}
                          className={`p-3 rounded-xl border text-left flex items-center space-x-2 transition ${editRaidData.bossId === b.id ? 'bg-slate-800 border-indigo-500 shadow-md shadow-indigo-500/10' : 'bg-slate-950 border-slate-850 text-slate-300'}`}
                        >
                          <span className="text-2xl">{b.icon}</span>
                          <div>
                            <p className="font-bold text-xs text-white truncate">{b.name.split(' (')[0]}</p>
                            <p className="text-[10px] text-slate-400 truncate">最多{b.maxPlayers}人</p>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5">修改主題 / 團隊公告</label>
                    <input
                      type="text"
                      required
                      value={editRaidData.title}
                      onChange={(e) => setEditRaidData({ ...editRaidData, title: e.target.value })}
                      placeholder="例如：週六晚上普通炎魔首發團"
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 focus:outline-none text-slate-100"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center justify-between">
                      <span>📅 調整候選出團時間</span>
                      <button
                        type="button"
                        onClick={() => setEditRaidData({ ...editRaidData, proposedTimes: [...editRaidData.proposedTimes, ''] })}
                        className="text-xs text-indigo-400 hover:underline"
                      >
                        + 新增候選時間
                      </button>
                    </label>
                    <div className="space-y-2">
                      {editRaidData.proposedTimes.map((time, index) => (
                        <div key={index} className="flex items-center space-x-2">
                          <input
                            type="datetime-local"
                            required
                            value={time}
                            onChange={(e) => {
                              const updated = [...editRaidData.proposedTimes];
                              updated[index] = e.target.value;
                              setEditRaidData({ ...editRaidData, proposedTimes: updated });
                            }}
